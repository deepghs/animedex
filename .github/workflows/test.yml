name: Code Test

on:
  - push
  - workflow_dispatch

jobs:
  unittest:
    name: Code test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
        python-version:
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flake8 setuptools wheel build
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -e .
      - name: Show environment
        shell: bash
        run: |
          python -V
          pip --version
          pip list
      - name: Lint with flake8 (errors only)
        shell: bash
        run: |
          flake8 animedex --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run unit tests
        shell: bash
        env:
          UNITTEST: 1
        run: |
          pytest test -sv -m unittest --cov-report=xml --cov-report=term-missing --cov=animedex
      - name: Smoke-test the CLI entry point
        shell: bash
        run: |
          animedex --version
          animedex status
      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.11' }}
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
