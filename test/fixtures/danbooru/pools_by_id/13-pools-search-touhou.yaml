  - id: 4125
    name: Touhou_-_Music_Album_Art_Collection
    created_at: '2011-09-11T15:31:28.698-04:00'
    updated_at: '2026-05-07T03:55:29.958-04:00'
    description: "Pixiv tag: \"東方CDジャケット\":[https://www.pixiv.net/en/tags/%E6%9D%B1%E6%96%B9CD%E3%82%B8%E3%83%A3%E3%82%B1%E3%83%83%E3%83%88/artworks]\r\
      \n\r\nAlbum cover art, CD label art, back cover art, sleeve art, you name it. It collects all arts used in various Touhou\
      \ doujin music collections.\r\n\r\nFor fans of the doujin music who took trouble finding out who drew the artwork of\
      \ your favorite album.\r\n\r\n[b]Notice:[/b] Please have some sort of proof that this was used as album art. Touhou\
      \ Wiki, VGMdb, or official musician site will suffice. If I do a check and can not find a proof, artwork will be removed\
      \ from this pool.\r\n\r\nPool is still in organization stage. It will be organized by respective album's release date.\r\
      \n\r\nAlso, if parent and child exists, in most case, please only add parent.\r\n\r\nh4. Related\r\n* [[Pool Group:Touhou]]"
