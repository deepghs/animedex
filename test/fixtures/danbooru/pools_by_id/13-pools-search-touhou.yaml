    description: "[b]Original title:[/b] \"おはようむ\":[https://www.pixiv.net/users/68480688/artworks/おはようむ] (read as [i]Ohayoumu[/i]).\
      \ A portmanteau of ohayou (<i>good morning</i>) and [[konpaku youmu|Youmu]].\r\n\r\nA series of illustrations by [[Youyume-kun]]\
      \ where [[Touhou]] characters (mostly [[Konpaku Youmu]]) introduce various holidays to the viewer.\r\n\r\nBecause these\
      \ get posted out of order, and in order to be able to browse all of the holidays in sequence, let's attempt to keep\
      \ this ordered chronologically by holiday date, then by order of original posting (if there are multiple for the same\
      \ date)."
