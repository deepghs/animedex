  - id: 903
    name: Disgustingly_Adorable
    created_at: '2009-08-15T19:09:42.130-04:00'
    updated_at: '2026-05-07T07:02:44.887-04:00'
    description: "Pictures or videos that invoke so much adoration that they cause near physical harm to occur.\r\n[b]This\
      \ is far above the level of just cute or even adorable.[/b] Pictures that are HHHNNNGGGGG worthy. \r\n\r\nWhen in doubt,\
      \ observe the first row of images on the first page. [b]Also, do not automatically add any pic of characters such as\
      \ [[Flandre Scarlet]], [[Chen]], or [[Sukuna Shinmyoumaru]] that looks cute to this pool. Same goes for any picture\
      \ that merely has [[cat ears]] and/or [[chibi]].[/b] Expect the pool to be occasionally culled of images that do not\
      \ fit the criteria.\r\n\r\n\r\nh6. List of Japanese equivalents of \"Disgustingly Adorable\" pool on Pixiv\r\n\r\n*\
      \ \"なにこれかわいい\":http://www.pixiv.net/tags.php?tag=%E3%81%AA%E3%81%AB%E3%81%93%E3%82%8C%E3%81%8B%E3%82%8F%E3%81%84%E3%81%84\
      \ (What's this? It's cute!) (Pixpedia article is \"here)\":http://en.dic.pixiv.net/a/Incredibly+Cute\r\n* \"なにこれかわいすぎる\"\
      :http://www.pixiv.net/tags.php?tag=%E3%81%AA%E3%81%AB%E3%81%93%E3%82%8C%E3%81%8B%E3%82%8F%E3%81%84%E3%81%99%E3%81%8E%E3%82%8B\
      \ (What's this? It's too cute!)\r\n\r\n\r\nh5. Related pools\r\n* pool #2380: Badass Adorable\r\n* pool #5396: Unexpectedly\
      \ Adorable\r\n* pool #3822: Unhappy Adorable\r\n\r\nh4. See also\r\n* [[Pool Group:Expression]]\r\n"
