      synopsis: "Sakamichi Onoda is a cheerful otaku looking to join his new school's anime club, eager to finally make some\
        \ friends. Unfortunately, the club has been disbanded and he takes it upon himself to revive it by finding students\
        \ who are willing to join. Without much luck, Onoda decides to make a round trip to Akihabara on his old, bulky city\
        \ bicycle, a weekly 90-kilometer ride he has been completing since fourth grade.\n \nThis is when he meets fellow\
        \ first year student, Shunsuke Imaizumi, a determined cyclist who is using the school's steep incline for practice.\
