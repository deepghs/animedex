      synopsis: "After the murder of her father, Ryuuko Matoi has been wandering the land in search of his killer. Following\
        \ her only lead—the missing half of his invention, the Scissor Blade—she arrives at the prestigious Honnouji Academy,\
        \ a high school unlike any other. The academy is ruled by the imposing and cold-hearted student council president\
        \ Satsuki Kiryuuin alongside her powerful underlings, the Elite Four. In the school's brutally competitive hierarchy,\
        \ Satsuki bestows upon those at the top special clothes called \"Goku Uniforms,\" which grant the wearer unique superhuman\
        \ abilities. \n\nThoroughly beaten in a fight against one of the students in uniform, Ryuuko retreats to her razed\
        \ home where she stumbles across Senketsu, a rare and sentient \"Kamui,\" or God Clothes. After coming into contact\
        \ with Ryuuko's blood, Senketsu awakens, latching onto her and providing her with immense power. Now, armed with Senketsu\
        \ and the Scissor Blade, Ryuuko makes a stand against the Elite Four, hoping to reach Satsuki and uncover the culprit\
        \ behind her father's murder once and for all. \n\n[Written by MAL Rewrite]"
      background: Episode 1 was previewed at a screening in Tokyo on September 28, 2013. Regular broadcasting began on October
        4, 2013. Kill La Kill’s Toshio Ishizaki won the Tokyo Anime Award for Best Character Design in 2014. The series got
        another Character Design Award along with a Storyboard Award, Soundtrack Award, Theme Song Award (for Sirius), Mascot
        Awards (for Senketsu and Guts), Female Character Awards (for Ryuuko Matoi and Mako Mankanshoku), and Series Award
        for TV Broadcast in the 2014 Newtype Anime Awards.
