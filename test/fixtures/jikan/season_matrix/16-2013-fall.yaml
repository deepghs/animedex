      synopsis: "Due to a tragic accident, Banri Tada is struck with amnesia, dissolving the memories of his hometown and\
        \ past. However, after befriending Mitsuo Yanagisawa, he decides to move on and begin a new life at law school in\
        \ Tokyo. But just as he is beginning to adjust to his college life, the beautiful Kouko Kaga dramatically barges into\
        \ Banri's life, and their chance meeting marks the beginning of an unforgettable year. \n\nAfter having a glimpse\
        \ of college life, Banri learns that he is in a new place and a new world—a place where he can be reborn, have new\
        \ friends, fall in love, make mistakes, and grow. And as he begins to discover who he was, the path he has chosen\
        \ leads him towards a blindingly bright life that he will never want to forget.\n\n[Written by MAL Rewrite]"
