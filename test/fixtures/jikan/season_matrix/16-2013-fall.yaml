      synopsis: "With the Interhigh Championship finally over, Seirin's basketball team refocuses their efforts, training\
        \ harder than ever to get the chance to participate in the Winter Cup. Both Tetsuya Kuroko and Taiga Kagami see old\
        \ friends walk back into their lives, providing a challenge both on and off the court.\n\nAs new skills are developed\
        \ and new alliances created, enemies from various teams—giants of high school basketball such as Yousen, Shuutoku,\
        \ and Touou—stand in the way of Seirin's steadfast attempts to get to the top. All of these schools prove to be formidable\
        \ foes whose abilities progress exponentially, while Kuroko struggles to find a balance between his resolve to play\
        \ as part of a team and his desire to win. \n\nWith old wounds reopening, new challenges to face on the court, and\
        \ a new set of foes—the \"Uncrowned Kings\"—vowing to defeat the new hopefuls, will Seirin ever be able to achieve\
        \ their dream of beating the Generation of Miracles?\n\n[Written by MAL Rewrite]"
