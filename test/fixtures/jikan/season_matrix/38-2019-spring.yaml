      synopsis: "Seeking to restore humanity's diminishing hope, the Survey Corps embark on a mission to retake Wall Maria,\
        \ where the battle against the merciless \"Titans\" takes the stage once again.\n\nReturning to the tattered Shiganshina\
        \ District that was once his home, Eren Yeager and the Corps find the town oddly unoccupied by Titans. Even after\
        \ the outer gate is plugged, they strangely encounter no opposition. The mission progresses smoothly until Armin Arlert,\
        \ highly suspicious of the enemy's absence, discovers distressing signs of a potential scheme against them. \n\nShingeki\
        \ no Kyojin Season 3 Part 2 follows Eren as he vows to take back everything that was once his. Alongside him, the\
        \ Survey Corps strive—through countless sacrifices—to carve a path towards victory and uncover the secrets locked\
        \ away in the Yeager family's basement.\n\n[Written by MAL Rewrite]"
