      synopsis: "High school student Wakana Gojou spends his days perfecting the art of making hina dolls, hoping to eventually\
        \ reach his grandfather's level of expertise. While his fellow teenagers busy themselves with pop culture, Gojou finds\
        \ bliss in sewing clothes for his dolls. Nonetheless, he goes to great lengths to keep his unique hobby a secret,\
        \ as he believes that he would be ridiculed were it revealed. \n\nEnter Marin Kitagawa, an extraordinarily pretty\
        \ girl whose confidence and poise are in stark contrast to Gojou's meekness. It would defy common sense for the friendless\
        \ Gojou to mix with the likes of Kitagawa, who is always surrounded by her peers. However, the unimaginable happens\
        \ when Kitagawa discovers Gojou's prowess with a sewing machine and brightly confesses to him about her own hobby:\
        \ cosplay. Because her sewing skills are pitiable, she decides to enlist his help.\n\nAs Gojou and Kitagawa work together\
        \ on one cosplay outfit after another, they cannot help but grow close—even though their lives are worlds apart.\n\
        \n[Written by MAL Rewrite]"
