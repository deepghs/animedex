      synopsis: "Constantly outperformed by the girls' club, the boys' soft tennis club faces disbandment due to their poor\
        \ skills and lack of positive results in matches. In desperate need of members, Touma Shinjou is looking to recruit\
        \ capable players, but he fails to scout anyone. Enter Maki Katsuragi, a new transfer student who demonstrates great\
        \ reflexes when he catches a stray cat in his classroom, instantly capturing Touma's attention. With his interest\
        \ piqued, Touma ambitiously asks Maki to join the boys' team but is quickly rejected, as Maki doesn't wish to join\
        \ any clubs. Touma refuses to back down and ends up persuading Maki—only under the condition that Touma will pay him\
        \ for his participation and cover other club expenses. \n\nMaki joins the team, and his incredible form and quick\
        \ learning allow him to immediately outshine the rest of the team. Although this gives rise to conflict among the\
        \ boys, Maki challenges and pushes his fellow team members to not only keep up with his seemingly natural talent,\
        \ but also drive them to devote themselves to the game they once neglected. \n\nAs the members of the boys' soft tennis\
        \ club discover their own capabilities, they endure personal hardships and deal with the darker side of growing up\
        \ in middle school.\n\n[Written by MAL Rewrite]"
