      synopsis: "Urano Motosu loves books and has an endless desire to read literature, no matter the subject. She almost\
        \ fulfills her dream job of becoming a librarian before her life is ended in an accident. As she draws her last breath,\
        \ she wishes to be able to read more books in her next life.\n\nAs if fate was listening to her prayer, she wakes\
        \ up reincarnated as Myne—a frail five-year-old girl living in a medieval era. What immediately comes to her mind\
        \ is her passion. She tries to find something to read, only to become frustrated by the lack of books at her disposal.\
        \  \n\nWithout the printing press, books have to be written and copied by hand, making them very expensive; as such,\
        \ only a few nobles can afford them—but this won't stop Myne. She will prove that her will to read is unbreakable,\
        \ and if there are no books around, she will make them herself! \n\n[Written by MAL Rewrite]"
