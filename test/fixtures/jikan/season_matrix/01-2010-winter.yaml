      synopsis: "Shinichi Chiaki is quickly making a name for himself as the principal conductor of the revitalized Roux-Marlet\
        \ Orchestra, and Megumi \"Nodame\" Noda has made leaps and bounds as a pianist at the Conservatoire de Paris. However,\
        \ tensions mount between the two as Nodame feels left behind by Chiaki's growing success and his close friendship\
        \ with legendary piano prodigy Rui Son. Disregarding her teacher Professor Charles Auclair's advice, Nodame enters\
        \ another piano competition in an attempt to jumpstart her own performance career. \n\nMeanwhile, those around Chiaki\
        \ and Nodame are at their own crossroads. Rui begins to doubt herself after hearing Nodame's playing and being denied\
        \ tutelage from Auclair; Maestro Franz von Stresemann faces the reality of his mortality; pianists Yunlong Li and\
        \ Tatiana Vishneva feverishly prepare for a competition, while the latter also struggles with her growing feelings\
        \ for oboist and fellow student Yasunori Kuroki. \n\nAs Chiaki, Nodame, and their friends continue on their respective\
        \ journeys, they must not only strive to stay true to themselves, but also remember where it all started.\n\n[Written\
        \ by MAL Rewrite]"
