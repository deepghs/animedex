      synopsis: "When tragedy is about to strike, Satoru Fujinuma finds himself sent back several minutes before the accident\
        \ occurs. The detached, 29-year-old manga artist has taken advantage of this powerful yet mysterious phenomenon, which\
        \ he calls \"Revival,\" to save many lives.\n \nHowever, when he is wrongfully accused of murdering someone close\
        \ to him, Satoru is sent back to the past once again, but this time to 1988, 18 years in the past. Soon, he realizes\
        \ that the murder may be connected to the abduction and killing of one of his classmates, the solitary and mysterious\
        \ Kayo Hinazuki, that took place when he was a child. This is his chance to make things right.\n \nBoku dake ga Inai\
        \ Machi follows Satoru in his mission to uncover what truly transpired 18 years ago and prevent the death of his classmate\
        \ while protecting those he cares about in the present.\n\n[Written by MAL Rewrite]"
      background: Boku dake ga Inai Machi is based on Kei Sanbe's manga series of the same title. The anime adapts the full
        story of the manga, though it condenses and alters the events that take place in volumes 6 to 8. The first two episodes
        were shown at an event on January 5, 2016, at Shinjuku Ward 9. A live-action movie adaptation was released in Japan
        on March 19, 2016 which also featured an alternate ending. A live-action Netflix TV series was released on December
        15, 2017.
