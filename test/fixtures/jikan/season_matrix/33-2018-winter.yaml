      synopsis: "The continent of Atlatan once again finds itself devoured by the flames of war after a horrific event known\
        \ as the Great Hall Tragedy. What was supposed to be a joyful occasion that would establish peace between the Fantasia\
        \ Union and the Factory Alliance, the marriage of Sir Alexis Douse and Lady Marrine Kreische, was instead a tragedy.\
        \ As the bride and groom walked down the aisle, the ceremony was suddenly interrupted by a powerful convergence of\
        \ \"Chaos,\" a dark energy from another dimension that corrupts the land and brings forth monsters and demons into\
        \ the world. From within that energy appeared the Demon Lord of Diabolos, an evil being who instantly murdered the\
        \ archdukes of both factions, shattering any hope for peace between them.\n \nHaving failed to prevent this disaster,\
        \ Siluca Meletes, an Alliance mage, is traveling through the Chaos-infested countryside to study under a master magician.\
        \ When she is intercepted by a group of soldiers working with the Federation, Siluca is rescued by Theo Cornaro, a\
        \ young warrior carrying a mysterious \"Crest,\" a magical symbol that gives its wielder the ability to banish Chaos.\
        \ Bearing no allegiance to a specific domain, Theo hopes to attain the rank of Lord so that he can liberate his home\
        \ town of Sistina from its tyrannical ruler and the Chaos spreading within it. Impressed by his noble goal, Siluca\
        \ enters into a magical contract with Theo, and the two embark on a journey to restore balance to their war-torn land.\n\
        \n[Written by MAL Rewrite]"
