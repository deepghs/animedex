      synopsis: |-
        Poputepipikku turns absurdist comedy up to eleven with its pop culture references and surreal hilarity. With two bonafide high school girl protagonists—the short and exceptionally quick to anger Popuko, and the tall and unshakably calm Pipimi—they throw genres against the wall and don't wait to see what sticks. Parody is interlaced with drama, action, crudeness, and the show's overarching goal—to become a real anime.

        [Written by MAL Rewrite]
      background: Poputepipikku is based on bkub Ookawa's 4-koma manga series of the same title. Each episode consists of
        a 12-minute segment repeated twice. The repeated segment contains a different voiceover by another voice actor with
        variations on the skits. A remixed rerun titled Pop Team Epic Repeat, which mixes up the voice actors from the original
        run, began airing from October 9, 2021 and is being simulcast by Crunchyroll. It also features re-recorded versions
        of the AC-BU segments and Japanese dubs of the Japon Mignon segments. There are also visual differences in the Repeat
        version.
