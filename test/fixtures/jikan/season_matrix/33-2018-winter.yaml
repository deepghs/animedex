      synopsis: "On the islands of Cremona, a vigilante runs amok. Celebrated by some and hunted by others, the notorious\
        \ \"Killer B\" takes justice into his own hands, armed with a sharp blade and superhuman abilities. Unable to apprehend\
        \ this renegade, the Royal Investigation Service (RIS) calls upon the expertise of Keith Flick, a seasoned, yet eccentric\
        \ detective who was relegated to the Archives Department following a personal loss. As crimes in Cremona begin to\
        \ escalate, from stealthy executions of wrongdoers to sophisticated strikes on public figures, it soon becomes clear\
        \ that there is more than one person responsible.\n\nWith the help of his impulsive sidekick Lily Hoshina, and unexpected\
        \ aid from the elusive Killer B himself, Keith begins to unravel plots involving secret organizations, domestic terrorism,\
        \ and human experiments. When the involvement of the RIS extends beyond the scope of justice, the extent of the government's\
        \ corruption—as well as the trustworthiness of close allies—are thrown into question. \n\n[Written by MAL Rewrite]"
