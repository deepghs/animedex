      synopsis: "In ancient Disboard, Riku is an angry, young warrior intent on saving humanity from the warring Exceed, the\
        \ 16 sentient species, fighting to establish the One True God among the Old Deus. In a lawless land, humanity's lack\
        \ of magic and weak bodies have made them easy targets for the other Exceed, leaving the humans on the brink of extinction.\
        \ \n\nOne day, however, hope returns to humanity when Riku finds a powerful female Ex-Machina, whom he names Schwi,\
        \ in an abandoned elf city. Exiled from her Cluster because of her research into human emotions, Schwi is convinced\
        \ that humanity has only survived due to the power of these feelings and is determined to understand the human heart.\
        \ Forming an unlikely partnership in the midst of the overwhelming chaos, Riku and Schwi must now find the answers\
        \ to their individual shortcomings in each other, and discover for themselves what it truly means to be human as they\
        \ fight for their lives together against all odds. Each with a powerful new ally in tow, it is now up to them to prevent\
        \ the extinction of the human race and establish peace throughout Disboard.\n\n[Written by MAL Rewrite]"
