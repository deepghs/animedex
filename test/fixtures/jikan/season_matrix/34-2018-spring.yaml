      synopsis: "Having slept through all four of her alarms, the energetic Narumi Momose finds herself running late for her\
        \ first day of work at a new office. As she races to catch her train, she makes a promise to herself that none of\
        \ her coworkers will find out about her dark secret: that she is an otaku and a fujoshi. Her plan goes instantly awry,\
        \ though, when she runs into Hirotaka Nifuji, an old friend from middle school. Although she tries to keep her secret\
        \ by inviting him out for drinks after work, her cover is blown when he casually asks her whether or not she will\
        \ be attending the upcoming Summer Comiket. Luckily for her, the only witnesses—Hanako Koyanagi and Tarou Kabakura—are\
        \ otaku as well.\n            \nLater that night, the pair go out for drinks so that they can catch up after all the\
        \ years apart. After Narumi complains about her previous boyfriend breaking up with her because he refused to date\
        \ a fujoshi, Hirotaka suggests that she try dating a fellow otaku, specifically himself. He makes a solemn promise\
        \ to always be there for her, to support her, and to help her farm for rare drops in Monster Hunter. Blown away by\
        \ the proposal, Narumi agrees immediately. Thus the two otaku start dating, and their adorably awkward romance begins.\n\
        \n[Written by MAL Rewrite]"
