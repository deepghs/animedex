      synopsis: "Clad in desert pink and the size of a mere child, the infamous \"Pink Devil\" mercilessly hunts down other\
        \ players in the firearm-centered world of the virtual reality game Gun Gale Online. But in real life, this feared\
        \ player killer is not quite who anyone would expect.\n \nA shy university student in Tokyo, Karen Kohiruimaki stands\
        \ in stark contrast to her in-game avatar—in fact, she happens to stand above everyone else too, much to her dismay.\
        \ Towering above all the people around her, Karen's insecurities over her height reach the point where she turns to\
        \ the virtual world for an escape. Starting game after game in hopes of manifesting as a cute, short character, she\
        \ finally obtains her ideal self in the world of Gun Gale Online. Overjoyed by her new persona, she pours her time\
        \ into the game as LLENN, garnering her reputation as the legendary player killer.\n \nHowever, when one of LLENN's\
        \ targets gets the best of her, she ends up meeting Pitohui, a skilled yet eccentric woman. Quickly becoming friends\
