      synopsis: "As summer arrives for the students at UA Academy, each of these superheroes-in-training puts in their best\
        \ efforts to become renowned heroes. They head off to a forest training camp run by UA's pro heroes, where the students\
        \ face one another in battle and go through dangerous tests, improving their abilities and pushing past their limits.\
        \ However, their school trip is suddenly turned upside down when the League of Villains arrives, invading the camp\
        \ with a mission to capture one of the students. \n\nBoku no Hero Academia 3rd Season follows Izuku \"Deku\" Midoriya,\
        \ an ambitious student training to achieve his dream of becoming a hero similar to his role model—All Might. Being\
        \ one of the students caught up amidst the chaos of the villain attack, Deku must take a stand with his classmates\
        \ and fight for their survival.\n\n[Written by MAL Rewrite]"
