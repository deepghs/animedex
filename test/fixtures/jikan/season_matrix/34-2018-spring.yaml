      synopsis: "Every day, Aya Asagiri thinks about killing herself. She is bullied relentlessly at school, and at home,\
        \ her older brother Kaname physically abuses her to relieve the academic stress put on him by their father.\n\nOne\
        \ night, as she lies awake wishing for death, a mysterious website called Magical Girl Site appears on her laptop,\
        \ promising to give her magical powers. At first, she dismisses it as a creepy prank, but when she finds a magical\
        \ gun in her shoe locker the next day, she doesn't know what to believe. Deciding to take it with her, she soon runs\
        \ into her bullies once again. But this time, desperate for anything to save her, she uses the gun—and her assailants\
        \ are transported to a nearby railroad crossing, where they are run over. \n\nAya's conscience is unable to handle\
        \ the fact that she murdered two of her classmates with magic, and she desperately tries to understand the situation.\
        \ However, when she finds herself in trouble again, she is saved by Tsuyuno Yatsumura, a classmate who can use magic\
        \ to stop time. This duo has a lot to do: not only do they have to fight alongside and against other magical girls,\
        \ but they also need to uncover the truth behind the website and the apocalyptic event known as \"The Tempest\" that\
        \ is soon to occur.\n\n[Written by MAL Rewrite]"
