        \ of strange creatures called Hideauze, resulting in an interstellar war to prevent humanity's extinction. Armed with\
        \ Chamber, an autonomous robot, 16-year-old lieutenant Ledo of the Galactic Alliance joins the battle against the\
        \ monsters. In an unfortunate turn of events, Ledo loses control during the battle and is cast out to the far reaches\
        \ of space, crash-landing on a waterlogged Earth.\n\nOn the blue planet, Gargantia—a large fleet of scavenger ships—comes\
        \ across Chamber and retrieves it from the ocean, thinking they have salvaged something of value. Mistaking their\
        \ actions for hostility, Ledo sneaks aboard and takes a young messenger girl named Amy hostage, only to realize that\
        \ the residents of Gargantia are not as dangerous as he had believed. Faced with uncertainty, and unable to communicate\
        \ with his comrades in space, Ledo attempts to get his bearings and acclimate to a new lifestyle. But his peaceful\
        \ days are about to be short-lived, as there is more to this ocean-covered planet than meets the eye. \n\n[Written\
