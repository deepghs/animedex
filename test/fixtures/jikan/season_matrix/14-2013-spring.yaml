      synopsis: "Hachiman Hikigaya is an apathetic high school student with narcissistic and semi-nihilistic tendencies. He\
        \ firmly believes that joyful youth is nothing but a farce, and everyone who says otherwise is just lying to themselves.\
        \ \n\nIn a novel punishment for writing an essay mocking modern social relationships, Hachiman's teacher forces him\
        \ to join the Volunteer Service Club, a club that aims to extend a helping hand to any student who seeks their support\
        \ in achieving their goals. With the only other club member being the beautiful ice queen Yukino Yukinoshita, Hachiman\
        \ finds himself on the front line of other people's problems—a place he never dreamed he would be. As Hachiman and\
        \ Yukino use their wits to solve many students' problems, will Hachiman's rotten view of society prove to be a hindrance\
        \ or a tool he can use to his advantage?\n\n[Written by MAL Rewrite]"
