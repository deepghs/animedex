        \ years later, only to find himself the sole survivor of his race as mankind is wiped out.\n \nTogether with the other\
        \ surviving races, Willem takes refuge on the floating islands in the sky, living in fear of the Beasts below. He\
        \ lives a life of loneliness and only does odd jobs to get by. One day, he is tasked with being a weapon storehouse\
