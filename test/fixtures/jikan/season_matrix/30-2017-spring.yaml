      synopsis: "In Japanese folklore, a \"tsukumogami\" is an object that has gained a soul, becoming alive and self-aware.\
        \ There are two types of tsukumogami: the mature \"tsugumomo,\" who have developed through long years of harmony with\
        \ their owners, and the aberrant \"amasogi,\" premature spirits that are only born to grant the destructive wishes\
        \ of certain people.\n\nKazuya Kagami has never gone without his mother's obi after her death. Be it at home or school,\
        \ he keeps it safe with him at all times. One day, he nearly loses his life when a wig amasogi attacks him. When all\
        \ seems to be over, his treasured obi defends him, transforming into a beautiful girl. She introduces herself as Kiriha,\
        \ a tsugumomo owned by Kazuya's mother. \n\nWith Kiriha's arrival, Kazuya enters a reality he has never seen before,\
        \ a world with gods and tsukumogami.\n\n[Written by MAL Rewrite]"
