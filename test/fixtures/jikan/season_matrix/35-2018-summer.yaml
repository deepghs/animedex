        \ of adulthood. \n\nThough reality may seem ever changing, unchangeable are the short-lived moments of one's childhood\
        \ days. A plentiful bowl of noodles, the beauty of family and the trials of first love endure the inevitable flow\
        \ of time, as three different characters explore the strength of bonds and the warmth of cherished memories. Within\
        \ the disorder of the present world, witness these quaint stories recognize the comfort of the past, and attempt to\
        \ revive the neglected flavors of youth. \n\n[Written by MAL Rewrite]"
