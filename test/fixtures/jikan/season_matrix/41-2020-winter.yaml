      synopsis: "Midori Asakusa sees the world a bit differently. Always having her nose in a sketchbook, Asakusa draws detailed\
        \ landscapes and backgrounds of both the world around her and the one within her boundless imagination. Even the simple\
        \ act of doodling on a wall evolves into an emergency repair on the outer hull of her spaceship. She is only brought\
        \ back to reality by her best friend Sayaka Kanamori. The pair are stark opposites, with Asakusa's childlike wonder\
        \ contrasted by Kanamori's calculated approach to life. \n\nAfter a chance encounter where the two \"save\" the young\
        \ model Tsubame Misuzaki from her overprotective bodyguard, a connection instantly sparks between Asakusa and Misuzaki,\
        \ as both share an intense passion for art and animation. Whereas Asakusa is interested in backgrounds and settings,\
        \ Misuzaki loves drawing the human form. Sensing a money-making opportunity, Kanamori suggests that they start an\
        \ animation club, which they disguise as a motion picture club since the school already has an anime club. Thus begins\
        \ the trio's journey of producing animation that will awe the world. \n\nFrom the brilliant mind of Masaaki Yuasa,\
        \ Eizouken ni wa Te wo Dasu na! is a love letter to animation, wildly creative in its approach, and a testament to\
        \ the potential of the medium.\n\n[Written by MAL Rewrite]"
