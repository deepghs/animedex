      background: 'Naruto SD: Rock Lee no Seishun Full-Power Ninden is a Naruto: Shippuuden non-canon spin-off. Unlike the
        original series, it is the work of a different author and presents distinctive elements: another main character, a
        super-deformed art style, a narrator, and topics or statements that can be difficult to understand even for adults.
        The first DVD was released on July 18, 2012. Starting October 1, 2013, the anime was re-broadcasted as a selection
        of episodes from the initial series under the title Naruto SD: Rock Lee no Seishun Full-Power Ninden Mou Iccho. It
        is also considered that Rock Lee Ocharake Gaiden—a separate feature shown in five installments as a bonus of Naruto
        Shippuuden—is essentially Naruto SD: Rock Lee no Seishun Full Power Ninden''s predecessor. As of March 2015, both
        dubbed and subtitled English versions have been made available for online streaming in the United States through Hulu
        and Neon Alley.'
