        \ winning the election with 98% of the votes is only to be expected. \n\nThe very first thing the boisterous new president\
        \ does is set up the \"Medaka Box,\" a suggestion box allowing students to submit any kind of request for assistance.\
        \ Together with the cynical Zenkichi Hitoyoshi, her childhood friend who has been strong-armed into helping, Medaka\
        \ fulfills these requests at a ridiculous rate. For every job completed, she adds flowers to the student council room,\
        \ with the aim of filling the entire school. However, the two are about to find out that helping others may be a lot\
