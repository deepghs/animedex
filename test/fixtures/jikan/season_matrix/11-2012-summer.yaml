      synopsis: "When five students at Yamaboshi Academy realize that there are no clubs where they fit in, they band together\
        \ to form the Student Cultural Society, or \"StuCS\" for short. The club consists of: Taichi Yaegashi, a hardcore\
        \ wrestling fan; Iori Nagase, an indecisive optimist; Himeko Inaba, a calm computer genius; Yui Kiriyama, a petite\
        \ karate practitioner; and Yoshifumi Aoki, the class clown.\n \nOne day, Aoki and Yui experience a strange incident\
        \ when, without warning, they switch bodies for a short period of time. As this supernatural phenomenon continues\
        \ to occur randomly amongst the five friends, they begin to realize that it is not just fun and games. Now forced\
        \ to become closer than ever, they soon discover each other's hidden secrets and emotional scars, which could end\
        \ up tearing the StuCS and their friendship apart.\n\n[Written by MAL Rewrite]"
      background: The cast from the Kokoro Connect drama CD reprised their roles in the anime. The anime uses locations in
        Yokohama as reference, with cooperation from the Yokohama Film Commission and the Yokohama Gakuen high school.
