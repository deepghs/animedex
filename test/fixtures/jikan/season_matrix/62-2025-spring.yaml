      synopsis: |-
        For 20 years, Beryl Gardenant has taught various people as the master of his father's sword-fighting dojo in a backwater village. Many have become astounding swordsmen themselves, but Beryl remains quite humble, referring to himself as an old man. His former disciples all disagree, including Allucia Citrus, a girl who graduated from Beryl's training over 10 years ago and is currently the commander of the Royal Order of Knights.

        Wishing to reveal her cherished teacher's true greatness, Allucia recommends Beryl to her superiors, leading to his appointment as a special instructor for the Order by imperial command. She delivers the news herself—though Beryl has yet to realize her deeper motive. Pressured by his aging parents, Beryl reluctantly accepts the job and moves to the capital. There, he meets more of his past students, such as Surena Lysandra, now a black-rank adventurer, and Ficelle Harbeller, a prominent member of the Magic Corps. Before long, word begins to spread: not even the strongest warriors can match the "old man" from the countryside.

        [Written by MAL Rewrite]
