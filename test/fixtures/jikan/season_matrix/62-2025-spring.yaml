      synopsis: |-
        In the kingdom of Girtonia, the Adenauer family has been giving birth to saints for centuries. Two sisters form the newest generation of holy women who protect the lands from monsters and calamities. The eldest, Philia, is considered a prodigy in the field, capable of solving any problem in no time. Meanwhile, the youngest, Mia, is not as extraordinary as her older sister but has charmed the entire country with her lovely personality. Despite their striking differences, Philia and Mia share an unbreakable bond.

        Sadly, Mia is the only person who truly cares for Philia. Because of Philia's expressionless face and aloof demeanor, their parents always scold her, and the citizens complain about her. Moreover, Julius Girtonia, the second prince and Philia's fiancé, would rather have a more amicable girl as his wife-to-be. For that reason, he cancels the engagement and sells Philia off to the neighboring kingdom, Parnacorta, which has recently lost its own saint.

        Having no say on the matter, Philia immediately goes to serve Parnacorta. As a foreigner, she presumes that she will not be treated much better than in Girtonia. Contrary to her expectations, Philia might have finally found a place with people worth smiling for.

        [Written by MAL Rewrite]
