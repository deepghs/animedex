        The wealthy and esteemed Shiunji family consists of seven siblings: Banri, Seiha, Ouka, Arata, Shion, Minami, and Kotono. Arata, the family heir, is constantly teased by his sisters for his inability to find love. However, during Kotono's 15th birthday, the siblings learn a shocking, long-hidden secret—all of them are adopted!

