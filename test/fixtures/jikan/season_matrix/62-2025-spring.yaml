      synopsis: |-
        Healers have always been a pivotal part of the Kingdom of Herzeth, but becoming one requires an official license, which demands years of studying. Despite growing up poor, a pragmatic young man, Zenos, taught himself everything about healing. As an exceptional healer, Zenos was even recruited by an adventurer party but eventually kicked out. When he meets and helps an elf slave named Lily, he realizes his new ambition: he wants to open a clinic in the shadows, serving those who may otherwise be cast aside.

        Zenos starts his underground practice alongside Lily, but he is immediately pulled into a conflict between lizardmen, werewolves, and orcs—which he quickly resolves and unites the races, thanks to his healing abilities. However, when the royal knights hear rumors of his recent accomplishments and are less than pleased, Zenos must find a way to continue his operations without compromising his principles.

