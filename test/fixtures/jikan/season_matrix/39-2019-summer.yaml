      synopsis: "Tightly clutching his Gibson guitar, Mafuyu Satou steps out of his dark apartment to begin another day of\
        \ his high school life. While taking a nap in a quiet spot on the gymnasium staircase, he has a chance encounter with\
        \ fellow student Ritsuka Uenoyama, who berates him for letting his guitar's strings rust and break. Noticing Uenoyama's\
        \ knowledge of the instrument, Satou pleads for him to fix it and to teach him how to play. Uenoyama eventually agrees\
