      synopsis: "It looked like it would be a normal day for Ganta Igarashi and his classmates—they were preparing to go on\
        \ a class field trip to a certain prison amusement park called Deadman Wonderland, where the convicts perform dangerous\
        \ acts for the onlookers' amusement. However, Ganta's life is quickly turned upside down when his whole class gets\
        \ massacred by a mysterious man in red. Framed for the incident and sentenced to death, Ganta is sent to the very\
        \ jail he was supposed to visit. \n\nBut Ganta's nightmare is only just beginning. \n\nThe young protagonist is thrown\
        \ into a world of sadistic inmates and enigmatic powers, to live in constant fear of the lethal collar placed around\
        \ his neck that is slowed only by winning in the prison's deathly games. Ganta must bet his life to survive in a ruthless\
        \ place where it isn't always easy to tell friend from foe, all while trying to find the mysterious \"Red Man\" and\
        \ clear his name, in Deadman Wonderland.\n\n[Written by MAL Rewrite]"
      background: Deadman Wonderland adapts the first 5 volumes of Kazuma Kondou's and Jinsei Kataoka's manga series of the
        same name. Some characters from the manga were not featured in the anime, notably the then minor character Azami Midou
        and the gay crossdressing character Masaru Sukegawa.
