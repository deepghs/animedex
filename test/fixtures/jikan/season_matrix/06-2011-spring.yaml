      synopsis: "After having to deal with jealousy from his co-workers for working under his father's name, prideful literary\
        \ editor Ritsu Onodera is determined to establish himself in the industry. To accomplish this, he quits his job at\
        \ his father's publishing company and transfers to Marukawa Publishing. But instead of being placed in their literary\
        \ division, Ritsu finds himself working as the rookie manga editor for the Emerald editing department, a team that\
        \ operates under extremely tight schedules in order to meet deadlines. There, Ritsu is introduced to the infamous\
        \ editor-in-chief Masamune Takano, a persistent man who strives for results.\n\nAs it turns out, Takano is actually\
        \ Ritsu's high school love, and it is the aftermath of that heartbreak has caused Ritsu's reluctance to fall in love\
        \ again. Now with the two reunited after several years of separation, the reestablishment of their relationship is\
        \ marked by Takano's vow to make Ritsu say that he loves him again.\n\nSekaiichi Hatsukoi follows three couples that\
        \ are interconnected within the manga industry, with each being subject to the budding of first love. \n\n[Written\
        \ by MAL Rewrite]"
