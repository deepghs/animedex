      synopsis: |-
        Jinta Yadomi is peacefully living as a recluse, spending his days away from school and playing video games at home instead. One hot summer day, his childhood friend, Meiko "Menma" Honma, appears and pesters him to grant a forgotten wish. He pays her no mind, which annoys her, but he doesn't really care. After all, Menma already died years ago.

        At first, Jinta thinks that he is merely hallucinating due to the summer heat, but he is later on convinced that what he sees truly is the ghost of Menma. Jinta and his group of childhood friends grew apart after her untimely death, but they are drawn together once more as they try to lay Menma's spirit to rest. Re-living their pain and guilt, will they be able to find the strength to help not only Menma move on—but themselves as well?

        [Written by MAL Rewrite]
      background: Ano Hi Mita Hana no Namae wo Bokutachi wa Mada Shiranai. reunites the lead production staff of the 2008
        anime series It was first teased in December 2010 as a joint production of Aniplex, Fuji Television, and animation
        studio A-1 Pictures under the title AnoHana Project. The series is set in the city of Chichibu, Saitama Prefecture.
        The first Blu-ray volume, which went on sale on June 29, 2011, sold more than 31,000 copies in the . At the time,
        that first week sales figure was the third highest for a first volume Blu-ray release of a television anime, after
        (2011) and (2009). AnoHana received a Jury Selection award in the Animation division of the 15th Japan Media Arts
        Festival. A visual novel adaptation for the PlayStation Portable, which diverges from the story of the anime and contains
        an original ending, was developed by Guyzware and published by 5pb. on August 30, 2012. AnoHana was also adapted into
        a special live-action television drama, which aired on Fuji Television on September 21, 2015.
