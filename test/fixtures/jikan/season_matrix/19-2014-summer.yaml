      synopsis: "Some time ago, the influential and powerful Toue Inc. bought the island of Midorijima, Japan, with the plans\
        \ of building Platinum Jail—a luxurious utopian facility. Those who are lucky enough to call it home are the wealthiest\
        \ citizens in the world. The original residents of the island, however, were forced to relocate to the Old Residential\
        \ District; and after the completion of Platinum Jail, they were completely abandoned.\n \n\"Rib\" and \"Rhyme\" are\
        \ the most common games played on the island. Rib is an old school game in which gangs engage in turf wars against\
        \ each other, while Rhyme is a technologically advanced game wherein participants fight in a virtual reality. To be\
        \ able to play Rhyme, you must have an \"All-Mate\" (an AI that typically looks like a pet), and the match must be\
        \ mediated by an \"Usui.\"\n\nAoba Seragaki has no interest in playing either game; he prefers to live a peaceful\
        \ life with his grandmother and All-Mate, Ren. However, after getting forcefully dragged into a dangerous Rhyme match\
        \ and hearing rumors about disappearing Rib players, all of Aoba's hopes of living a normal life are completely abolished.\n\
        \n[Written by MAL Rewrite]"
