      synopsis: "Amid the desolate remains of a once-thriving city, only the rumbling of a motorbike breaks the cold winter\
        \ silence. Its riders, Chito and Yuuri, are the last survivors in the war-torn city. Scavenging old military sites\
        \ for food and parts, the two girls explore the wastelands and speculate about the old world to pass the time. Chito\
        \ and Yuuri each occasionally struggle with the looming solitude, but when they have each other, sharing the weight\
        \ of being two of the last humans becomes a bit more bearable. Between Yuuri's clumsy excitement and Chito's calm\
        \ composure, their dark days get a little brighter with shooting practice, new books, and snowball fights on the frozen\
        \ battlefield. \n\nAmong a scenery of barren landscapes and deserted buildings, Shoujo Shuumatsu Ryokou tells the\
        \ uplifting tale of two girls and their quest to find hope in a bleak and dying world.\n\n[Written by MAL Rewrite]"
