      synopsis: |-
        It can be rough transferring to a new school—even more so if you do not want to make any friends, like Nobuaki Kanazawa. But the reason for his antisocial behavior soon becomes clear when his class receives a text from someone called "The King." Included are instructions for the "King's Game," and all class members must participate. Those who refuse to play, quit halfway, or do not follow an order in the allotted time of 24 hours will receive a deadly punishment.

        Having played the game before and watched as those around him died, Nobuaki tries to warn his clueless classmates. Unfortunately, they only believe him after the King's Game claims its first casualties. Stuck in a horrific situation with no chance of escape, Nobuaki has a choice: put his own survival above those around him, or do what he could not before and save his classmates.

        [Written by MAL Rewrite]
