      synopsis: "In the mysterious future, crystalline organisms called Gems inhabit a world that has been destroyed by six\
        \ meteors. Each Gem is assigned a role in order to fight against the Lunarians, a species who attacks them in order\
        \ to shatter their bodies and use them as decorations. \n\nPhosphophyllite, also known as Phos, is a young and fragile\
        \ Gem who dreams of helping their friends in the war effort. Instead, they are told to compile an encyclopedia because\
        \ of their delicate condition. After begrudgingly embarking on this task, Phos meets Cinnabar, an intelligent gem\
        \ who has been relegated to patrolling the isolated island at night because of the corrosive poison their body creates.\
        \ After seeing how unhappy Cinnabar is, Phos decides to find a role that both of the rejected Gems can enjoy. Houseki\
        \ no Kuni follows Phos' efforts to be useful and protect their fellow Gems.\n\n[Written by MAL Rewrite]"
