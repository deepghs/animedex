        as collaborators, with Watanabe insisting that artists could only use pre-1984 musical styles. Although character
        designer Yoshiyuki Itou is credited as an animation director, his designs were not standardized across the series,
        allowing for individual animators to express their style. The series was licensed in North America by Funimation.
