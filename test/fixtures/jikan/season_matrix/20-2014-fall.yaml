      synopsis: "All of a sudden, they arrived: parasitic aliens that descended upon Earth and quickly infiltrated humanity\
        \ by burrowing into the brains of vulnerable targets. These insatiable beings acquire full control of their host and\
        \ are able to morph into a variety of forms in order to feed on unsuspecting prey.\n \nSixteen-year-old high school\
        \ student Shinichi Izumi falls victim to one of these parasites, but it fails to take over his brain, ending up in\
        \ his right hand instead. Unable to relocate, the parasite, now named Migi, has no choice but to rely on Shinichi\
        \ in order to stay alive. Thus, the pair is forced into an uneasy coexistence and must defend themselves from hostile\
        \ parasites that hope to eradicate this new threat to their species.\n\n[Written by MAL Rewrite]"
      background: 'The anime was simulcast by Crunchyroll outside of Asia. Aside from the manga and anime, the series also
