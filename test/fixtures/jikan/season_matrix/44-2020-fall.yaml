      synopsis: "Nasa Yuzaki is determined to leave his name in the history books. Ranking first in the national mock exam\
        \ and aiming for a distinguished high school, he is certain that he has his whole life mapped out. However, fate is\
        \ a fickle mistress. On his way home one snowy evening, Nasa's eyes fall upon a peerless beauty across the street.\
        \ Bewitched, Nasa tries to approach her—only to get blindsided by an oncoming truck. \n\nThankfully, his life is spared\
        \ due to the girl's swift action. Bleeding by the side of an ambulance, he watches as the girl walks away under the\
        \ moonlight—reminiscent of Princess Kaguya leaving for the moon. Refusing to let this chance meeting end, he forces\
        \ his crippled body to chase after her and asks her out. Surprised by his foolhardiness and pure resolve, the girl\
        \ accepts his confession under a single condition: they can only be together if he marries her!\n\n[Written by MAL\
        \ Rewrite]"
