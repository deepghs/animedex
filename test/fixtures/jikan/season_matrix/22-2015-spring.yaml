      synopsis: "When Ryuu Yamada entered high school, he wanted to turn over a new leaf and lead a productive school life.\
        \ That is why he chose to attend Suzaku High School, where no one would know of his violent delinquent reputation.\
        \ However, much to Ryuu's dismay, he is soon bored; now a second year, Ryuu has reverted to his old ways—lazy with\
        \ abysmal grades and always getting into fights.\n\nOne day, back from yet another office visit, Ryuu encounters Urara\
        \ Shiraishi, a beautiful honors student. A misstep causes them both to tumble down the stairs, ending in an accidental\
        \ kiss! The pair discover they can switch bodies with a kiss: an ability which will prove to be both convenient and\
        \ troublesome.\n \nLearning of their new power, Toranosuke Miyamura, a student council officer and the single member\
        \ of the Supernatural Studies Club, recruits them for the club. Soon joined by Miyabi Itou, an eccentric interested\
        \ in all things supernatural, the group unearths the legend of the Seven Witches of Suzaku High, seven female students\
        \ who have obtained different powers activated by a kiss. The Supernatural Studies Club embarks on its first quest:\
        \ to find the identities of all the witches.\n\n[Written by MAL Rewrite]"
