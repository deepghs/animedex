      synopsis: "With his muscular build and tall stature, Takeo Gouda is no ordinary high school freshman. However, behind\
        \ Takeo's intimidating appearance lies a pure heart of gold, and he is considered a hero by his male peers for his\
        \ courage and chivalry. \n\nUnfortunately for Takeo, his appearance does not bode well for his love life. As if his\
        \ looks were not already enough to scare the opposite sex away, Takeo's cool, handsome best friend and constant companion\
        \ Makoto Sunakawa easily, and unintentionally, steals the hearts of the female students—including every girl Takeo\
        \ has ever liked.\n\nOne day, when Takeo saves cute Rinko Yamato from being molested, he falls in love with her instantly.\
