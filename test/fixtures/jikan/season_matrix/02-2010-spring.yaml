      synopsis: "Misaki Ayuzawa is a unique phenomenon within Seika High School. In a predominantly male institution, she\
        \ became the first-ever female student council president through her honesty and diligence. Ever since Misaki got\
        \ promoted to the position, she has been working tirelessly to ensure a better school life for all girls. Despite\
        \ that, Misaki is very strict with the boys, which has earned her the title \"Demon President.\" \n\nOne day, after\
        \ hearing a girl cry in the hallway, Misaki encounters Takumi Usui—the most popular boy in the school—as he rejects\
        \ a love confession. Enraged at what she is seeing, Misaki reprimands him for making the girl cry. However, Usui is\
        \ indifferent and brushes it off as nothing.\n\nUnexpectedly, Misaki soon runs into Usui again, but this time when\
        \ she is working at a maid cafe! Embarrassed that someone has found out about her secret occupation, Misaki promises\
        \ herself not to let Usui destroy her reputation. However, the mysterious boy now begins to visit the same cafe regularly\
        \ to observe and tease Misaki. When push comes to shove, will Usui still be able to keep the president's secret?\n\
        \n[Written by MAL Rewrite]"
