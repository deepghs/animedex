      synopsis: "It is the new year, which means that the senior members of the Light Music Club are now third-years, with\
        \ Azusa Nakano being the only second-year. The seniors soon realize that Azusa will be the only member left once they\
        \ graduate and decide to recruit new members. Despite trying many methods of attracting underclassmen—handing out\
        \ fliers, bringing people into the clubroom, and performing at the welcoming ceremony—there are no signs of anyone\
        \ that plans to join.\n\nWhile heading to the clubroom, Azusa overhears Yui Hirasawa say that the club is fine with\
        \ only five people and that they can do many fun things together. Changing her mind, she decides that they do not\
        \ need to recruit any members for the time being. \n\nK-On!! revolves around the members of the Light Music Club as\
        \ they experience their daily high school life. From rehearsing for concerts to just messing around, they are ready\
        \ to make their last year together an exciting one!\n\n[Written by MAL Rewrite]"
      background: K-On!! won the Animation Kobe Award in the Television category during the Animation Kobe festival in 2010.
