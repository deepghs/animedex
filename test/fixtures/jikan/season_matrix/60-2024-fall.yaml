      synopsis: |-
        Two years ago, Noel Stollen's village was cruelly attacked by beasts when an Abyss, a gate to the demonic realm, opened. The invasion was eventually halted by his grandfather, a Seeker, whose job is to hunt monsters and purify lands tainted by the Abyss. As his heroic grandfather took his last breath, Noel promised him that he would become the ultimate Seeker—despite him being a Talker, which is widely considered the weakest class.

        After becoming a certified Seeker, Noel joins a party called Blue Beyond, where his main duties are to support his teammates by boosting their abilities and giving them orders. One day, Noel makes a proposal for the group: he wants to create a clan that will enable them to rise even higher in society. As everyone accepts the plan and all is going well, the worst happens—two members betray him by embezzling the entirety of their shared funds. That does not discourage Noel, however, as he sells the traitors to a slave trader, earning his money back.

        Now alone, Noel endeavors to rebuild Blue Beyond from scratch. In order to become the greatest Seeker in the world, Noel must forcibly carve his own path by recruiting new members and using his notorious ways to eliminate any enemies in his way.

        [Written by MAL Rewrite]
