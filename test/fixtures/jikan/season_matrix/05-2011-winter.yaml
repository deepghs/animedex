      synopsis: "Ayumu Aikawa is a 16-year-old high school student who is tragically murdered while investigating a suspicious\
        \ house. However, he soon awakens next to a strange armored girl called Eucliwood Hellscythe. She reveals herself\
        \ to be a necromancer who has revived Ayumu, consequently turning him into a zombie! \n\nNow immortal, Ayumu sets\
        \ out to hunt down his killer. One day, while searching in a cemetery, he encounters a boisterous young girl named\
        \ Haruna, who is fighting a bear with a chainsaw while dressed as a magical girl. After she kills the beast, Haruna\
        \ attempts to erase Ayumu's memories of her, but he instead absorbs her magic for himself. Stripped of her powers,\
        \ Haruna now orders Ayumu to take up her role of hunting strange creatures known as \"Megalo,\" monsters that roam\
        \ the human world and terrorize the population.\n\nKore wa Zombie Desu ka? follows the daily antics of the human-turned-zombie\
        \ Ayumu as he begins his new, ludicrous life where the supernatural becomes the norm.\n\n[Written by MAL Rewrite]"
