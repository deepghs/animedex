      synopsis: "An exoskeleton weapon engineered by Japan, Infinite Stratos (IS) can be piloted only by women. Its power\
        \ and combat prowess are so immense that an international treaty has been signed banning its use as a military asset.\
        \ \n\nWhen it is discovered that 15-year-old Ichika Orimura is the only male capable of steering an IS, he is forcibly\
        \ enrolled in the Infinite Stratos Academy: an all-female boarding school, the students of which graduate to become\
        \ IS pilots. At this training school, Ichika is reunited with two of his childhood friends, Houki Shinonono and Lingyin\
        \ Huang, and befriends Cecilia Alcott, an IS representative from the United Kingdom.\n\nGuided by the legendary pilot\
        \ Chifuyu Orimura—their strict homeroom teacher and Ichika's older sister—Ichika and the girls will need to use everything\
        \ at their disposal to defend themselves and their academy against the dangers that will arise during the course of\
        \ their thrilling school life.\n\n[Written by MAL Rewrite]"
