      synopsis: "Dorohedoro: Ma no Omake further explores the world of sorcerers and the Hole, honing in on what the characters\
        \ do in their spare time when they are not seeking out their enemies. \n\nKamen Kakusa\nFujita attends a mask conjuring\
        \ ritual in hopes of a Devil bestowing him with an appropriate mask, like the ones his colleagues Noi and Shin possess.\
        \ Hopefully his offering entices the mask-maker! \n\nTenpo For You\nNikaidou, lacking money and forced to sell gyoza\
        \ on the streets of the Hole, stumbles upon a quaint shop selling tea and sweets. Its owner is the gentle and hospitable\
        \ Syueron, but it seems the denizens of the Hole bear a grudge against him.\n\nShitappa Seishun Graffiti\nIntrigued\
        \ by the photographs hanging around the mansion, Ebisu approaches En hoping for a portrait of her own. However, she\
        \ is disappointed to find that only members of the En Family can have their pictures taken. \n\nAnata no Shiranai\
        \ Gyoza no Kai\nThe Gyoza Fairy keeps the Hungry Bug in pristine condition, but his primary responsibility is ensuring\
        \ the gyoza tastes good. So he becomes rather agitated when Nikaidou's customers do not properly enjoy their meals.\n\
        \nOdoru Ma no Utage\nEn is enthusiastic about his masquerade ball and is adamant on his family's participation. Per\
        \ tradition, attendees must choose a partner and dance to appease the Devils. To their horror, they discover that\
        \ failing to do so may incur nasty consequences!\n\nYokaze ni Fukarete Ooba Kinenbi\nNikaidou gives detailed instructions\
        \ on preparing oba gyoza and Kaiman is eager to help!\n\n[Written by MAL Rewrite]"
      background: 'Dorohedoro: Ma no Omake, also known as Dorohedoro: Bonus Curse or Extra Evil in English, is a special edition
        OVA series consisting of six mini-episodes. It is bundled with the second Blu-ray Box release of Dorohedoro, along
        with other limited edition merchandise.'
