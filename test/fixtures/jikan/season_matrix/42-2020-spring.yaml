      synopsis: "Kakushi Gotou is a somewhat popular manga artist whose works are known for inappropriate content. Because\
        \ of this raunchiness, when his daughter Hime was born, he vowed to keep his profession hidden from her, believing\
        \ that she will be disillusioned if she finds out. \n\nThis paranoia-induced belief leads Kakushi into hectic situations.\
        \ Despite being a single father, he does his best and often resorts to extreme ends just to protect his secret, such\
        \ as guising as a salaryman every day or holding emergency drills in case Hime somehow finds her way to his workplace.\n\
        \nKakushigoto tells the story of a father and daughter living side by side, maintaining their peaceful existence as\
        \ the father attempts to preserve the status quo. However, there is a saying: \"there are no secrets that time cannot\
        \ reveal.\" In time, Hime must learn the reality behind the things she took for granted as she grew up.\n\n[Written\
        \ by MAL Rewrite]"
