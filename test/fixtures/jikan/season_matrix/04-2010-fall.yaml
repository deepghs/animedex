      synopsis: "Kirino Kousaka embodies the ideal student with equally entrancing looks. Her grades are near perfect, and\
        \ to cover her personal expenses, she works as a professional model alongside her best friend Ayase Aragaki, who abhors\
        \ liars and all things otaku. But what Ayase doesn't know is that Kirino harbors a deep, entrenched secret that will\
        \ soon be brought to light.\n\nAt home one day, Kyousuke, Kirino's perfectly average brother, stumbles upon an erotic\
        \ game that belongs to none other than his seemingly flawless little sister. With her reputation at stake, Kirino\
        \ places a gag order on her sibling while simultaneously introducing him to the world of eroge and anime. Through\
        \ Kirino, Kyousuke encounters the gothic lolita Ruri Gokou and the bespectacled otaku Saori Makishima, thus jump-starting\
        \ an entirely new lifestyle. But as he becomes more and more involved in his little sister's secret life, it becomes\
        \ that much harder to keep under wraps. \n\n[Written by MAL Rewrite]"
