      synopsis: |-
        Justice, and the enforcement of it, has changed. In the 22nd century, Japan enforces the Sibyl System, an objective means of determining the threat level of each citizen by examining their mental state for signs of criminal intent, known as their Psycho-Pass. Inspectors uphold the law by subjugating, often with lethal force, anyone harboring the slightest ill-will; alongside them are Enforcers, citizens that have become latent criminals, granted relative freedom in exchange for carrying out the Inspectors' dirty work.

        Into this world steps Akane Tsunemori, a young woman with an honest desire to uphold justice. However, as she works alongside veteran Enforcer Shinya Kougami, she soon learns that the Sibyl System's judgments are not as perfect as her fellow Inspectors assume. With everything she has known turned on its head, Akane wrestles with the question of what justice truly is, and whether it can be upheld through the use of a system that may already be corrupt.

        [Written by MAL Rewrite]
      background: An edited version of the series received a rebroadcast starting July 10, 2014. 22 episodes of the original
        series were combined into eleven 46-minute long episodes with some scenes being slightly extended. Psycho-Pass aired
        on Fuji Television's noitaminA block. In the 2013 Newtype Anime Awards it was voted as fourth best title of the year.
        Its 11th episode was awarded "Best Episode" in the Noitamina 10th anniversary fan vote. It has spawned several video-game
        spin-offs, a novel series and a manga series as well.
