      synopsis: "Though Sayaka Miki's wish was fulfilled, the unforeseen consequences that came with it overwhelm her, causing\
        \ her soul gem to become tainted as she succumbs to despair and eventually loses her humanity. Homura Akemi reveals\
        \ to Kyouko Sakura and Madoka Kaname the ultimate fate of magical girls: once their soul gem becomes tainted, it transforms\
        \ into a Grief Seed, and they are reborn as witches—a truth Homura learned only through repeating history countless\
        \ times in a bid to prevent Madoka's tragedy.\n\nKyuubey only compounds their despair when he confesses his true intentions:\
        \ to harness the energy created from magical girls and use it to prolong the life of the universe. As the threat of\
        \ Walpurgisnacht, a powerful witch, looms overhead, Homura once again vows to protect Madoka and the world from a\
        \ grim fate.  \n\nCaught between honoring Homura's wish and saving the world, which one will Madoka choose in the\
        \ end?\nMahou Shoujo Madoka★Magica Movie 2: Eien no Monogatari is a story of inescapable destiny, and an unlikely\
        \ hero who could change it all.\n\n[Written by MAL Rewrite]"
