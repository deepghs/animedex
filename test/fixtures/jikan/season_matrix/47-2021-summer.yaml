      synopsis: "\"U\" is a popular social media platform where people can create a virtual persona and start a new life.\
        \ Among its five billion users, one newcomer is quickly gaining attention: Belle, a beautiful singer whose alluring\
        \ melodies slowly capture the hearts of the masses. But in this space where everyone hides behind an avatar, curiosity\
        \ arises over who the mysterious girl truly is. \n\nSuzu Naito—a shy girl from the countryside—can no longer sing\
        \ following past trauma, all her efforts resulting in breakdowns and illness. However, when Suzu joins U, she is once\
        \ again able to project her voice. Under the alias \"Belle,\" her vocals soon go viral, receiving both love and hatred.\
        \ Meanwhile, rumors spread of a chaotic beast within U, known only as \"The Dragon.\" After a chance meeting during\
        \ her concert, Belle finds he is not as evil as the stories suggest. Now, both online and in the real world, Suzu\
        \ has to face the struggles of identity, fame, and opening one's heart.\n\n[Written by MAL Rewrite]"
      background: Inspired by the 1756 French fairy tale Beauty and the Beast, Ryuu to Sobakasu no Hime premiered at the Cannes
        Film Festival on July 15, 2021 and was received with a standing ovation of 14 minutes. It was the third highest-grossing
        movie at the Japanese box office in 2021, earning 6.53 billion yen as of December 12, 2021. Belle was drawn by Jin
        Kim, the character designer of popular Disney productions such as Tangled and Frozen. Ryuu to Sobakasu no Hime had
        five nominations at the 49th Annie Awards, including one for Best Independent Animated Feature, making it the Japanese
        anime film with the most nominations ever received in the history of these awards. A novel adaptation was issued by
        Kadokawa Bunko on June 12, 2021.
