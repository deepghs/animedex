        \ rebellious former Inquisitor, is forced into joining due to her tendency to break rules and committing a serious\
        \ violation: the killing of a witch. Tempers flare upon her arrival, as she clashes with their clumsy captain Takeru\
        \ Kusanagi and argues with the rest of the squad over her views on witches. This eclectic group has a long way to\
        \ go if they wish to succeed and climb the ranks at the Anti-Magic Academy: they must first set aside their differences\
        \ and come to work together as a team.\n\n[Written by MAL Rewrite]"
