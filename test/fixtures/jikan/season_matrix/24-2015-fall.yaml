      synopsis: "Following their participation at the Inter-High, the Karasuno High School volleyball team attempts to refocus\
        \ their efforts, aiming to conquer the Spring tournament instead. \n\nWhen they receive an invitation from long-standing\
        \ rival Nekoma High, Karasuno agrees to take part in a large training camp alongside many notable volleyball teams\
        \ in Tokyo and even some national level players. By playing with some of the toughest teams in Japan, they hope not\
        \ only to sharpen their skills, but also come up with new attacks that would strengthen them. Moreover, Hinata and\
        \ Kageyama attempt to devise a more powerful weapon, one that could possibly break the sturdiest of blocks. \n\nFacing\
        \ what may be their last chance at victory before the senior players graduate, the members of Karasuno's volleyball\
        \ team must learn to settle their differences and train harder than ever if they hope to overcome formidable opponents\
        \ old and new—including their archrival Aoba Jousai and its world-class setter Tooru Oikawa.\n\n[Written by MAL Rewrite]"
      background: Haikyuu!! Second Season is the sequel to the first anime adaptation of the manga of the same name, Haikyuu!!,
        which was ranked in 4th place in Honya Club's prestigious 'Zenkoku Shotenin ga Eranda Osusume Comic' ranking in 2013.
        Sentai Filmworks has announced their exclusive licensing rights for digital and home release in North America.
