      synopsis: "Yuugo Hachiken is studious, hard-working, and tired of trying to live up to expectations he just cannot meet.\
        \ With the ushering in of a brand new school year, he decides to enroll in Ooezo Agricultural High School, a boarding\
        \ school located in the Hokkaido countryside, as a means to escape from the stress brought upon by his parents.\n\
        \ \nInitially convinced that he would do well at this institution, Hachiken is quickly proven wrong by his talented\
        \ classmates, individuals who have been living on farms their entire lives and know just about everything when it\
        \ comes to food, vegetables, and even the physiology of livestock! Whether it be waking up at five in the morning\
        \ for strenuous labor or to take care of farm animals, Hachiken is a complete amateur when it comes to the harsh agricultural\
        \ life.\n \nGin no Saji follows the comedic story of a young student as he tries to fit into a completely new environment,\
        \ meeting many unique people along the way. As he struggles to appreciate his surroundings, Hachiken hopes to discover\
        \ his dreams, so that he may lead a fulfilling life on his own terms.\n\n[Written by MAL Rewrite]"
      background: Gin no Saji is an anime adaptation of Hiromu Arakawa's manga of the same name that has sold over 12 million
        copies in Japan alone and was honored with a nomination for the 19th annual Tezuka Osamu Cultural Prize. The series
        aired in 2013 on the famous Fuji Television noitaminA block, which has aired several prominent anime including Anohana,
        Nodame Cantabile and Psycho-Pass. Gin no Saji has been licensed by Aniplex of America for streaming and home video
        distribution in North America. The anime adaptation was followed by a live-action film adaptation, of the same source
        material, that premiered in 2014.
