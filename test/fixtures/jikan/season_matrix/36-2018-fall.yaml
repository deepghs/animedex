      synopsis: "Yuu Koito has always been entranced with romantic shoujo manga and the lyrics of love songs. She patiently\
        \ waits for the wings of love to sprout and send her heart aflutter on the day that she finally receives a confession.\
        \ Yet, when her classmate from junior high declares his love for her during their graduation, she feels unexpectedly\
        \ hollow. The realization hits her: she understands romance as a concept, but she is incapable of experiencing the\
        \ feeling first-hand.\n \nNow, having enrolled in high school, Yuu, disconcerted and dispirited, is still ruminating\
        \ over how to respond to her suitor. There, she happens upon the seemingly flawless student council president, Touko\
        \ Nanami, maturely rejecting a confession of her own. Stirred by Touko's elegant manner, Yuu approaches her for advice,\
        \ only to be bewildered when the president confesses to her! Yuu quickly finds herself in the palm of Touko's hand,\
        \ and unknowingly sets herself on a path to find the emotion which has long eluded her.\n\n[Written by MAL Rewrite]"
