      synopsis: "Goblins are known for their ferocity, cunning, and rapid reproduction, but their reputation as the lowliest\
        \ of monsters causes their threat to be overlooked. Raiding rural civilizations to kidnap females of other species\
        \ for breeding, these vile creatures are free to continue their onslaught as adventurers turn a blind eye in favor\
        \ of more rewarding assignments with larger bounties.\n\nTo commemorate her first day as a Porcelain-ranked adventurer,\
        \ the 15-year-old Priestess joins a band of young, enthusiastic rookies to investigate a tribe of goblins responsible\
        \ for the disappearance of several village women. Unprepared and inexperienced, the group soon faces its inevitable\
        \ demise from an ambush while exploring a cave. With no one else left standing, the terrified Priestess accepts her\
        \ fate—until the Goblin Slayer unexpectedly appears to not only rescue her with little effort, but destroy the entire\
        \ goblin nest. \n\nAs a holder of the prestigious Silver rank, the Goblin Slayer allows her to accompany him as he\
        \ assists the Adventurer's Guild in all goblin-related matters. Together with the Priestess, High Elf, Dwarf, and\
        \ Lizardman, the armored warrior will not rest until every single goblin in the frontier lands has been eradicated\
        \ for good.\n\n[Written by MAL Rewrite]"
