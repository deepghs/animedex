      synopsis: "Daikichi Kawachi is a 30-year-old bachelor working a respectable job but otherwise wandering aimlessly through\
        \ life. When his grandfather suddenly passes away, he returns to the family home to pay his respects. Upon arriving\
        \ at the house, he meets a mysterious young girl named Rin who, to Daikichi’s astonishment, is his grandfather's illegitimate\
        \ daughter!\n \nThe shy and unapproachable girl is deemed an embarrassment to the family, and finds herself ostracized\
        \ by her father's relatives, all of them refusing to take care of her in the wake of his death. Daikichi, angered\
        \ by their coldness toward Rin, announces that he will take her in—despite the fact that he is a young, single man\
        \ with no prior childcare experience.\n\nUsagi Drop is the story of Daikichi's journey through fatherhood as he raises\
        \ Rin with his gentle and affectionate nature, as well as an exploration of the warmth and interdependence that are\
        \ at the heart of a happy, close-knit family.\n\n[Written by MAL Rewrite]"
