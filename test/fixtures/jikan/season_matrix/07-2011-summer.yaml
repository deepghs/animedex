      synopsis: "Many years ago, after the end of a bloody world war, mankind took shelter in six city-states that were peaceful\
        \ and perfect... at least on the surface. However, Shion—an elite resident of the city-state No. 6—gained a new perspective\
        \ on the world he lives in, thanks to a chance encounter with a mysterious boy, Nezumi. Nezumi turned out to be just\
        \ one of many who lived in the desolate wasteland beyond the walls of the supposed utopia. But despite knowing that\
        \ the other boy was a fugitive, Shion decided to take him in for the night and protect him, which resulted in drastic\
        \ consequences: because of his actions, Shion and his mother lost their status as elites and were relocated elsewhere,\
        \ and the darker side of the city began to make itself known. \n\nNow, a long time after their life-altering first\
        \ meeting, Shion and Nezumi are finally brought together once again—the former elite and the boy on the run are about\
        \ to embark on an adventure that will, in time, reveal the shattering secrets of No. 6.\n\n[Written by MAL Rewrite]"
      background: No. 6 condenses but largely remains faithful to the the original nine-part light novel series. Changes were
