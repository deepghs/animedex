        \ Naruto Uzumaki! \n\nHowever, the assassination attempt is not the only crime attributed to the young ninja, who\
        \ vigorously denies the accusations. To avoid a diplomatic conflict, Tsunade forcibly sends him to Kusagakure's Houzuki\
        \ Castle—a maximum-security penitentiary dedicated to ninja criminals—until the situation is resolved.\n\nDespite\
        \ his powers being immediately suppressed by Mui, the prison's warden who possesses the ability to seal chakra, Naruto\
        \ recklessly engages in futile escape attempts. But with the help of two fellow inmates, he realizes that there is\
        \ more to this legendary detention facility than meets the eye. Uncovering a terrible secret, the trio embarks on\
        \ a dangerous operation that may be Naruto's only chance to break free and prove his innocence.\n\n[Written by MAL\
