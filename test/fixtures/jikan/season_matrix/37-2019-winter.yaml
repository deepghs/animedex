      synopsis: "Fuutarou Uesugi is an ace high school student, but leads an otherwise tough life. His standoffish personality\
        \ and reclusive nature have left him friendless, and his father is debt-ridden, forcing his family to scrape by.\n\
        \nOne day during his lunch break, Uesugi argues with a female transfer student who has claimed \"his seat,\" leading\
        \ both of them to dislike each other. That same day, he is presented with a golden opportunity to clear his family's\
        \ debt: a private tutoring gig for a wealthy family's daughter, with a wage of five times the market price. He accepts\
        \ the proposal, but is horrified to discover that the client, Itsuki Nakano, is the girl he confronted earlier! \n\
