        \ okay with this dunce? \n\nDoukyonin wa Hiza, Tokidoki, Atama no Ue. tells the story of an unlikely friendship between\
        \ a human and a cat who try to foster an understanding with each other.\n\n[Written by MAL Rewrite]"
