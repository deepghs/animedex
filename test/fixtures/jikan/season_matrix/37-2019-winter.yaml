        \ solitude, his parents tragically died in an accident many years ago, leaving him alone in the world. \n\nOne day,\
        \ while giving offerings at his parents' grave, Subaru runs into a small grey and white cat named Haru, which he ends\
        \ up taking home with him. Subaru, however, has never taken care of anyone else in his life—can he even take care\
        \ of a cat? Haru is grateful toward Subaru, as he gives her all the food she wants—a luxury for a cat who is used\
