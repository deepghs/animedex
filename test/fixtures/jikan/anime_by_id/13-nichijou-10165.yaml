      synopsis: "Nichijou primarily focuses on the daily antics of a trio of childhood friends—high school girls Mio Naganohara,\
        \ Yuuko Aioi and Mai Minakami—whose stories soon intertwine with the young genius Hakase Shinonome, her robot caretaker\
        \ Nano, and their talking cat Sakamoto. With every passing day, the lives of these six, as well as of the many people\
        \ around them, experience both the calms of normal life and the insanity of the absurd. Walking to school, being bitten\
        \ by a talking crow, spending time with friends, and watching the principal suplex a deer: they are all in a day's\
        \ work in the extraordinary everyday lives of those in Nichijou. \n\n[Written by MAL Rewrite]"
      background: Bandai Entertainment had licensed Nichijou, but on January 2, 2012, it was announced they were leaving the
        North American anime market with all unreleased titles including Nichijou being cancelled. The series would remain
        unlicensed until November 4, 2016 when Funimation Entertainment acquired the series, and released it sub-only in a
        complete Blu-ray & DVD combo pack on February 7, 2017. They also did a Blu-ray & Digital combo pack with a brand new
        English dub, which was released on July 23, 2019.
