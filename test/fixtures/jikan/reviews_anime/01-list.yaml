        Mardock Scramble: The First Compression comes to us via a combination of anime’s most unhinged writer and most unhinged studio to produce a surprisingly compelling, if a bit muddled cyberpunk crime thriller. Explanations for the various unique sci-fi concepts and technologies tend to focus more on the “why” than the “how,” so while the intricacies of how Balot is able to make Œufcoque do the utterly fantastical things he does is left unsaid, character motivations and thematic ideas are crystal clear, if a bit overly so. The focus on sexual assault and how it affects its victims means this film comes with heavy content warnings,but, for the most part, it’s portrayed in a way that both acknowledges the deep pain inflicted upon those who are victims, while also empowering them with the tools and ideas they need to overcome a deeply-engrained trauma. It does occasionally fall for the trap of still framing her through a sexually-enticing lens though, so it’s far from perfect.
        Visually, it is certainly a GoHands production. Striking character models and thrilling action live side-by-side with egregious CG models and color design so intentionally garish and G R E E N that it sears the eyes. It’s also not the most interesting sci-fi world to look at in terms of technological creativity, with a lot of structures defaulting to something vaguely futuristic looking, but the action spectacle does make up for a good deal of the other visual inadequacies. As the first part of a trilogy, it is blisteringly paced, which by itself is good, but hopefully that doesn’t mean it gets completely burnt out before we reach the conclusion.
