      review: "Incredibly tragic viewing experience. The art and score are phenomenal but the story and characters are just\
        \ not my jam. Starting off the first case with a drug deal scam was great, but following it up with a case about sports\
        \ betting and a case about retrieving a painting just took the wind out of my sails. I think the final case was a\
        \ good way to raise the stakes, but it really feels like it should have come sooner. My main problem with the story\
        \ is that it bends over backwards to make sure every main character is an inexplicably good person. You are servedconstant\
        \ dialogue and reminders and that they are a force for good who would never actually harm anyone innocent and whoever\
        \ they're scamming is very bad so they deserve it. It really dulls any story beat where Edamura tries to leave the\
        \ group because he wants to be a good person. I had a pretty hard time getting on board with his point of view when\
        \ the main cast only does objectively good things that also make them a lot of money. \n\nThere are several \"twists\"\
        \ where a character does something \"sketchy\" or \"betrays\" the group, and they end up not coming off as believable\
        \ every single time. I virtually forgot the main cast was doing anything illegal in the first place.\nCase 4 was especially\
        \ egregious about this. There were like 3 \"double-crosses\" in a row and I never felt any tension from them. If you're\
        \ going to have a fake-out where I'm supposed to think a character is going rogue, I HAVE TO BELIEVE THEY WOULD BETRAY\
        \ SOMEONE IN THE FIRST PLACE.\n\nThe rating for this show is as high as it is solely because of sound and visuals.\
        \ The story itself would probably be fitting for someone in their early teens and newer to storytelling, but I really\
        \ struggled to engage with the show whenever I took a second to think about what was happening on screen."
