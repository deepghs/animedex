      review: "i'm all for a good BL, especially because anime in this genre (that are unproblematic and consensual!!) are\
        \ few and far between, but this romance didn't feel as fulfilling as i'd hoped it would be. there was barely any chemistry\
        \ or progression throughout the season, and it felt less like sincere feelings and more like kondou confusing survival-based\
        \ dependence for love. and aresh wasn't helping with how he basically forced a domestic lifestyle between them and\
        \ looked at anyone who so much as breathed in kondou's direction like \"mine, don't touch.\" like, why is he jealous\
        \ of a ten-year-old for god's sake T-T the exposition aroundthe healing system aresh uses also felt underdeveloped\
        \ and i wish it hadn't been since it’s so central to kondou’s survival. because why do you have to blow someone's\
        \ back to cure them? we need to know. \na lot of important details and interactions feel glossed over, which could’ve\
        \ helped make kondou and aresh’s relationship feel more grounded. that said, it was fairly interesting to see the\
        \ progress kondou and yua made in improving the kingdom’s economy and education.\n\nall in all, i guess it's a good\
        \ representation of overworked corporate slaves and a reminder about the importance of work-life balance, but they\
        \ squandered a good premise with barely memorable characters (ist being the exception, he's lowkey the best character)\
        \ and even less memorable antagonists. i wouldn't want to re-watch it or a second season."
