      review: |-
        Reviewing this after a re-watch. I enjoyed the individual stories that are presented in an episodic style as well as the overall period driven story. Each mystery was fun to see through and discover how it happened. This is one of the better mystery anime I've watched. Story: I enjoyed the overall story and each of the arcs. The sense of mystery was conveyed well and the main plot moved fast enough to keep me engaged until the end. I felt like the conclusion was lackluster in the emotional department as well as a bit disorienting with some of the scenes having inaccurate allusions. (where's mylegs?)

        Characters: The 2 MCs don't show as much character growth as I would've liked and I felt that at times they regressed in their behavior when it should've been steadily showing growth. This lead to me not feeling to attached to either MC.

        The antagonists are the MVPs of the cast, both with their personalities and how their stories play out. I was satisfied with the outcomes of the antagonists and wouldn't have minded a few of those scenes being extended so we could savor the moments a bit more.

        Art: The backgrounds were pretty. The character designs were nice and fitting for the period.

        Sound: I liked the first ED the most. I watched the subbed version and the voice acting was good but some of the lines could've been written better.

        A unique and interesting anime that includes several cliched character tropes but fails to execute them to their fullest.
