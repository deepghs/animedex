        Grave of Fireflies is hard to watch. It covers difficult themes and situations that leave the viewer wondering why, why didn't they make the right choice. The choices we make in life aren't always rational or well thought out. Sometimes we make decisions that hurt ourselves. This movie does an excellent job of conveying that. Dealing with hunger, homelessness, and loss of family is difficult. It feels bad to experience any of those things. Being unable to swallow your pride to ask for help can feel impossible, where you'd rather choose anything else but that. Not knowing where to turn. I understand those feelings and thismovie depicted it with painful accuracy.

        The artwork, sound track, and voice acting set a perfect tone to encapsulate the feelings of the character's strife and tragedy.

        This movie sits as a reminder to keep on pushing forward and trying to do the best for myself so I don't fall victim to the same fate as the characters. It's painfully honest. I loved it.
