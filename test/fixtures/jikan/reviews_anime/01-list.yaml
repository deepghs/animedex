      review: "I knew from the spoilers that it was a specific anime, incredibly mysterious, extrelmy depressing (I want to\
        \ say that it affects the viewer's psyche), but the scale truly blows me away. The worldbuilding presented is incredibly\
        \ rich, not only does the functioning of the city around the abyss seem rational (I really like the idea that technological\
        \ progress is driven by the risky extraction of artifacts). But te number of creative solutions for the behavior of\
        \ the abyss' stunning fauna and flora is astounding. The heroes quickly arouse attachment and are heterogeneous (Riko\
        \ and Reg have different abilities, so they complement each other when working together).Episodic characters like\
        \ Ozen and Nanachii drive brilliantly designed storytelling, they are also incredibly creatively presented. \n\nThe\
        \ reminiscences with Lyza are very atmospheric, although I still think she is a tragic parent, perhaps only comparable\
        \ to Genndo Ikari.\nSome scenes has strong impact and may be difficult to watch for people who are not used to such\
        \ scenes. Additionally, the music and voice acting of the voice actors fit perfectly into such scenes. Some scenes\
        \ really almost made me cry.\n\nThe music is adequate, the voice acting is amazing.A BRILLIANT animation that can\
        \ only rival Frieren and Princess Principal in my opinion.\n\nThe plot is so engaging and thought-provoking that I\
        \ immediately plan to watch the second season.\n\nSome anime humor scenes were weird, but even funny (I really have\
        \ a primitive taste in humor).\n\nExtremly great series. Definitely worth watching!"
