      review: "Ms. Vampire who lives in my neighborhood is a short 12 episode anime based around the central concept of a\
        \ vampire and a schoolgirl living together. I started watching it because I was told it has a focus on vampire culture:\
        \ books, games and general vampire lore. I'd be remiss to not acknowledge the gay 'undertones' the show presents,\
        \ you cannot not notice them, either way there isn't much to get from this if you just want yuri, it is one of few\
        \ lesbian vampire stories but again there's very little lesbianism here beyond implications and the protagonist Akari,\
        \ just Akari in general really.I took a long hiatus while watching it because it was too overbearingly sweet, \"Ms.\
        \ Vampire who lives in my neighborhood\" is, of course supposed to be a sweet lovey-dovey cutesy anime but it doesn't\
        \ come across in the same way as most CGDCT shows. I couldn't pin it down no matter how much I tried. Maybe its a\
        \ mix of the art, voice acting and general vibe? Either way you may — like me, find the show too hard to pick up again\
        \ if you don't watch it all in one sitting. \n\nRegardless, the show has decent music, voice acting, art direction\
        \ and characters. It doesn't particularly excel at anything, but there's no shame in being average, especially considering\
        \ that \"Ms. Vampire who lives in my neighborhood\" is attempting to pull a very specific audience of people who enjoy\
        \ vampire fiction and humour them with references to other works (Castlevania, Bran Stoker's Dracula, etc.) and commentary\
        \ on general vampire concepts (association with werewolves, having to drink blood to survive, silver bullets are fatal)\
        \ —  it does not fail at this.\n\nIf you like vampires and enjoy references to them then this is one of very few anime\
        \ that will give you that. It is also, of course, a vampire story but if you just like vampires conceptually and don't\
        \ enjoy references reliant humour or you don't have a good knowledge of vampire fiction then skip this one."
