      review: Wouldn't show this to my worst enemy. This is genuinely one of the worst written pieces of media I've ever had
        the misfortune of experiencing. Every chance this anime has to go in an interesting or competent direction, it takes
        a hard turn into something legitimately unexplainable. Decisions so baffling you'll think you missed something. You
        didn't miss anything, the characters are legitimately just constantly flip flopping and changing their entire outlook
        on life with the tiniest breeze. This feels like a creative writing student in high school wrote this at the last
        minute the night before the assignment was due. I cannot stress enoughhow the characters are always making choices
        out of left field with no warning. Solutions are created out of thin air because the writers forgot to set one up.
        Save yourself the pain and watch something else.
      score: 4
