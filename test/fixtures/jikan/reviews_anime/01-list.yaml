      review: |-
        An anime with an intriguing main storyline and lots of good action. No point in reiterating the premise as you've already read it, except I will say this anime is better than it's described. You may or may not have guessed it- but something seriously sounds off about this world. Why would the heroes be branded the bad guys? Why resurrect only the worst criminals? Well- unfortunately we never get these answers this season, but the show does a fantastic job settig up the bigger picture to all why this is happening. Let's talk character first. Xylo is a great MC. He's rough around the edges, buthe has his reason. His back story is only lightly shed on, but it's still amazing. I'm sure we'll know more in the future. But when you learn about it, you can't help but root and feel bad for the guy. He's also a man's man- doing what he has to no matter the circumstances. Not only is he a great fighter, but he also isn't dumb like your typical muscle bound MC. Xylo uses his wits and cunning to help him and his friends out of variations sticky situations. In short, he's awesome. The second character to mention is the goddess Teoritta. She doesn't stand out, but she is a bundle of joy and very important as she is basically Xylo's better conscious. Teroritta plays her part well. The last shout out is Kvia. Holy shit. When we first meet her, I thought what a basic character. Seen that type before. Yup. But man- no spoiler but her closing arc towards the end is absolutely amazing. The rest of the cast are also good. Xylo's teammates are all different enough, each with their own intriguing background stories. The villains unfortunately don't get much time to shine, but there is a reason for that and I can't spoil it.

        Action wise- if you're here for that then you'll thoroughly enjoy it. Lot's of fast movements, shiny explosions, sword combats, etc. It's not the best, but it looks pretty, so I'm all for it.

        The best part for me though, as I kind of mentioned above, is the intrigue and mystery the show built throughout these 12 episodes. So many questions I need answers for! Heroes, Goddesses, demons, the church, the knights, etc. I love stuff like this where it isn't just mindless slaughter, and there's a grander scheme at play.

        That said, the reason I did knock it down a bit was because the over all story is good, but the smaller stories inbetween are kind of predictable and bland. Xylo and this group go here because if not the church kills them. They have to defeat this demon lord or defense this territory. And repeat. Another negative is that the powers aren't explained in this show. I'm not talking the ressurection power, but just in general. Like, some humans are straight up OP, having super human powers, or the ability to basically control magic. That said, this is always a pet peeve of mines, so I always have to subtract some for it.

        In the end, I really enjoyed this show and I think most will too. I really hope for season 2 so we can uncover more of the mystery surrounding this world.
