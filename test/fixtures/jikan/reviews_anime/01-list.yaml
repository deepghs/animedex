      review: This anime is okay. Its funny often enough that i would have given it a 6 but i took an entire star off just
        for the curing of a wheelchair user with an instant magical potion. as a disabled person i just wanted people to know
        that happens. it is a wheelchair user who became so via injury but i still dislike the common trope of treating a
        wheelchair like a horrible tragedy and a magical cure like the greatest thing in the world. overall this show felt
        almost too random at times, in like a disjointed way. sometimes i wished for just slightly moreplot? or maybe more
        cohesiveness with the episodes? but it did make me laugh so i guess thats good. i liked the characters too which is
        important for me so yeah, i recommend it for a brain off easy show (its great for high pain and fatigue days iykyk)
        and i will be watching 2nd season! i want to see more of Nico and Morihito!
      score: 5
