        Fanservice comes from the sexy bikini, occasional nip slips, it's more of an exposure festival than sexual ecchi. These girls will compete against eachother and that means touching and grabbing, I found it extremely sensual and pleasing to my eyes, I am positive that ecchi lovers and people in general who like watching beautiful girls will have fun with this OVA.

        If you are a Koihime Musou fan, either played the VN, saw a cute video on the internet or watched the anime, don't miss on this. If you like ecchi and sexy girls, I highly recomend it. The show is very playful and the atmosphere is cheerful.
