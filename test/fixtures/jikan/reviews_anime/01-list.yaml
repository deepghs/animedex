      review: This one was o-kay. It really hooked me at first, but it lost me pretty quickly because the pacing was just
        so very slow. It felt like we only got through the first few establishing chapters of a story and didn’t actually
        get into any meaningful plot. I think this is partially because this tries to riff on “Delicious in Dungeon” a bit
        (with a strong focus on cooking segments) and also because it does a lot more telling than showing (the episode where
        they are flying on the back of the dragon, I’m looking at you). Overall, there was nothing offensive about this, butit
        felt pretty slow and derivative. You might enjoy it fine enough, but there are many better villainess anime out there.
      score: 6
