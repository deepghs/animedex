      review: |-
        A very basic and honestly pretty cliched romance anime that suffers from pacing issues despite having two cours. Something many other adaptations these days would be on their knees to also have so that the story would seem less rushed. Despite it's more than enough runtime, the pacing is absolute ass and almost ruins a manga that was already "just ok" tier. It starts off with a kind of yandere hook but very quickly that fades away once we get to know Satsuki better. Aside from Suzu I didn't really care about the other girls and once Satsuki completely lost that initial yandere-like charm I grew moreand more annoyed. Some of the fanservice was well done but ehhhh I just wasn't into the art direction of th anime. Everything is so overly shiny and there's too much orange and pink everywhere. Should I really fault this anime for something that's just a common trend now though? Hmm...

        ...Well, yes. Because a lot of aspects about Watari's XX can be described with the word "common" or "normal" after the first few episodes.

        Just kinda boring, not to the point of extremely annoying me and in the forcing me to drop it out of frustration, but just...alright. Kind of like the manga but worsened due to the aforementioned pacing issues. If you check the manga reviews for Watari's XX you will find a lot more positive entries simply because the pacing mattered a lot, completely getting rid of the intial tension and sort of mystery aspect ruins a lot of investment the story needs for the more drama focused latter half.
