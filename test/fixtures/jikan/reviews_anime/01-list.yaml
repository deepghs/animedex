        Before I launch into my criticisms of this popular series, let me start with a review of the strengths of Komi Can't Communicate: First, the production value is amazing — even when a scene (or episode) is not particularly interesting, at least it always looks great! Meanwhile most of the jokes land well enough, and the constant switching between Komi's popular-girl-ice-queen stare to her shy, wide-eyed, and chibi alternate ego somehow never gets old. Most important of all, the romance between her and Tadano is absolutely adorable and taps directly into the sweet, uncomplicated energy of young love that somehow alludes so many other knock-off entriesin the romance genre. And despite not being the most complex character, Komi's goal to make 100 friends provides a critical emotional anchor to the show's progression and prevents the entire thing from devolving immediately into a sterile dozen episodes of cheap, overly filtered will-she/will-he gags.

        Unfortunately, many of these strengths are outweighed by negative counterparts. Setting aside multiple instances of unnecessarily weird fan service, Komi Can't Communicate suffers from a near-universal pitfall of the anime romance genre: a bland, emotionally frustrating male MC. While Tadano is actually aware of his romantic feelings for Komi (which is already better than half of his male MC peers), he nevertheless fulfills the trope of being perpetually spineless when it comes to acting on his latent desires. Even worse, when Tadano gets frazzled or nervous during an interaction with Komi — and by that, I mean virtually *every* interaction with Komi — all hope for progress or even just coherent dialogue is shattered. This becomes worse the longer the season goes, as an increasingly enlarged cast of characters means less exclusive screentime for the would-be couple; in fact, it could even be argued that Komi Can't Communicate is more appropriately labelled a "friend group" anime than a romance one.

        All in all, I enjoyed the season and would tepidly recommend it to those who already enjoy romance anime and have built a tolerance to some of the more chronic issues in the genre. That said? I have little to no interest to embark on a second season, and *definitely* not a five-hundred-chapter manga that dangles its romance in front of its readers like a carrot on a stick. Frankly I think that Komi Can't Communicate should have remained a one-shot, and when expanded, kept to a mini-series. As of writing this, season three has yet to be officially confirmed — but even if it is, I simply can't imagine how any of its material will be substantially different from what you already get in the first season. 6/10
