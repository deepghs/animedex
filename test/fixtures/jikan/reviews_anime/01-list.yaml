      review: "This is the LONGEST anime I have ever completed and while technically “season 1” is only 2/3 of the show, I\
        \ would say it’s fair to finally write a review. Gintama at its best is a masterclass of the genre. It blends shonen\
        \ and comedy seamlessly. HOWEVER at its worst it is simply unfunny toilet humor. It can be widely unfunny at times,\
        \ as well as outdated. That being said, it has such a wide cast of characters that are so strong it is hard to get\
        \ bored. When Gintama decides to finally get “serious” it does it well. Some of the shonen arcs areworth the watch\
        \ themselves. (Yoshiwara in flames arc perhapssss???)\n\nI usually always skip openings but never for this show! (OP\
        \ 7 is my favorite)  \n\nYou grow to love all the characters on screen. It’s such a wide and diverse cast of characters\
        \ that you start to develop the disease one piece fans have where you “feel a part of their journey”. The serious\
        \ arcs work because they are built on such a strong foundation. Even characters you expect to disappear show back\
        \ up regularly later.( Catherine and Tama being good examples) \n\nWould I recommend it to someone? Ehhhhh depends.\
        \ I have trouble recommending a show of this length with a decent amount of “ok” episodes. The ensemble cast and episodic\
        \ nature make it easy to pick up and put down if you have the time. I mean it took me a year and a half to finish\
        \ just this so… I never felt the need to drop the show at any point despite its length. It is also very faithful to\
        \ its source material and any filler is normally pretty funny.\n\nSimilar to a lot of other comedy anime it relies\
        \ VERY heavily on Japanese language and culture to understand a lot of the jokes so any sub viewers will automatically\
        \ lose out a bit.\n\nIf you are a fan of meta humor and shonen and you don’t mind it’s length, you will probably like\
        \ Gintama. I won’t deny its flaws or argue with the fact that it can be drawn out. Overall though, I really enjoyed\
        \ it and grew to love the show and time spent with it. I’ll probably carry it with me for a while. It accomplishes\
        \ what it wants to well!\n\nOk bye"
