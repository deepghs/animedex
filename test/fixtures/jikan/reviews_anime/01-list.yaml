      review: "I loved watching this movie. I was drawn in by the character designs and fantasy world and was given a captivating\
        \ story to accompany those. The themes can be felt by anyone and pull at the heart strings about the struggles that\
        \ we all experience throughout our lives. Story: The overall story is one of personal growth and learning how to be\
        \ a parent. It shows the struggles of a mother and how she adapts to the initial upheaval in her life and deals with\
        \ the transition as she is thrown into a new environment with difficult life choices and needing to learn how to raisea\
        \ child. It's heart warming at times and painful at others. It shows the struggles of life in a way that resonated\
        \ with me and I felt completely satisfied at the conclusion.\n\nCharacters: The characters were realistic, wonderful,\
        \ and flawed in believable ways. As you watch the characters age their behavior changes appropriately and understandably.\
        \ The motives of the characters are easily understood. Their feelings are conveyed through heart felt scenes that\
        \ anyone can relate to.\n\nArtwork: I loved the character designs. The Final Fantasy Tactics character designer laid\
        \ the groundwork for a beautiful cast of characters and wardrobes. The backgrounds are phenomenal and awe inspiring.\
        \ I loved the big city the giant wheels and smoke stacks.\n\nSound: The sound track was amazing and fit the mood and\
        \ setting perfectly. \n\nI wish some of the scenes had been a bit longer, specifically when transitioning between\
        \ points in time so we could further reflect on the changing circumstances. This is now one of my favorite anime movies."
