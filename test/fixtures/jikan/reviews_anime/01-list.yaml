        Give Me One More Day Didn't exactly wow me as much as I hoped it would, but it's still a very enjoyable watch just for the visuals and music alone. I still haven't read the novel this movie is based off of, so I'm measuring its worth against the other adaptation of the same book, Edge of Tomorrow. Between this and Edge of Tomorrow, I'd definitely take Edge of Tomorrow. EOT (Not writing allat again and again) was able to make all the side characters both interesting and likeable enough for me to care about, while also going much more indepth with the biology of the aliens.Meanwhile, this movie has Rita and Keiji take center stage only and the other side characters exist just to exist.

        I don't hate Rita or Keiji, but their dynamic did feel rushed and it's a shame because the roots were planted very well for something bigger to happen between them. The relationship between the MCs in EOT was able to be fully realized thanks to the much lengthier runtime and devotion to that dynamic as early as possible. The short runtime of this movie doesn't help it at all, like most movies I've seen with that short of a runtime, unfortunately. It kills setup that should've been there for more development to occur.

        To end it off, I think this is a good directorial debut movie. It has a lot of passion and care put into it to be an enjoyable movie. Seeing as how one of the director's favorite movies is Terminator 2, it kind of explains some of the choices made here. The inspirations and love for the craft are open for all to see, and I find that commendable and inspiring. I'm hopeful that the next movie this director works on will be able to surpass this one in many ways.
