        \ written by Chiaki Konaka, but existentialism and gloominess are not excuses to justify one of the most disturbing\
        \ clunkers this medium has ever seen. Malice@Doll is basically oppressive hentai with a story. It may not show any\
        \ actual nudity, but it has tentacle rape (set to a quote of Brahms 4) and other explicit acts, which do not push\
        \ the story forward here and exist purely for shock value. Furthermore, the sex scenes put the OVA at odds with its\
        \ own story about the trauma of sexualexploitation and dehumanization. What is the purpose of the tentacle rape scene\
        \ aside from titillation and shock value? Why is there a scene showing off every inch of Malice's body? Why am I supposed\
        \ to take the series' message about exploitation seriously when it's willing to engage in such exploitation for no\
        \ benefit to the plot? I guess the ending is cool, but that's old hat in so, so many anime, as are robots becoming\
        \ sentient, excessive gore, and women escaping from an exploitative society. \n\nWhenever I see a video essay talking\
        \ about how great this anime is, all I can think is \"Really? That tentacle rape sex robot anime?\", because that's\
        \ all this is. Any perceived depth is average for anime and otherwise completely invented by the overthinking audience.\n\
