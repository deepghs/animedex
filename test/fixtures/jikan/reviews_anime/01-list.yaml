      review: "This anime is an absolute treasure. It really got slept on while airing. This is one of those \"I took in the\
        \ kid I wasn't ready for and they changed me\" shows, but it's a lot more mature in the way it addresses the subject\
        \ matter. It doesn't sugar coat, it doesn't condescend, and it doesn't mind if not everyone can relate. You have a\
        \ freshly orphaned girl, her autistic aunt who basically tells her \"Hey kid I don't really give a shit about you,\
        \ but the rest of your family is even worse, at least I can give you a life with the illusion oflove in it.\"but in\
        \ way nicer words. \n\nThe girl is just entering high school, and the hot aunt is a kinda goblin-ish borderline shut\
        \ in and successful author, who regularly goes full autism writing for hours and neglects her own needs. \n\nThe stuff\
        \ about family dying his really hard if you've experienced it. It's way too real. I cried damn near every other episode\n\
        \nThe aunt does her best to be emotionally supportive by giving the kid advice that's more grounded in reality rather\
        \ than just feeding her platitudes. And sometimes it's bitter medicine. \n\nCan not recommend this enough."
