      review: "The first thing that came to mind as I finished the show was just, what a waste. Comparable to the general\
        \ opinion about Game of Thrones probably. Right from the first episode there is an undercurrent of deeper feelings\
        \ and ideas being woven into the narrative. The mysteries and plot twists themselves are peak, but the characters,\
        \ their emotions, and the overall concept of feelings make it a lot more complete. The thing that made me think it's\
        \ a waste was not my time spent on watching the show, but it's ending. It had so much potential, the world, it's characters,\
        \ the story, every ingredient availableto make the perfect delicacy and they just burnt everything by the end. \n\
        The first 6 episodes are peak after peak after peak. Story is compelling, the characters are deeply emotional and\
        \ make you want to watch them, the sound team is insane, and the overall visuals nd production value are probably\
        \ some of the best. \nThen come the last two episodes. The entire story is reduced to be around atom, none of its\
        \ deeper themes are truly fleshed out or given vaid conclusions. It ends like a hurriedly packed suitcase where you\
        \ just stuff classics and basic themes and hope that its enough. \nI've cried while watching this and yet feel like\
        \ eating it above a 7.5/10 would be a crime."
      score: 7
