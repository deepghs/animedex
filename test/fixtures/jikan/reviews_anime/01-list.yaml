      review: "The you that’s in yourself is less a reflection of the Ego than the you that exists in others, that is to say,\
        \ the idea of you that others cultivate is more accurate than your view of yourself. And now in the internet age,\
        \ as we adopt myriad identities across the web, the various versions of ourselves that others hold become increasingly\
        \ disparate, and the chasm between our perceptions of ourselves and our actual selves grows ever wider. Or so I think\
        \ this series is saying. Avant-garde, groundbreaking, and quintessentially postmodern, both in its message and approach\
        \ to storytelling, Serial Experiments Lain is a revolutionarynear-masterpiece and a must-watch anime.\n\nVisuals:\
        \ The visuals are beyond reproach, with some of the most intentional composition, striking color, and agonized detail\
        \ I have seen from any series to date. The shadows are blanketed with patterns of otherworldly lights, and the bright\
        \ spots are oversaturated to a disorienting, blinding white. The powerlines stand stark against the sky, the transformers\
        \ buzz with the presence of God, and the technology and computers are exquisitely rendered. This is a series that\
        \ recognizes it is animated and is more than willing to utilize its medium. \n\nSound: The sound design and score\
        \ keep up with the visuals, the ever-buzzing wires, the soft hum of computers, the trundling of train cars; the world\
        \ is alive even while little action is happening. The series has hardly any music, but when it does incorporate its\
        \ soundtrack, it does so masterfully. The screaming guitar or thumping club music that occasionally grace the series\
        \ is potent and attention-grabbing.\n\nPacing and Plot: It is difficult to explain the plot without spoiling the series,\
        \ but in short, a girl becomes aware that the lines between the physical and digital worlds are beginning to blur,\
        \ and she is at the center of this merge. Armed with this knowledge and a computer chip that effectively allows telepathic\
        \ access to the net, she must fight against shadowy corporations, a would-be god, and fragments of herself to choose\
        \ humanity’s destiny. Which, to be fair, might be a bit much for thirteen episodes, especially with how cerebral the\
        \ series is. The aforementioned visual brilliance of the series does muddy the plot a bit, and with how much time\
        \ you spend figuring out what’s happening now, you lose track of what's happening more holistically. The series is\
        \ attention-grabbing, thoroughly gripping, and occasionally impossible to follow. While I appreciate having something\
        \ to chew on while I watch TV, this show gives a bit too much food for thought. And a final, major gripe with the\
        \ story of the show: the ending is awful; singlehandedly, what stopped me from giving the series a ten. Nonsensical,\
        \ ex machina, and feel-good just to feel-good, the payoff is not there. I can’t say much without major spoilers, but\
        \ prepare to be confused and disappointed for the last ten or fifteen minutes.\n\nCharacters: The main character,\
        \ Lain, is nearly mute, uttering only a few scant lines an episode, but despite not knowing exactly what she’s thinking,\
        \ the audio cues and visuals are generally enough to show where she’s at emotionally, leaving the audience to experience\
        \ the series with her, not through her; we have to come to our own conclusions about her drives and motives. Outside\
        \ of Lain herself, however, the supporting cast often feels slightly bland, archetypal, or like one-trick ponies;\
        \ they are merely there to fill their roles and exit the stage. But that is what the show wants from them, to act\
        \ as stand-ins for a certain type of person and how they might respond to the universe of the show’s apocalyptic predicament.\
        \ So the characters are a bit of a toss-up. If you’re engaged by the show’s themes and interested in what it has to\
        \ say, you won’t mind them, but if you’re here for diversion, you’ll be sorely disappointed. \n\nConclusion: Though\
        \ the series is far from perfect, its aggressive focus on theme and substance, as well as its revolutionary and singular\
        \ style, make it a memorable and genre-defining experience that’s well worth a watch. A non-stop mindfuck that will\
        \ have you stopping every episode to try to piece together what just happened, before inevitably diving right back\
        \ in for more."
