      content: (This is more so for the Madoka Magica series in general) If you liked the concept of witches and their domains
        then these are perfect for you! The characters in "The Perks of Being an S-Class Heroine" are just as weird but also
        terrifying as madoka magica's. It's where the witches/dungeon monsters feel like they're actual threats throughout.
        (Though a lot look more human in "The Perks of Being an S-Class Heroine") Both series contain a main character going
        through multiple time loops having a goal to save the world/someone they know but with the idea that maybe it'll never
        end. The main villain is also a huge twist if you don't know who it is at the start of the series. Just a lot of simialr
        aspects in both series where I feel like I can recommend it very easily if you liked one series
