        title: Shin Violence Jack
      content: The art style of the new Violence Jack is very obviously inspired by Berserk and reaches similar heights. The
        monsters look the same. It honestly looks like Miura drew many of those monsters and the castle himself at times.
        It features similar mature themes and it has gone full circle. The original version of Jack helped inspire Guts and
        this version is clearly inspired by Guts. I think most Berserk fans will enjoy this.
