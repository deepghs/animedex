      synopsis: "In the year 2048, Dr. Deniz Skinner, a scientific genius dubbed second only to Einstein, developed the revolutionary\
        \ painkiller Hapna. Being cheap with no reported side effects, the drug gained widespread acceptance, even though\
        \ Skinner himself silently vanished one year after launching the drug. Everyone revelled in the heaven of relief and\
        \ ecstasy provided by Hapna, but they would suddenly come crashing down to Earth. It is now 2052, and Skinner reappears,\
        \ giving the shocking announcement that Hapna was designed to mutate into a lethal toxin, killing anyone who had consumed\
        \ it. While he claims to have a cure, he will only hand it over if he is physically found within 30 days. \n\nAxel\
        \ Gilberto, a maverick youngster serving a sentence of 888 years in a high-security prison, is unwillingly recruited\
        \ by a group calling themselves Lazarus. Composed of eccentric misfits, the group has only one task—to find Skinner.\
        \ With no means to escape and their lives on the line, Lazarus begins the hunt to find Skinner before the countdown\
        \ to the end of humanity ends.\n\n[Written by MAL Rewrite]"
