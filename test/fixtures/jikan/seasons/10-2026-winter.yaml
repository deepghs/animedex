      synopsis: |-
        Seeking the key to the elixir of immortality, the group arrives at the fortress of the island's monstrous ruler, the "Tensen." To survive and escape the island, cooperation becomes essential—regardless of whether one is a condemned criminal or an executioner.

        Meanwhile, the shogunate orders additional landings on the island of the Immortal Realm, led by Shugen Yamada Asayemon. Among them are the Ishigakure clan, who share a past with Gabimaru.

