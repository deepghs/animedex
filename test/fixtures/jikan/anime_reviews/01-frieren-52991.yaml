      review: "(Originally uploaded March 31st, 2024) To spare you the time, Frieren is far from what so many others are saying\
        \ it is. While most see a masterclass in character writing and worldbuilding, I see a hollow and generic fantasy anime\
        \ that is filled to the brim with tropes. Let’s break down how Frieren falls into almost every single cliche that\
        \ every other fantasy anime falls into. What was most apparent and annoying to me about Frieren was how its world\
        \ did not feel organic whatsoever. Frieren’s world, like most fantasy anime’s of the modern age, feels like a video\
        \ game world. There are dungeons that need tobe explored, mana levels depending on how long you have trained, and\
        \ monsters evaporate into smoke when defeated. Frieren and her party of heroes happen to always stumble upon the right\
        \ people who know exactly what they’re looking for. There’s a level of luck that fictional characters can have due\
        \ to the nature of storytelling and needing a story to progress, but Frieren does it too much too often. There’s also\
        \ a trend where Frieren happens to run into a lot of people or locations she came across in her past. This only makes\
        \ the world of Frieren seem smaller, not larger. The locations they come across aren’t interesting either, with a\
        \ majority of locations being either forests or the small looking medieval styled towns you see in every fantasy anime.\
        \ \n\nAs for the magic system in the show, while not terrible, it isn’t anything to write home about. It doesn’t help\
        \ that the leads of the show use the most generic magic in their world simply because it is more effective. We never\
        \ get to see more than a bunch of streaky white lines being shot around until much later into the show, when much\
        \ more interesting magic is able to be used by other characters. I do find it interesting how the show establishes\
        \ a history of magic and we learn how it has changed over time and understand how it works in the period the show\
        \ takes place. Of course the leads of Frieren and Fern never once stop using the most generic attacks and so we are\
        \ forced to watch the same boring magic fights over and over again.\n\nOn the topic of Frieren and Fern, why don’t\
        \ we talk about our two main characters. While I can say Frieren and Fern are well defined characters, I cannot say\
        \ they are interesting ones. You can definitely attribute a wide variety of character traits to both of them, but\
        \ they don’t make for interesting leads. Frieren and Fern don’t show emotion much, and while this is likely intentional\
        \ narratively as Frieren was uninterested in human emotion for most of her life and her mannerisms likely rubbed off\
        \ on Fern, the dialogue between the two is very stiff and lifeless. Scenes where Frieren and Fern are talking always\
        \ consist of the most blank expressions and the coldest most lifeless voices you can imagine. The characters are presented\
        \ in such an uninteresting way as to become tiresome after a while. The facial features of the characters are much\
        \ smaller compared to other anime, which makes it even harder to depict emotions on their facesI was glad by the time\
        \ Stark joined them, considering he gave some life to the cold and mundane dialogue between Frieren and Fern. \n\n\
        This isn’t getting into the fact that Frieren and Fern are also pretty much the most powerful mages in their world.\
        \ Frieren was part of the party who defeated the Demon King, something we know right from episode one. Once we know\
        \ this, there is absolutely no sense of danger that we as an audience can feel for her as she has already defeated\
        \ the most powerful creature in existence. This remains true for the entire show, where the only time Frieren gets\
        \ damaged whatsoever is when she is cut in THE FINAL EPISODE, and she doesn’t even react to it. Frieren is an overpowered\
        \ protagonist, just like a majority of fantasy anime protagonists. Any danger we would be able to feel for the side\
        \ characters is completely undermined by healing magic as well. In fact, in the entire show, not a single named character\
        \ is killed, other than the villains. \n\nThe side characters aren’t much better than our leads, with them either\
        \ having a single trait that completely defines the character, or having no traits and being the most bland and forgettable\
        \ person ever. Stark is probably the most interesting out of them considering he gets the most screen time, however\
        \ he still doesn’t get nearly enough characterization. His childish scuffles with Fern also make it very apparent\
        \ that this show is in fact a shounen geared towards younger teens. The plot, worldbuilding, character motivations\
        \ are all explained to you by the characters of the show, leaving no room for nuance. There’s nothing to interpret\
        \ when everything is so hamfisted and shoved down your throat. In Stark’s case, he is often the one asking questions\
        \ to Frieren and Fern about what is happening in the plot, so his screen time is mostly utilized to start exposition\
        \ dumps from other characters.\n\nI won’t go into detail about the other characters in the show, mostly because there\
        \ are too many to go over. Another trend you see with modern anime is having huge rosters of characters in the hope\
        \ that the viewer will be able to latch onto even a single one in order to get them to continue watching. Having such\
        \ a huge roster of characters means that each one has less time to be characterized. I am struggling to remember most\
        \ of the side characters outside of the last arc of the show despite having started it less than a week ago because\
        \ they simply left no impression on me. \n\nAs for the storytelling on display in Frieren, it’s pretty bad. Most episodes\
        \ have a set cycle to them, with it starting with the party coming across a new town. They then meet a character from\
        \ Frieren’s past or someone new who says something that reminds Frieren about her past. We get a boring flashback\
        \ scene during every one of these situations and Frieren comes to a realization about her past with her old friends.\
        \ Despite this, Frieren as a character remains stagnant throughout the entire show, not changing whatsoever from the\
        \ first episode. This is mostly the same for Fern and Stark aside from before they join up with Frieren at the beginning\
        \ of the show. Any development they get after that point however is always told through flashbacks. The same goes\
        \ with side characters. Development of the characters can only happen through flashbacks apparently.\n\nOnce you know\
        \ about the cycle the show goes through each episode, the anime gets extremely boring, with only the visuals helping\
        \ to not make you fall asleep. Studio Madhouse animated the show and did a great job, with even boring dialogue scenes\
        \ getting plenty of attention. The direction of the visuals are less than stellar, however. I already talked about\
        \ how the main characters are always lifeless and how the settings always look the same. With good direction even\
        \ these could have been remedied. We never get many interesting looking visuals outside of the action sequences, and\
        \ even those are few and far between.\n\nPerhaps the most unbearable part of Frieren (and most anime in that manner)\
        \ is the humor. If you have seen 5 anime then you already know the punchlines to every joke in Frieren. I do not understand\
        \ how people find anything here funny. Frieren getting stuck in a fake chest is not funny, and is especially not funny\
        \ after the 10th time you see it. I have also seen people comment on how there’s no fanservice in the show, and while\
        \ that is true, there are still jokes about characters' boobs in the show, how mature. \n\nTo end this all off, I\
        \ would like to mention how Frieren has similarities to Violet Evergarden and Vivy: Fluorite Eye’s Song. In all three\
        \ of these shows, we have a female lead who is deadpan and is unable to show any emotion. All three of these leads\
        \ go on a journey to finally understand human emotion, or at least I’d like to say that because Frieren remains stagnant\
        \ throughout the entire show. At least Violet Evergarden and Vivy have interesting worlds that were created for them.\
        \ As to why Frieren is much more critically acclaimed than these already critically acclaimed anime that are similar,\
        \ I have no idea.\n\nQuite simply, Frieren is one of the most overrated anime in my eyes. While many see it as a masterclass\
        \ of storytelling and animation, I see it as a hollow shell of an anime relying solely on its visual presentation\
        \ to carry its middling story and characters. Despite some great animation, Frieren was a slog to get through."
