      review: "Frieren is an anime that I’ve been meaning to review for months, but I wanted to wait just a little bit for\
        \ the emotions and hype to settle down. There’s a LOT to discuss when it comes to Frieren, but not all of it directly\
        \ has to do with the anime itself. Firstly, I’m reviewing this on MAL and that means by necessity that I must address\
        \ the elephant in the room. Frieren accomplished the unthinkable in unseating Full Metal Alchemist Brotherhood from\
        \ its highly controversial 15-year reign. Why was it controversial? Vote brigading my friends. It was artificially\
        \ kept at number 1 by ahighly obsessive faction of MAL users and…it’s a long story. \n\nThe first thing you need to\
        \ know about MAL is that this site and its user base have always been incredibly image conscious to an obsessive and\
        \ often downright comical degree. While MAL is Japanese owned, the early MAL userbase was overwhelmingly Americans\
        \ and a lot of MAL’s culture was shaped by the perception of anime and anime fans in the United States in the 2000s.\
        \ MAL users existed largely in isolation from the “offline anime community”. The people you meet at your local comic\
        \ book shop buying battle shonen manga and monster girl ecchi or cosplaying at your local anime convention. In contrast,\
        \ MAL has always aligned itself with the “Elitist” faction of the anime fandom who define themselves as the antithesis\
        \ of the “weaboos” who formed the image of the Western anime fandom back in the 2000s. The weaboos were constantly\
        \ getting dunked on back then and were widely perceived as pervy, horny, stupid, immature, manchildren. MAL users\
        \ followed the lead of the European anime community on 4chan /a/ and desperately wished to be seen as well-cultured,\
        \ sophisticated intellectuals who only appreciate a select few anime that have artistic value. With this kind of attitude\
        \ and site culture being enforced, it was no surprise that Galactic Heroes rose to the top of early MAL. However,\
        \ there was a problem. For there was another anime that began with a G. While the Americans and Europeans on early\
        \ MAL would have been happy with Galactic Heroes staying on top, Japan and for some reason a huge chunk of the developing\
        \ world happen to really, REALLY like a certain series called Gintama, which is famous for its irreverent, highly\
        \ referential humor. The image obsessed elitists would be God Damned if they allowed “Japanese Family Guy” to become\
        \ the highest rated anime on the site, so the first massive rating bombing and Great Fandom War began. This war threatened\
        \ to tear MAL apart, but a new faction was forged in the fires of war: The Order of Brotherhood. A loosely organized\
        \ group of MAL users decided in the forums that a 3rd anime should be deliberately upvoted to number 1 to keep both\
        \ Galactic Heroes and Gintama from that spot. This anime should be a largely neutral, inoffensive work that presents\
        \ a respectable face for the anime community but is still accessible and isn’t snobby enough to chase people away.\
        \ The popular shonen Full Metal Alchemist Brotherhood was chosen for this role. It would be like The Shawshank Redemption\
        \ on old ass IMDB. It’s a peacekeeper title everyone basically at least likes. However, the Order of Brotherhood began\
        \ to abuse their powers. Every single time a new anime briefly gained the number 1 spot, it was absolutely bombarded\
        \ by 1 and 2 ratings until it was no longer a threat for the top spot. For 15 long years this happened. It got to\
        \ be such a well-known meme that a youtuber asked his followers to get Interspecies Reviewers to number 1 just to\
        \ mess with these guys and MAL had to completely change how it calculates ratings and how many anime you must watch\
        \ before your opinion even counts. I think it’s at least 50 now. Throughout all this time, The Brotherhood firmly\
        \ believed that they were keeping the peace and instilling order. Despite all their efforts, the downfall of the Brotherhood\
        \ was inevitable simply because time doesn’t stop. While anime popularity in the US was in sharp decline in 2009,\
        \ this is no longer the case in 2024. For most of the world, anime has never been more mainstream. Anime certainly\
        \ still has a bit of a stigma in more rural parts of the US, but the image of the typical anime fan is no longer homogenous.\
        \ A person’s first mental image of “anime fan” is just as likely to conjure up a famous athlete, rapper, or social\
        \ media personality as it is the images in Filthy Frank’s “Weaboo Song”. If the anime fandom doesn’t have a huge image\
        \ problem, there is no need for self-loathing, hyper self-conscious anime fans to gatekeep everything and bully others\
        \ to try preventing the entire community from being bullied. Another factor is that the percentage of active MAL users\
        \ who are American has dropped substantially over the last 15 years. The Brotherhood was and still is overwhelmingly\
        \ composed of American users obsessed with image and “elitist vs weaboo” bullshit from a million years ago that doesn’t\
        \ even apply to the anime experience and history of countries like India, Pakistan, Egypt, Turkey, China, Indonesia,\
        \ etc. Random anime like Oshi no Ko were sneaking to number 1 more and more often and the effort it took to ratings\
        \ nuke these newcomers back out of the top 50 kept increasing. Frieren just happened to be the straw that broke the\
        \ camel’s back. \n\nSo…is Frieren actually the best anime of all time? Personally, I would say no. Not even close.\
        \ However, there is some substance behind the hype. There is a reason the Frieren was able to unite the terminally\
        \ online with offline casuals, liberals with conservatives, male viewers and female viewers, and Japanese otaku with\
        \ the rest of the world. Frieren has many aspects that it does remarkably well. Before we even talk about the characters\
        \ and plot and all that stuff, let’s look at some of the technical aspects. Frieren is a GORGEOUS anime that represents\
        \ a triumphant return for Studio Madhouse as the king of quality anime. A title which had been slipping from them\
        \ over the last few years. Frieren is also the 2nd mega hit in a row for young director Keiichirou Saitoh following\
        \ up on his incredibly well received debut: Bocchi the Rock. He is only 31 years old and is now one of the most in-demand\
        \ directors in the entire anime industry! Every scene in Frieren is not only visually appealing and directed in a\
        \ way that squeezes every bit of emotion it can get from the source material, but it also has the confidence to pace\
        \ itself as if it’s going to run for 6 seasons. Even though that’s far from guaranteed in the anime industry. Fortunately\
        \ for Frieren, its Japanese merchandise and figurine sales are quite strong and further seasons seem like a safe bet.\
        \ It is always tragic when you get a Promised Neverland situation where the director poured their heart out and they\
        \ either get cut off completely or given WAY too few episodes to wrap up the story all because Japanese consumers\
        \ didn’t buy enough dakimakura and didn’t care as much as the gaijin so the studio fucks it over! Frieren’s soundtrack\
        \ was outsourced to an American composer named Evan Call and it sounds much closer to a Hollywood mega film than a\
        \ shonen anime. Have you ever actually bought an anime soundtrack? There’s the main theme, the battle theme, and a\
        \ few main character themes that you can instantly recognize and are REALLY good compositions. Then you get to the\
        \ comic relief scenes and it’s like listening to a cat walking on a synthesizer and farting up a storm. Kaoru Wada\
        \ is especially guilty of this. The Inuyasha soundtrack for example has some BEAUTIFUL tracks and then some of the\
        \ worst auditory vomit you’ve ever heard in your fucking life. The vast majority of anime soundtracks have always\
        \ been like this. There are one in a million exceptions like Cowboy Bebop, but music was a major theme of that anime.\
        \ You’re not going to get a seasonal fantasy anime where the OST sounds like the LOTR movies and every single track\
        \ in every single scene is good. However, Frieren is actually able to accomplish just that!\n\nSo Frieren is gorgeous,\
        \ has an amazing OST, and is super well directed. So what? How is the world building? This is a shonen that deals\
        \ with magic, so how is the magic system? This is once again an area where Frieren triumphs. Frieren is very happy\
        \ to take a pause and explain minor aspects of its world and history but never in a way that bores the viewer. It\
        \ gives enough details to keep us engaged but there is still a LOT that we want to learn. As for the battle system,\
        \ some characters in Frieren have a higher base level of mana and can cast bigger and flashier spells, but it avoids\
        \ the vertical power scaling pitfalls of previous shonen titles. Frieren is very strong, but she’s not invincible.\
        \ Someone with a lower level of overall mana but the right spell at the right time could easily kill Frieren. This\
        \ isn’t a series where strategy just goes out the window and it’s all about who has a bigger number. Frieren also\
        \ manages to avoid one of the huge traps of bad fantasy writing where one spell is SO much better than anything else,\
        \ that it ruins the magic system and makes everything else essentially irrelevant, so all battles end up looking the\
        \ exact same. Stuff like fireball in the original D&amp;D, Balefire in Wheel of Time or the Avada Kedavra in Harry\
        \ Potter. Frieren actually pokes fun at this while adding to its own recurring theme about the passage of time. You\
        \ have this super arrogant demon who has been frozen in stone for 50 years. He developed this killing curse that’s\
        \ similar in essence to the Avada and he absolutely decimated the wizard population of 50 years ago so temporarily\
        \ sealing him was the best they could do. He gets utterly humbled by an apprentice mage because his world beating\
        \ spell became the new standard by which all offensive magic is judged and all defensive magic was developed against,\
        \ so after 50 years it’s very average instead of remarkable. This tends to be how real-life weapon advances work and\
        \ describes the relationship between armor and weapons development. \n\nIn terms of characters, Frieren once again\
        \ does a good job. The anime hops back and forth through time between the current day, Frieren’s adventure party from\
        \ over 50 years ago, and Frieren’s time with her teacher around 1000 years ago. In each time period, we see little\
        \ ways in which Frieren has developed as a character and been impacted by those around her that she grows to care\
        \ about. While Frieren gets the most development and character investment, Fern, Stark, and others are also allowed\
        \ plenty of room to grow. Having said this, Frieren is still a shonen and once you reach the first tournament arc…yes\
        \ course there’s a fucking tournament arc…you do get some characters that are less impressive. For example, we get\
        \ this grumpy, middle aged bastard named Richter who not only is willing to kill 2 teenage girls to pass his wizard\
        \ exam, but he goes out of his way against the orders of his superior to try do so and seems to revel in it. Then\
        \ this sadistic and murderous aspect of his personality is just kind of dropped and is never mentioned again. Another\
        \ wizard is a murderous psychopath, but this is largely played off as a joke and her personality never really evolves\
        \ much beyond “lol, what a psycho bitch!” The demons are also kind of boring and shitty antagonists, but they’ll get\
        \ their paragraph later. Don’t you worry!\n\nFrieren is a shonen in terms of its core demographic and it uses several\
        \ of the familiar trappings of popular shonen manga, but also a deliberately slower pacing in order to place just\
        \ as much focus on its themes as it places on kickass fights. Frieren at the end of the day is a series about mortality\
        \ and the bonds we form with other people. Even if we’re not immortal like Frieren, we all know a grandparent, a friend,\
        \ or someone else who passed away and we would do anything to have spent more time with that person. We care deeply\
        \ about the people that we love and recognize on an intellectual level that we only have a very finite, precious time\
        \ to spend with those people, yet it’s still so easy to take our time on Earth for granted and neglect our personal\
        \ relationships. Frieren captures a fundamental human struggle that’s both universal and powerful. When it’s at its\
        \ best, Frieren is an emotionally moving series that inspires us to live our lives better and not shut ourselves in.\
        \ \n\nSadly, we must now talk about the other controversy surrounding Frieren besides its unusually high MAL score.\
        \ This controversy surrounds the demon race, who are the primary antagonists of the series. Frieren needed some kind\
        \ of external conflict to add danger and keep things from getting too boring. So, the writer of the Frieren manga\
        \ took the easy route and created a generically evil fantasy race that wants to wipe out or enslave all the other\
        \ sentient species and must be stopped at all costs. However, this evil species isn’t like the goblins from Goblin\
        \ Slayer. Those little bastards are a semi-sentient walking virus who can’t even naturally reproduce on their own\
        \ without raping the females of other species and murdering the male population. They are simply a fantasy disease.\
        \ Frieren’s demon race are a civilized, intelligent, fully sentient race who are simply evil and must we wiped out.\
        \ Who cares? They’re literally demons, right? Well…sort of.  They’re not demons in a Christian sense. They’re a naturally\
        \ occurring, sentient species of humanoids with a slightly higher base level of magic who all just happen to be jerks\
        \ and normal humans refer to them as demons. Unlike Warhammer demons and other Christian inspired demons, they don’t\
        \ literally come from Hell. If you kill a Frieren demon, they die permanently with no afterlife. If you kill a Warhammer\
        \ demon or any Christian inspired demon, they just kind of go back to Hell. The demons in Frieren have no interest\
        \ in corrupting Humanity or deceiving humans into doing horrible things. They trick other species like Elves, humans,\
        \ and dwarves into feeling sorry for them or giving them a chance before immediately betraying and kill them. Then\
        \ the demons cry crocodile tears when they finally get what they deserve. The concept of an innately evil species\
        \ that needs to be wiped out is one that fantasy has largely been trying to leave behind for about 40 years now. Tolkien\
        \ is sometimes credited as the architect of this trope, but with him it comes from a very different place. Tolkien’s\
        \ writing is always heavily influenced by his devout Catholicism. The orcs, trolls, and Easterlings aren’t evil because\
        \ God made them that way. The God of Tolkien’s universe known as Eru Iluvatar didn’t create any being specifically\
        \ to be evil, let alone an entire species. Tolkien’s equivalent of the Devil was jealous of God’s creations, so he\
        \ took stuff that Iluvatar created and made his own warped mockeries of those things. However, even the Orcs in Tolkien’s\
        \ belief are not entirely beyond redemption since they still retain the gift of language, which shows that part of\
        \ their original souls are intact. Frieren is entirely secular in its morality and advocates a genocidal solution\
        \ purely based on what seems to be rational. \n\n“There are no women and children. Get it through your head. These\
        \ are mere animals who imitate human forms. They convince the whole world to feel sorry for them and each and every\
        \ time it’s just a trick so they can attack us again the moment our guard is down. The solution is obvious. We should\
        \ just kill them all!”\n\nWhile this quote is very close to one spoken by our favorite Elf Waifu, a quote that the\
        \ series does EVERYTHING to perfectly validate her on, this isn’t actually a Frieren quote. This is a quote from some\
        \ random old lady that got interviewed by CNN last month. The language that Frieren uses casually and without much\
        \ thought by the mangaka is used almost word for word to advocate genocide in real life. It’s not just bad timing\
        \ and bad luck that Frieren was released when it was. There is no time period where this aspect of the series’ writing\
        \ would have been praiseworthy. Frieren in regards to this sub-plot engages in writing so lazy and so regressive that\
        \ it stumbles into uncomfortable territory. Imagine for a second if you would that some political party in some country\
        \ was actively planning a campaign of genocide or ethnic cleansing. However, they know that such actions are no longer\
        \ seen as acceptable in any circumstances by an overwhelming margin of society. So…they decided to finance an addictive\
        \ and popular show that (while not being the focus of course) subtly promotes genocide in a rational light and tries\
        \ to shift the thinking of young audiences. This isn’t what happened of course, I already said that Frieren’s case\
        \ is one of criminal laziness. However, that show would look EXACTLY like Frieren and that’s not a good thing.\n\n\
        Overall, I’m giving this series an 8 for now…but it would be more accurate that I’m giving it an I for Incomplete.\
        \ I think Frieren promises to be a strong franchise and has all the potential in the world if it can avoid shooting\
        \ itself in the foot. However, I wouldn’t have written that lengthy previous paragraph if Frieren was safe from monumental\
        \ errors of judgment. The series could very well turn out to be a disaster that I will be embarrassed that I ever\
        \ enjoyed. Or it could be absolutely amazing, and we will all just kind of forget some of the less ideal aspects of\
        \ S1. The future of Frieren has not yet been written. Most of my offline buddies haven’t seen Frieren and don’t want\
        \ to watch Frieren. To be honest, I’ll probably hold off shoving it down their throats until I get a better grasp\
        \ on which way this franchise is headed."
