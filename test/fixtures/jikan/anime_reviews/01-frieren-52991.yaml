      review: "This is got to be the most overrated thing i have ever seen. Not just MAL but other forums are also going crazy\
        \ over this for no good reason. I bet most people who were disappointed with this show was due to this hype. I was.\
        \ Firstly Frieren does have good ost and great animation. The concept is also new compared to isekai and generic shounen.\
        \ It is fine on that front. It has some wholesome moments. All over the story is ok. BUT THAT IS IT. PERIOD. Characters\
        \ are OUTRIGHTLY BORING AND FLAT. There is absolutely nothing interesting about them, frieren is not a goodexample\
        \ of someone who has lived 1000+ years, fern and stark are the most generic characters ever, neither have an ounce\
        \ of complexity in them. Himmel and his party members are idealistic heroes. I remember someone bringing this up online,\
        \ and they were told oh the characters are not exaggerated like other anime characters. Forget exaggerated, characters\
        \ in this show do not even feel human. Humans in general have more range of emotions and are much more complex than\
        \ the cast of Frieren. I cannot even imagine how complex an elf should be, but here all of them are like a pre-programmed\
        \ robot. \n\nThen comes the world building. Some people actually say that this is next to JRR Tolkien. ARE YOU KIDDING\
        \ ME?? There can be no greater insult to LOTR than this. This show has picked the most used world building ever, which\
        \ btw Tolkien established. The hero, dark lord, elves, dwarves, pray tell me what is \"unique\" about this. People\
        \ are going on and on about the legend or masterpiece this show is. No it is not. The anime should at least try to\
        \ create its own world before trying to become a masterpiece. \n\nAll this hype is really wasted on this show. I feel\
        \ like as if people do not have good taste anymore, they do not understand the meaning of words legend or masterpiece.\
        \ They just want the most \"safe\" show, with nothing controversial, which does not require a lot of braincells to\
        \ understand it. You can just watch stuff like this and forget it next day. There is no depth, no complexity, no thrill\
        \ in Frieren. Its just a mid show which came at the right time. \n\nI love anime mostly for the innovation it brings,\
        \ the other shows which people call big 3 or masterpieces or previous number 1 FMAB (i am not a huge FMAB fan, so\
        \ its not like i am bitter about the ranking and writing this) have all put effort in world building and characters.\
        \ And to top it they have unique premise, great ost, animation and story. They might not be without flaws, but they\
        \ are popular for a reason. They are well balanced, while frieren is either mid or bad in everything. For me characters\
        \ and world building are very important. The story can be slow or take a direction fans might not like. I am ok with\
        \ all that and the author has the right to write what they want to. But i judge these two things strictly. If you\
        \ are like me, please do not waste your time like i did. Its a 5/10."
