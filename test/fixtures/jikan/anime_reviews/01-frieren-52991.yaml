      review: "Did not like. Felt like it was written by someone who has faked their way to top or only are there because\
        \ they specialize in character design or something. Story was horrible. Each episode was mind bogglingly boring and\
        \ bereft of meaning to the point I was questioning if this was written by a toddler. My time was utterly wasted. Other\
        \ than some cute looking characters and animation, this show had nothing to offer. It was so empty and parody-like\
        \ that I have no idea how it got the rating that it has. It is horrible in too many ways. Do not recommend. It willpiss\
        \ you off if you're looking for any depth in stories. \n\nFrom someone who's enjoyed MHA quite a lot for its quality\
        \ in creating compelling characters and a gripping plot line, I highly recommend you skip this one."
