      review: "Frieren has got to be the most overrated anime of all time on MAL. I'd like to make it clear that I do not\
        \ hate this anime by any means, but I just find it extremely boring to a point its almost unwatchable. Any adventure\
        \ or fantasy story has any objectives to complete or to follow, for example hunter x hunter we see that gon is adventuring\
        \ to find his dad, in FMAB we see that ed is trying to cure his brother. Although it's not a necessity, it's pretty\
        \ clear that it gives a backbone to a thrilling adventure/fantasy story. Frieren starts from wheremost fantasy/isekais\
        \ end which is the story after defeating the demon lord. But since it starts from an absurd point it lacks clear objectives\
        \ to accomplish or achieve. Frieren the main character who is an elf is just shown to be adventuring while tutoring\
        \ a student in magic. In hindsight, this is not the adventures of frieren but of her student who is also a relative\
        \ of a human who was previously in the hero's party with frieren that defeated the demon lord. Since the demon lord\
        \ has already been ended, its unclear as to why even fern (the student) wants to learn magic from the greatest mage\
        \ of all time.\n\nCombining the lack of goals or objectives, this show also fails at recognising itself as what it\
        \ is. Is it about the action considering the last few episodes which were full of it or the emotional slice of life\
        \ appeal which is shown in bits and pieces, also which everyone talks about. It fails to stand as both. \nThe action\
        \ is little to none atleast in the first half of the show, which already makes it a bad action show if it is one.\
        \ The last few eps which had the most action were considerably and arguably the worst arc to even exist. Let me explain\
        \ to you this worst arc that I am talking about:--\n\n(MINOR SPOILERS)\nSo in this arc as frieren and her two friends\
        \ fern and starc are adventuring, in desire of a somewhat GOAT title in magic, they are shown to be giving a test.\
        \ This is beyond any logic or sense since how can a previous literal hero who has defeated the demon lord mind you\
        \ be allowed to give such an exam and to fight to death with literal kids in an exam who are yet to even hit puberty?\
        \ Well even forgetting this as we begin the test, we got literal bunch of screen time for side characters who only\
        \ have existence for the sake of this arc. Literal episodes worth of screen time for the sake of nothingness. The\
        \ fight scenes were them just fighting non sensically with each other for the so called title.\n\n\nNow, the latter\
        \ which is the emotional slice of life appeal of this show, lets get to it. \nSo, first of all it is really really\
        \ important for us to note that Frieren is a literal elf. Elves lives for thousands of years and thus they do not\
        \ form any kinds of emotional bonds with any person, even if they do it doesn't affect them. Now frieren while adventuring\
        \ is shown to be remembering her time of when she was in the hero's party and how she regrets not enjoying those bits\
        \ and moments with her party members. Now this to give you any kind of emotional appeal is just plain absurdity. You\
        \ need to be extremely soft to even feel emotional with these scenes. Why do I say that? It's because we are only\
        \ shown bits and pieces of the past in the present! The way I see it for it to be well done is actually giving a decent\
        \ amount of screentime to the hero's party before the adventuring begins! If the audience is shown some good moments\
        \ beforehand, instead of some nonsensical 30 seconds of despair maybe it would be easier for them to actually feel\
        \ emotional. \n\nFrieren is actually also one of the most blandest written character of all time. She is arrogant\
        \ as hell and does not give a fuck, which you would expect from an elf. So how do you think that she is able to feel\
        \ more than 10 seconds of remorse for her long gone dead party members? It is a mystery just like the ratings of this\
        \ show. I do think that Frieren being a female protag added some biasedness to the overall judgement of this show\
        \ by the audience but at the end of the day, Frieren is an elf before being a female. And elves do not give a fuck,\
        \ neither are they capable of giving it. This story would have been 100x more entertaining if frieren would have just\
        \ called it a day after defeating the demon lord and decided to settle in the countryside just bing chilling. But\
        \ oh well then this anime would have been named \"Chilling in my 100s after resigning from the hero's party, I decided\
        \ to open a circus\".\n\nThis show is being spoken as some masterpiece, when in essence and reality it's just some\
        \ confused, muffled mumbo jumbo of the author which some recognised as \"wise words have never been spoken\" and it's\
        \ now giving the domino effect."
