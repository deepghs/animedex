      synopsis: "The spirited Boruto Uzumaki, son of Seventh Hokage Naruto, is a skilled ninja who possesses the same brashness\
        \ and passion his father once had. However, the constant absence of his father, who is busy with his Hokage duties,\
        \ puts a damper on Boruto's fire. Upon learning that his father will watch the aspiring ninjas who will participate\
        \ in the upcoming Chunin exams, Boruto is driven to prove to him that he is worthy of his attention. In order to do\
        \ so, he enlists the help of Naruto's childhood friend and rival, Sasuke Uchiha. \n\nThe Chunin exams begin and progress\
        \ smoothly, until suddenly, the Konohagakure is attacked by a new foe that threatens the long-standing peace of the\
        \ village. Now facing real danger, Naruto and his comrades must work together to protect the future of their cherished\
        \ home and defeat the evil that terrorizes their world. As this battle ensues, Boruto comes to realize the struggles\
        \ his father once experienced—and what it truly means to be a ninja.\n\n[Written by MAL Rewrite]"
      background: 'Boruto: Naruto the Movie is officially the highest grossing feature film in the entire Naruto franchise,
