      synopsis: |-
        Barely surviving in a barrel after passing through a terrible whirlpool at sea, carefree Monkey D. Luffy ends up aboard a ship under attack by fearsome pirates. Despite being a naive-looking teenager, he is not to be underestimated. Unmatched in battle, Luffy is a pirate himself who resolutely pursues the coveted One Piece treasure and the King of the Pirates title that comes with it.

        The late King of the Pirates, Gol D. Roger, stirred up the world before his death by disclosing the whereabouts of his hoard of riches and daring everyone to obtain it. Ever since then, countless powerful pirates have sailed dangerous seas for the prized One Piece only to never return. Although Luffy lacks a crew and a proper ship, he is endowed with a superhuman ability and an unbreakable spirit that make him not only a formidable adversary but also an inspiration to many.

        As he faces numerous challenges with a big smile on his face, Luffy gathers one-of-a-kind companions to join him in his ambitious endeavor, together embracing perils and wonders on their once-in-a-lifetime adventure.

        [Written by MAL Rewrite]
      background: The anime had a hiatus from October 13, 2024, to April 6, 2025. The anime switched to a seasonal release
        model starting from April 5, 2026. The airing time was Wednesdays 19:00 between October 20, 1999 - March 2001. The
        airing time was changed to Sundays 19:30 between April 2001 - December 2004. The airing time was changed to Sundays
        9:30 between October 6, 2006 - October 13, 2024. The airing time was again changed to Sundays 23:15 on April 6, 2025.
        Several anime-original arcs have been adapted into light novels, and the series has inspired 50+ video games as of
        2023. In June 2004, One Piece was licensed in North America by 4Kids Entertainment, which partnered with Viz Media
        for home video distribution. As One Piece proved unsuitable for their target demographic, 4Kids Entertainment censored
        the show to meet their standards, and, in December 2006, they stopped its production. In April 2007, Funimation took
        over the series licensing, providing an uncut version that remained faithful to the original release. In Japan, the
        anime's first 574 episodes were released exclusively on DVD by Avex Pictures from February 21, 2001, to December 4,
        2013. Blu-rays also became available with the DVDs starting on January 8, 2014. In North America, Viz Media released
        the anime on DVD between February 28, 2006, and June 26, 2007. Funimation has re-released and continued the series
        since May 27, 2008. From March 23, 2021, the DVDs were accompanied by Blu-rays as well.
