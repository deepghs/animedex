      synopsis: "Oftentimes, people are most vulnerable when they are lonely and unable to get along with those around them.\
        \ Isolation is felt more keenly amongst a crowd, so some will try to find solace in the strangest of places, where\
        \ the unknown lurks. Such people include Ayumu Aizawa, a former city boy now living in the countryside of Tana, and\
        \ Kisa Tanigawa, a young girl who has a hard time relating to others. What these two share in common is a feeling\
        \ that their life has gone astray. \n\nZettai Shounen tells a story of strange phenomena affecting two different settings,\
        \ with no explanations of their origin or sudden appearance. All that is known is that these phenomena seem to center\
        \ on individuals with mixed emotions toward themselves and others.\n\n[Written by MAL Rewrite]"
