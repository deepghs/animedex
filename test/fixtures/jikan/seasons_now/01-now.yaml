      synopsis: "Coco, a humble dressmaker's daughter, has always been fascinated by magic and the witches who cast it, despite\
        \ the strict precautions they take to hide their methods from the public. However, when Coco takes advantage of a\
        \ golden chance to spy on the skilled witch Qifrey, she realizes that her favorite picture book was a disguised magic\
        \ book all along! In her excitement, she immediately starts testing out the various spells.\n\nWhen a spell causes\
        \ a disaster in her home, Qifrey rescues her just in time and decides to train her, realizing that she is the first\
        \ lead he has found that could help him track down the Brimmed Caps—a dangerous group of heretics who experiment with\
        \ forbidden body-altering magic and spread magical artifacts among the commoners. But before Coco and Qifrey can confront\
        \ the Brimmed Caps, she is going to have to improve her magical skills and learn to get along with Qifrey's other\
        \ apprentices. \n\n[Written by MAL Rewrite]"
