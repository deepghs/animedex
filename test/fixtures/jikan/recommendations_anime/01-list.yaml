        title: Alien Stage
      content: Despite Alien Stage and Link Click/Shiguang Dailiren taking place in different eras and settings (with Alien
        Stage taking place in a futuristic, dystopian sci-fi setting while Link Click takes place in a more modern setting
        with some characters having some kind of ability), they both still end up giving you a rather similar feeling after
        finishing it. An empty, gaping hole in your chest./hj Both of these franchises include our favorite black & white
        doomed yaoi trope/lh, but they also tackle similar themes such as loss, guilt, longing, regression, grief and so on.
        Both of these shows have a more heavy focus on the character's relationships and how that develops them. Both shows
        also make use of symbolism to tell their story at times (though Alien Stage naturally makes more use of this due to
        utilizing a more graphic storytelling writing style). If you enjoy analyzing the little details of the plot and characters
        (like me) you're for sure to love these shows as well! (⸝⸝> ᴗ•⸝⸝)
      date: '2026-04-29T00:00:00+00:00'
