        title: Hitsugi no Chaika
      content: Both are set in fantasy worlds that are recovering after a great war. Two warriors (Toru and Akari/Luke and
        Cecily) are trying to protect a mysterious young girl (Chaika/Lisa) from various people who are after her. In both
        cases, the group are aided by a sentient weapon (Frederica is a Dragoon while Aria is a Demon Sword) who took part
        in the war. That said, the characters themselves are quite different from each other- Chaika can hold her own unlike
        Lisa, Toru is notably less of a dick than Luke, Akari is a lot more cynical and abrasive than Cecily and Frederica
        is far more energetic and fight-hungry than Aria. Additionally, "Coffin Princess" is a science fantasy that has the
        characters travel from place to place, while "The Sacred Blacksmith" is a regular fantasy that takes place entirely
        around a single city. I prefer "Coffin Princess", as it's more original and adventurous and the characters are more
        fleshed-out.
