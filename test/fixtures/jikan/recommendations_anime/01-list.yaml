        title: Great Pretender
      content: Great Pretender clearly doesn't hide its desire to be the modern Cowboy Bebop. Right off the bat, its fully
        instrumental opening with abstract visuals using heavy emphasis on primary color contrast and seamless transitions,
        finishing with a giant title of the show as a jazz orchestra hit right in sync, is obviously a clear hommage to Bebop's
        iconic Tank opening. The show takes a deviated approach towards Bebop episodic storytelling by being divided in 4
        major arcs which despite having a linear narrative, really feel like standalone arcs that could have been rearranged
        in any order. The whole pacing shares the same rythm as Bebop with lots of relax, laid back and contemplative scenes
        intertwined with bombastic action showdowns often involving long lasting chases. Most of that action is built in sync
        with fast jazz orchestrations giving the show a fantastic entertaining energy all throughout, an anime standard defined
        by Bebop. As it is the case with both of them, this music can be associated with the considerable "western" inclination
        Great Pretender also takes. At least 5 to 6 different languages are featured, multiple locations from the USA, to
        Singapore, passing by the UK and finishing in China and a main cast with varying origins and ethnicities. All of these
        giving the whole narrative a really unique and international feeling you don't see in most of the anime industry landscape,
        be either in 1998 or today. The main GP cast is also a case of massive inspirations by rearranging the main cast of
        Bebop into 4 characters sharing similar traits to each Bebop's characters. -Edamura shares the nonchalance, quick
        witted attitude and assurance of Spike with much of Faye's hot temper, brash personality, clumsiness and disdain for
        the rest of his crew early on. -Laurent takes a similar role as Jet by being the leader of the con man crew, also
        being extremely competent at his craft and a troubled past he hides from others. In reality he appears very silly
        and smug most of the time, similar to Spike's frequent moments of absurd comedy, this and a native ability towards
        seducing women for both. -Cynthia is THE classic portrait of a femme fatale, especially in appearance much like Faye's
        design and demeanor induced at first glance. Both losing their cool easily when clever men can see through their charms
        and sex appeal manipulations. However she takes far more of Jet's role within the story by being the serious "straight
        guy" of the crew often berating her allies for taking too much unnecessary risks. -Abby is basically Ed in nature.
        Androgynous, tanned skin, relatively small and takes the most lone wolf approach in the crew. Unlike Ed who leads
        towards being an androgynous boy while actually being a girl, Abby is clearly a girl with some tomboyish characteristics.
        With this, she shares little snippets of the other 3 to form her character, she has Faye's troubled past with her
        family, Spike's unnatural skill in fast paced combat and Jet's serious attitude in regards to her life activities.
        The cherry on top of is an ending with intense focus on character drama, especially the lead, leading you to believe
        it might copy Bebop's conclusion 1 to 1 but without spoiling, it does its own thing instead. Lots of reccuring and
        memorable side characters, sometimes funny sometimes intimidating villains and story full of mishaps and shenanigans
        is the reason why I think Great Pretender is the closest experience you can get in anime to Cowboy Bebop, far better
        than Netflix live action that's for sure.
      date: '2026-05-03T00:00:00+00:00'
