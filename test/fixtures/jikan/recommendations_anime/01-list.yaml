        title: Vinland Saga Season 2
      content: 'AOT and Vinland Saga taught me there''s two outcomes to war. You can choose to be selfish. or, You can choose
        to be selfless. s1 after rewatching was colonization. children, mothers, families, lives were lost to set the stage
        for s2. King Canute, the Vikings, the history we see from this show is REAL HISTORY with a fictional focus on Thorfinn
        — a character who is representing the children that were born from these wars, this era, and how history is being
        repeated, how children are being indoctrinated as we speak, HOW YOU ARE. s2 made me realize enemies are made by the
        governments to Divide and Conquer. Pirates, mobs, gangs, Vikings, they are not the enemies of the world but cultured
        into a world of war and slavery. the government calls them savages but uses them, indoctrinates them, then casts them
        aside. seeing the reviews made me realize why and how politics works. people love fighting. so i ask people to watch
        this and think of Thorfinn’s question: “Is there anywhere that war and slavery have not touched?” because it has.
        “Would it be possible to rid the world of war and slavery?” because it can. S2E10 Einar says to Thorfinn: “Together,
        we turned an entire forest into a farm. If only all of this land were ours.” world peace is possible. my parents were
        watching a religious show: The Chosen. In S2 they explored the Biblical story of John and James who created a farm
        in the same way. Upset that Jesus told them to cultivate land that was not owned by them, a lesson not answered? https://www.thecatholicthing.org/2021/08/24/plow-that-field/
        It’s a lesson answered in a way to show that no matter how corrupt the land, how bloody the soil has been tainted,
        how many people were forced to cultivate this land, that there is nowhere else to go but to turn this land into something
        worth living on, to create life from more life. how the Vinland Saga S2 shows not to burn a forest to spread death,
        but to transform a forest into the spread of more life, to create Vinland. Season 1 defined Love (Love/Hate), that
        “love” isn’t something a human possesses but an Unconditional Passion, a Godlike Passion — Love/Hate, that this Passion
        (Love/Hate) is both the human social constructs known as “love” and “hate.” In S2E13 Thorfinn is eavesdropping on
        Snake (take note of his symbolic name) who is reading the bible and states: “Love your enemies and pray for those
        who persecute you” — dubbed “You must love your neighbor and continue to love your enemies” — translated but love
        and hate, it’s nothing but a definition. a social construct. (this is why the law doesn’t work btw. it’s called “court
        language”). to “love” and “hate” like God would be to have Passion like God, a Love/Hate that is Unconditional. the
        world would have peace if we all followed that verse from S2E13: To have Unconditional Passion is the only truth of
        this world we know. Love/Hate that is balanced for it an Unconditional Law. Let there be Light meaning Dark. A balance.
        Balance of Passion: Love = Hate = Unconditional Passion ≠ human emotions like "love" and "hate" So I say to you: Have
        Passion for your enemy as you would have Passion for your neighbor, friend, brother, sister, spouse, partner, family,
        or even a stranger. For if you have no enemies but the world will tell you that you have enemies. In a world of choice,
        I tell you to choose to create a place for a better tomorrow — Vinland.'
      date: '2026-05-04T00:00:00+00:00'
