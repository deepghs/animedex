        as we know it. The final defense against complete human extinction is tasked to a faceless, monolithic organization
        comprised of logic-based bureaucrats in the name of survival of the species. The machinations of the military industrial
        complex fueling this bleak foreverwar begin to unfold as the thin line between enemy and ally blurs, breaking down
        the given reality previously established, putting into question what it truly means to be human and to be alive. Once
        the dust settles, what value is there in a lonely life when a life alone is ultimately worthless? Both are also fairly
        horny, with NieR taking the cake via 2B's bakery being accentuated by her A.T.Field, better known as "zettai ryouki".
