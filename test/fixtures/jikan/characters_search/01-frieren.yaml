      about: |-
        Race: Arrancar
        Gender: Male
        Affiliation: Vandenreich
        Occupation: Member of Vandenreich
        Team: Vandenreich
        Base of Operations: Vandenreich Base

        Luders Friegen is a member of the Vandenreich.

        Appearance:
        Luders's attire consists of a long, white robes over which he wears a waist length white robe that feature a white hood with black face mask and epaulettes. A thin black sash goes from the left epaulette to the right side of his waist. He also wears white boots. His eyebrows and hair are dark on the right and white on the left side. His hair reaches down to his shoulders. He has a series of circular marks on his face above and below his eyes.

        Personality:
        Luders has a very audacious temperament, as he is undaunted when facing down the Captain-Commander of the Gotei 13 in declaring war upon him. Towards fellow Vandenreich member Asguiaro Ebern, he is particularly condescending in saying that Asguiaro should bow before him, but is quick to deride his words when Asguiaro counters, mocking his impudence. However, Luders is completely submissive to the Vandenreich Leader and speaks very respectfully to him.

        History:
        Two days before attacking Soul Society, Luders inspected the route that was going to be used to break into Seireitei and reported that at that rate Soul Society would lose its balance of souls with the Human World in the near future.

        Plot:
        The Thousand-Year Blood War arc

        Luders Friegen leads six masked members of the Vandenreich to Seireitei where they interrupt a Shinigami that is reporting to Captain-Commander Yamamoto, leaving the messenger lying in a pool of their own blood. When he demands who they are, Luders greets him and informs him that they are there to declare war on the Gotei 13. When Luders questions the level of security in the Captain-Commander's chamber, Yamamoto tells him that he himself is the best security there is. When Lieutenant Sasakibe is propelled across the room with a large arrow through his body, Luders tells him to praise the lieutenant for showing him what his fate would be and states that after fighting and sacrificing everything, Soul Society will be destroyed in five days by the "Vandenreich".



        (Source: Bleach Wikia)
