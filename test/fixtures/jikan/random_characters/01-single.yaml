      nicknames:
      - Espeon
      favorites: 5
      about: |-
        Espeon is a quadrupedal, feline-like mammalian Pokémon with slender legs and dainty paws. It is covered in fine, lilac fur. Its ears are large, and it has purple eyes with white pupils. There are tufts of fur near its eyes, and a small, red gem embedded in its forehead. It also has a thin, forked tail.

        Espeon's fine, velvety fur is so sensitive that it can sense minuscule shifts in the air, allowing it to predict various things, such as the weather and its enemies' thoughts and movements. When doing so, the tip of its tail quivers. Espeon shows extreme loyalty to any Pokémon Trainer that it considers worthy, even being said to have awakened its precognitive powers from its desire to protect its Trainer. Some people, however, instead say that its abilities, while originally absent, were born from its need to keep itself safe. It has a caring personality, as it is known to guide people trough forests to keep them from getting lost. The gem on Espeon's forehead glows when it unleashes psychic energy from it and darkens when all of its energy has been exhausted. It builds up its psychic power by bathing in the sunlight, so it is not good at battling at night. It is rare in the wild, instead being more commonly found in urban areas, under the ownership of other Trainers. As mentioned in Pokémon Sleep, Espeon is known to sleep deeply during the night, so it might be easier than anticipated to come across one resting at this time.

