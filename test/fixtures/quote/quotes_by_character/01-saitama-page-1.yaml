        name: One Punch Man
        altName: One Punch Man
      character:
        id: 213
        name: Saitama
    - content: In exchange for gaining strength, have I lost something more important as a human being? Emotions used to swirl
        within me when I fought. Fear, impatience, anger... But now... Day after day, after one punch I go home unharmed and
        wash my gloves.
      anime:
        id: 188
        name: One Punch Man
        altName: One Punch Man
      character:
        id: 213
        name: Saitama
    - content: Is that really... the limit to your power? Do you honestly think that you won't get any stronger for the rest
        of your life? Instead of sitting around frustrated, it's better to keep on moving forward.
