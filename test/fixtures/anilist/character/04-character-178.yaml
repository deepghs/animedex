        description: |-
          The infamous school journalist, Hiyono is the bubbly and energetic sidekick of Ayumu, always stuck to his side. Very clever and a quick-thinker, her confidence borders dangerously on overconfidence. She is extroverted and is Ayumu's polar opposite, serving as one of the series' few comic-relief characters.

          Her skill with computers are as amazing as her hacking abilities and she has access to over one hundred resources. She blackmails Wataya often, and is very fond of Ayumu's cooking. Hiyono is also one of the few who whole-heartedly believe in Ayumu; she also has a great deal of faith and loyalty in him that carries on for the whole series. She attends Tsukiomi High School alongside with Ayumu Narumi.

          (Source: Wikipedia)

          ~!In the manga, it is later revealed she is not "Hiyono". She was part of Kiyotaka's mechanics to support Ayumu into opposing him. She later leaves to Germany for another assignment and is shown at the end visiting Ayumu in the hospital.!~
