        description: "__Height:__ 172 cm\n__Affiliations:__ ~!Straw Hat Pirates (Captain); Four Emperors!~ \n__Devil Fruit:__\
          \ Gomu Gomu no Mi (Rubber-Rubber Fruit) \n__Devil Fruit Type:__ Paramecia\n~!__True Devil Fruit:__ Hito Hito no\
          \ Mi Model: Nika (Human-Human Fruit)\n__True Devil Fruit Type:__ Mythical Zoan!~\n__Bounty:__ ~!3,000,000,000 (previously:\
          \ 1,500,000,000, 500,000,000, 400,000,000, 300,000,000, 100,000,000 and 30,000,000)!~\n\nLuffy is the captain of\
          \ the Straw Hat Pirates and is best friends with all of them and values them over all else. At first glance, Luffy\
          \ does not appear to be very intelligent, often seeing things in childish manner and can easily be amazed by the\
          \ simplest things. However, because he views the world in a straightforward and simple manner, he is occasionally\
          \ the only person who can see past the events and see what should be done.  \n\nLuffy seems to have an unstoppable\
          \ appetite, a characteristic that is common to the Japanese archetype of the (at times simple-minded) young adventurer\
          \ with a heart of gold; perhaps the hunger more so in Luffy's case due to having an elastic stomach. Luffy is also\
          \ another one of the several characters given the middle initial \"D\".  \n\nAlthough Luffy is fairly lightheaded\
          \ and a funny character, he has an unstoppable sense of determination, optimism and commitment and will do anything\
          \ to stand up for his friends and comrades. Along with that, he has great courage to back it up as well as unbelievable\
          \ strength. Ever since consuming the devil fruit he was shown to be not worried about his inability to swim, much\
          \ like his brother. Much of these traits are common among D's. His only display of true fear is towards his grandfather,\
          \ to the point that he does not fight back and is intimidated at the mere mention of him.  \n\nLuffy never kills\
          \ any of the villains, no matter how cold-hearted they are; instead, he frequently sends the villain flying, knocking\
          \ them out or until the point that they are almost near death, which results in some of the villains searching for\
          \ revenge, such as [Buggy the Clown](https://anilist.co/character/725) and [Alvida](https://anilist.co/character/4899).\
          \ Author [Eiichiro Oda](https://anilist.co/staff/96881) explains that it's not a question of morality so much as\
          \ a matter of punishing the villains for their crimes - he feels that killing the villains lets them off too lightly,\
          \ whereas he considers letting them live to see their dreams be ruined a far more fitting punishment.  \n\nLuffy\
          \ has a dream, and to even have a chance at achieving this dream, he says that he must find the One Piece and become\
          \ King of the Pirates. He knows that to achieve his goal, he will have to defeat many strong opponents, including\
          \ the World Government and his childhood hero [Shanks](https://anilist.co/character/727). "
