        - id: 88597
          title: '[Spoilers] Frieren: Beyond Journey’s End Season 2 - Episode 10 Discussion '
          body: "~~~Hello everbody, welcome to our last Frieren Friday :')\n\nThis episode was a great sendoff. We got some\
            \ more action, some more cute stuff with everyone and a little bit of Himmel and the others.\n\nThis time even\
            \ Fern was intrigued. \nimg660(https://i.imgur.com/2Chtp07.jpeg)\n\nAnd one last pouting Fern.\nimg660(https://i.imgur.com/xvMCIgz.jpeg)\n\
            \nNew generation :)\nimg660(https://i.imgur.com/cRyFUFw.jpeg)\n\nThis will be cinema I just know it.\nimg660(https://i.imgur.com/kp7Nzqm.jpeg)\n\
            \nI am absolutely happy with how this season went and I want to thank the whole team for making more peak. I never\
            \ thought we would get a season 2 and it being this good and not just some quickly thrown out cashgrab makes me\
            \ really happy. \n\nThat's a 10/10 for me.\n\nALSO: SEASON 3 ANNOUNCED!!!!!!!!\n\nYou know the second it drops\
            \ I will be there. See you in 1 1/2 years :')~~~"
          user:
