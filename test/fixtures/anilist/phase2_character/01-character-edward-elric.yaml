        description: '__Birthplace:__ Resembool, Amestris

          __Height:__ 1,65m

          __Family:__ [Alphonse Elric](https://anilist.co/character/12/Alphonse-Elric)
          (brother), [Van Hohenheim](https://anilist.co/character/9792/Van-Hohenheim)
          (father), [Trisha Elric](https://anilist.co/character/10085/Trisha-Elric)
          (mother, deceased)

          __Affiliations:__ State Military, [Pinako Rockbell](https://anilist.co/character/65/Pinako-Rockbell),
          [Izumi Curtis (teacher)](https://anilist.co/character/67/Izumi-Curtis),
          [Roy Mustang (Commander)](https://anilist.co/character/68/Roy-Mustang)

          __Occupation:__ State Alchemist


          Edward "Fullmetal Alchemist" Elric is a young alchemical prodigy. He is
          the youngest State Alchemist ever to be recognized by the Amestris State
          Military, having received the title at the age of 12. Ed''s primary motivation
          throughout the series is to return his younger brother, Alphonse, to his
          original body, which was lost in a failed human transmutation. Edward, despite
          his occasional bouts of immaturity, is a selfless boy who gains a reputation
          as a "hero of the people" throughout his youth. Notably, he doesn''t seem
          concerned about returning his own arm and leg, instead focusing entirely
          on Al''s suffering.


          Edward is small for his age, standing at only 149 cm (4''11"), however his
          body is that of an experienced martial artist, with noticeable muscles and
          a wealth of agility. Although he lacks both his right arm and left leg,
          Ed''s ability to fight is not impaired, and is in fact improved, as he will
          often use alchemy to cause his metal arm to partly transform into a blade
          or shield. His heavy automail limbs are considered by him to be the very
          best in Amestris. They were made by his childhood friend, Winry Rockbell,
          and she is constantly working on them. He is able to think quickly, even
          in desperate situations, though can still be frightened into paralysis.
          These qualities, combined with his alchemical powers and physical strength,
          make him a formidable fighter.'
