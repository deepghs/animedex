    <info gid="2801806956" type="Plot Summary">After failing in the preliminary tournament of the previous Love Live, the members of Aquors have rededicated themselves to succeeding both as idols and as saviors of their school, making sure their home will never be taken away. But Mari learns some terrible news about their upcoming school open house event and it seems like all of their efforts will be for naught. Chika and her friends must find some way to preserve their school and carry on as idols. Either way, it looks like they&#039;ll need a miracle to get through this, fortunately, from u&#039;s to Aqours, miracles are what idols do best.</info>
