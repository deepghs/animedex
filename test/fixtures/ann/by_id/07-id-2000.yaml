    <info gid="2450000065" type="Plot Summary">Set far in the future, a mysterious alien race attacks a new colony light years from Earth. A number of children ranging in ages from 4 to 15 are among the survivors that evacuate from the fallen colony. Due to attacks by the aliens on the escaping freighter, the number of adults left dwindles. Over time, the children become involved as they strive to understand the aliens and try to make their way back to Earth.</info>
