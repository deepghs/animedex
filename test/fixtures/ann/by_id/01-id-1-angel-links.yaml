    <info gid="1635715572" type="Plot Summary">Li Meifon is the head of a free, no expenses paid protection/security agency for escorting ships across outer space. Though only 16, she possesses great skill and leadership qualities while commanding her crew aboard their ship, the &lt;i&gt;Angel Links&lt;/i&gt;. However, some unpleasant memories begin to trouble her and she starts questioning her own past and reason for existence. Join Li Meifon and the rest of the &lt;i&gt;Angel Links&lt;/i&gt; crew on their adventures through the Oracion star system as they battle pirates, government organizations, and a Tao master, all while finally uncovering Meifon&#039;s dark and mysterious past.</info>
