    <info gid="1355148598" type="Plot Summary">In exchange for the fulfillment of a wish, Magical Girls keep fighting, unbeknownst to the rest of the world. But Iroha Tamaki can&#039;t seem to remember her wish. There is a gaping hole in her life. Something important has been lost. But she continues to fight every day, without even knowing why. Then, a rumor begins to spread among Magical Girls. Magical Girls can be saved if they go to Kamihama City, the city where Magical Girls and Uwasa are gathering.</info>
