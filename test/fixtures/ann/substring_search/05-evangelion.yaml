    <info gid="1810961306" type="Plot Summary">Fourteen years after third impact, Shinji Ikari awakens to a world he does not remember. He hasn&#039;t aged. Much of Earth is laid in ruins, Nerv has been dismantled, and people who he once protected have turned against him. Befriending the enigmatic Kaworu Nagisa, Shinji continues the fight against the angels and realizes the fighting is far from over, even when it could be against his former allies. The characters&#039; struggles continue amid the battles against the angels and each other, spiraling down to what could inevitably be the end of the world.</info>
