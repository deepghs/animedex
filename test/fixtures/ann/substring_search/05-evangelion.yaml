    <info gid="2469449806" type="Plot Summary">After the second impact, all that remains of Japan is Tokyo-3, a city that&#039;s being attacked by giant creatures that seek to eradicate the human kind, called Angels. After not seeing his father for more than eight years, Shinji Ikari receives a phone call, in which he is told to urgently come to the NERV Headquarters, an organization that deals with the destruction of the Angels through the use of giant mechs called Evas.Shinji&#039;s objective is to pilot the Eva Unit 01,while teaming up with the Eva Unit 00 pilot, Ayanami Rei.</info>
