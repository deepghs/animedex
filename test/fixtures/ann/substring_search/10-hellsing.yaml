    <info gid="2622834816" type="Alternative title" lang="JA">ヘルシング外伝</info>
    <info type="Plot Summary">Hellsing, an organization devoted to the elimination of the vampire threat, has recently uncovered information regarding the attempted production of &quot;man-made undead.&quot; The world is presently in the thick of WWII, and the current leader of Hellsing fears the Nazis could potentially use these creatures as front-line super-soldiers. Although the technology of creating artificial vampires is still in its infancy, it has advanced enough to be a serious threat. In an attempt to put a stop to this perverse and dangerous experimentation, Hellsing has sent two of its most skilled agents to Poland. A young man by the name of Walter C. Dornes - a.k.a. &quot;The Angel of Death,&quot; and Alucard, an ancient vampire currently in forced service to the Hellsing Organization. Together, they attempt to stop the progress of the Nazi&#039;s efforts. &lt;em class=de-emphasized&gt;(from manga)&lt;/em&gt;</info>
