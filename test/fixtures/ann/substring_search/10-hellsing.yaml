    <info gid="2067978080" type="Plot Summary">Vampires exist. It is the duty of Hellsing, a secret organization sponsored by the British government, to hide that frightening fact and protect the blissfully unaware populace. Along with its own personal army, Hellsing has secret weapons. Alucard, an incredibly powerful vampire, has been controlled by Hellsing for years. It is unclear how he feels about being a servant to the Hellsing family, but he certainly enjoys his job as a vampire exterminator. Seras is a fledgling vampire and former police woman. Although reluctant to embrace her new self, she is a valued member of the organization. Integra Hellsing, the current leader, is usually fully capable of fulfilling her duty, but lately, vampire activity has been on the rise. Unfortunately, the cause is more alarming than anything she could have imagined. A group long thought dead has been plotting in secret since their apparent destruction over 50 years ago. Plotting to plunge England, and perhaps the entire world, into war.</info>
