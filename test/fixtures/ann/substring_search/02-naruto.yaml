    <info gid="2081746802" type="Plot Summary">Assigned on a mission to capture Mukade, a missing-nin, Naruto Uzumaki sets out for the once glorious historic ruins of “Ouran”, where he pursues and corners the rogue ninja. Mukade’s goal is revealed to be a dormant leyline within the ruins; he unleashes the power of the leyline, causing a light to envelop Naruto, sending him into the past, 20 years before the series began. When Naruto awakens, he comes into contact with the Fourth Hokage, His father, Minato Namikaze.</info>
