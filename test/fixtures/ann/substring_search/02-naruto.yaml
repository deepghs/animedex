    <info gid="2873442058" type="Plot Summary">After being captured for attempting to assassinate the leader of the Hidden Lightning Village (the Raikage) and killing Jonin from the Hidden Mist and Rock Villages, Naruto is imprisoned in Hozūkijo, a criminal containment facility also known as: Blood Prison. The warden of the facility, Mūi, uses the ultimate imprisonment jutsu to steal the power and abilities from it’s prisoners. In the Blood Prison, something is targeting Naruto’s life. The battle to prove his innocence and uncover the truth has begun for Naruto and his friends.</info>
