    <info gid="2601853147" type="Plot Summary">A routine rank-C mission turned into a full-blown battle as the Hidden Fall village is attacked by enemy ninjas. Now Naruto, Sasuke and Sakura must help the leader of the Hidden Fall, Shibuki, protect his village and show him what being a hero is all about.</info>
    <info gid="2915554832" type="Plot Summary">A typical C-rank mission has been assigned to team 7. When they get to the destination, which is in the hidden waterfall village, they meet a cowardly village leader. To make matters worse, enemy ninjas come to attack the hidden waterfall village and steal their holy water, which gives its drinker a huge amount of power. Now it&#039;s up to Naruto, Sakura, and Sasuke to take back the holy water and defeat the enemy.</info>
