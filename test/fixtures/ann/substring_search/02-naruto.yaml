    <info gid="2947658124" type="Plot Summary">A spoiled prince from the Moon Country (which is located on Crescent Moon Island, on a southern sea) is traveling the world and is to be escorted back to his home island by Naruto, Kakashi, Sakura and Lee. The Prince ends up purchasing a circus and hilarity ensues, team Kakashi then has the duty of protecting both the Prince and his new purchase. All the while three mysterious ninja arrive to cause trouble.</info>
