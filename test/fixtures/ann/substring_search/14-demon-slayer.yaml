    <info gid="2241789569" type="Plot Summary">It looked to be the Demon Slayer Corps moment of victory. Muzan, the progenitor demon they had been hunting for generations, was wounded and immobilized. The Hashira had all joined the battle and were aiming to finish Muzan off with one final strike—only for the ground to disappear beneath them, literally. Now the entire Demon Slayer Corps, besides a scant few, find themselves trapped within an infinitely sized, constantly shifting castle alongside every living demon. Scattered and disorganized, the Demon Slayers continue fighting on, frantically searching for the injured Muzan to bring an end to the demon threat once and for all.</info>
