    <info gid="2138755638" type="Plot Summary">In order to repair his damaged sword, Tanjiro along with his sister Nezuko, was assigned by the Demon Slayer Corps to travel to the Swordsmith Village. There, they meet the Love Hashira Mitsuri Kanroji, Mist Hashira Muichiro Tokito, and Genya Shinazugawa. While Tanjiro waiting for his sword to be reforged, the two Upper Rank demons: Gyokko and Hantengu, were sent by Muzan to destroy the village and wiped out the Demon Slayer Corps. Now, Tanjiro and his new allies must fight together to stop the demons and protect the village.</info>
