    <info gid="2644988252" type="Plot Summary">After visiting the Rengoku residence in the wake of Hashira&#039;s death, Tanjiro and his team accompany the Sound Hashira Tengen Uzui to the Entertainment District in order to investigate the disappearances of his three wives. They must disguise themselves as women in order to sneak in. However, the Demon Slayers soon discovered that an Upper Rank demon named Daki who terrorizes the town behind the murders and disappearances, with her brother named Gyutaro protecting her.</info>
