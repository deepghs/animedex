    <info gid="2345688991" type="Plot Summary">In the continuation of the last series, Akari Mizunashi continues her job as a gondolier along with her friends from the other two rival companies, Aika and Alice. As they continue their training to become Undines, they continue to meet new people and partake on mysterious adventures, all in the quiet, scenic and peaceful city of Neo Venezia.</info>
