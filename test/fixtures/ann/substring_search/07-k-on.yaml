    <info gid="2008074823" type="Plot Summary">It&#039;s Yui Hirasawa&#039;s first year in high school, and she&#039;s eagerly searching for a club to join. At the same time, Ritsu Tainaka, a drummer, and her friend Mio Akiyama, a bassist, are desperately trying to save the school&#039;s light music club, which is about to be disbanded due to lack of members. They manage to recruit Tsumugi Kotobuki to play the keyboard, meaning they only need one more member to get the club running again. Yui joins, thinking it will be an easy experience for her to play the castanets, the only instrument she knows. However, the other members think their new addition is actually a guitar prodigy...</info>
