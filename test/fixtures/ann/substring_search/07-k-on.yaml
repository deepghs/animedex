    <info gid="1332352551" type="Plot Summary">It&#039;s the final year of high school for Yui Hirasawa (guitar), Ritsu Tainaka (drums), Mio Akiyama (bass), and Tsumugi Kotobuki (keyboard); the founding members of the Light Music Club. Together with their junior member Azusa Nakano (guitar), they spend their days after school in the music room enjoying tea and sweets, and practicing music. Amidst band practice, preparations for the new student orientation performance, scouting for new members, and student responsibilities they still have time for &quot;After School Tea Time&quot;.</info>
