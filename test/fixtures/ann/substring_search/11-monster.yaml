    <info gid="1015823844" type="Plot Summary">This is a world where both men and monsters exist. Those who hunt the monsters are called Hunters. But in a small corner of the Hunter's world, there are those called Riders who bond with and coexist with monsters. With their Kinship Stones that allow them to awaken the hidden power inside monsters, Riders live in secrecy together with their Monsties, the monsters they formed a connection with.&lt;Br&gt;Lute, a young boy living in the Rider village of Hakum, dreams of becoming the world's best Rider. Having just turned 12, he sets out to find his own Monstie for himself before the ceremony where he is given his own Kinship Stone. Together with his kind-hearted childhood friend Cheval, his inquisitive childhood friend Lilia, and his partner Navirou, he sets out deep into the forest, and has a miraculous encounter with a Rathalos.</info>
