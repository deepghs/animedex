    <info type="Plot Summary">Three years ago, the world learned that harpies, centaurs, catgirls, and all manners of fabulous creatures are not merely fiction; they are flesh and blood - not to mention scale, feather, horn, and fang. Thanks to the &quot;Cultural Exchange Between Species Act,&quot; these once-mythical creatures have assimilated into society, or at least, they're trying. When a hapless human teenager named Kurusu Kimihito is inducted as a &quot;volunteer&quot; into the government exchange program, his world is turned upside down. A snake-like lamia named Miia comes to live with him, and it is Kurusu's job to take care of her and make sure she integrates into his everyday life. &lt;em class=de-emphasized&gt;(from manga)&lt;/em&gt;</info>
