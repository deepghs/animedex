    <info gid="1450363667" type="Plot Summary">13 years ago, suddenly one part of Tokyo broke off and began to float in the sky. Tokyo was separated into &quot;Old Tokyo&quot; as the part that was floating in the air, and &quot;New Tokyo,&quot; the part that stayed on the ground. Communication and interaction between the two Tokyos was impossible, and years passed. One day, a young girl perceives that Old Tokyo will fall back down to the ground, and she sets out on the perilous path from from Old Tokyo to New Tokyo to save the citizens from the impending crisis.</info>
