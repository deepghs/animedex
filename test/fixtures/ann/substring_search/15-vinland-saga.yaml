    <info gid="3035572118" type="Alternative title" lang="JA">ヴィンランド・サガ</info>
    <info gid="693791801" type="Plot Summary">A few years have past and Thorfinn is now a slave on distant farm in Norway. Thorfinn has lost all will to live and spends his days laboring to clear away a forest to make way for a new farm. A slave, Einar, is brought to the farm and after learning that clearing the forest means their freedom gets to work helping Thorfinn with his daily work. Despite Einar and Thorfinn&#039;s differences the two eventually become friends as Einar teaches Thorfinn the happiness that comes from farming. Together they work to gain their freedom as Thorfinn begins to repent for his past sins by growing more crops than he ever Razed, providing more then he ever stole, and never fighting again.</info>
