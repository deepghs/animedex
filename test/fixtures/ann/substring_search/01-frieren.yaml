    <info type="Plot Summary">For ten years, elf mage Frieren traveled with Himmel the hero, Heiter the priest, and Eisen the dwarf warrior as they quested to destroy the demon king. At the end of their journey, Frieren set out on her own, not quite understanding how differently time flows for her versus her human companions. Reunited after fifty years only to see them wither and die, Frieren begins to ponder the nature of connections at a time when it&#039;s already too late to say goodbye. &lt;em class=de-emphasized&gt;(from manga)&lt;/em&gt;</info>
