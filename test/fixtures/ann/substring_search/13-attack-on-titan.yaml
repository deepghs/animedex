    <info gid="1023942648" type="Plot Summary">Levi, currently living in the Underground as a criminal boss with his two close cohorts Isabel and Farlan, is given a choice: either be turned over to the Military Police and be tried for his crimes, or join the Survey Corps. After joining the Survey Corps with an ulterior motive, the three realize there might be something on the surface worth more than they expected. Something worth sacrificing their lives for.</info>
