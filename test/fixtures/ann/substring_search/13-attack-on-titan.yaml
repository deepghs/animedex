    <info gid="1171142895" type="Plot Summary">4 years after the Survey Corps reached the shore beyond the walls, Falco Grice and Gabi Braun are among Marley&#039;s &quot;Warrior Candidates&quot; who wish to inherit the power of the titans. After emerging victorious in a hard-fought war, they continue their military training when Marley shifts its focus on invading Paradis once again. Nevertheless, in the midst of this announcement, Reiner has an unexpected encounter with a key person from his past... one who brings along terror and chaos.</info>
