        altTitles:
        - ja: 黒の召喚士
        - en: Black Summoner
        - en: The Berserker Rises to Greatness.
        - ko: 흑의 소환사
        - zh: 黑之召唤士
        - ru: Черный призыватель
        description:
          en: "\"If you truly want to get stronger, you have to challenge and defeat those stronger than yourself.\"\n\nWhile\
            \ being transmigrated to another world, Kelvin bartered away his memories for a collection of powerful new abilities.\
            \ Setting out on the ultimate adventure as the world’s strongest Summoner — with his first Follower being the\
            \ very goddess who brought him over! — he soon discovers his true nature as a battle junkie. Someone wants to\
            \ pick a fight? Sure, bring it on!\n\nFacing off against one formidable foe after another, Kelvin can hardly contain\
            \ his delight as he revels in the absolute exhilaration of a good fight! The curtain rises on the start of an\
            \ epic saga as this black-clad warrior and his allies carve their way into the annals of history! \n___\n**Character\
            \ Designer:** [Kurogin (DIGS)](https://mangadex.org/author/ad469135-32c7-4fcc-b490-d0ebc07eea16)\n\n**Additional\
            \ Links:**  \n- [Official Raw Web Novel](https://ncode.syosetu.com/n1222ci/)\n- [Official English Light Novel](https://j-novel.club/series/black-summoner)"
          ja: |-
            「自分より強いやつに勝て――それができなきゃ、弱者だぜ」

            ケルヴィン――異世界転移してこの世界にやってきた彼は転移時に、自分の記憶を代償にしてまで理想のスキル構成を実現させた。そして――最強の“召喚士”として冒険を開始させる。挑みかかる相手は、異世界の強者ばかり。黒衣を纏う戦闘狂と、彼の召喚により集いし配下たちが紡ぐ爽快バトルファンタジー、第一幕。
          ru: Он очнулся в мире ничего не помня о себе, даже имени. Зато это мир меча и магии, а он призыватель. Ну, вперед,
            осваиваться в новом мире!
          pt-br: As cortinas dessa história se abrem quando nosso protagonista troca suas memórias por um poder imensurável
            em um novo mundo. Agora, com o nome de Kelvin, ele precisa evoluir, dominar novos subordinados e se tornar o maior
            invocador de todos os tempos. Mas e então, até onde essa jornada vai nos levar?
