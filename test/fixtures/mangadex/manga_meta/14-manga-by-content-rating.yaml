      attributes:
        title:
          ja-ro: Otonari no Tenshi-sama ni Itsunomanika Dame Ningen ni Sareteita Ken
        altTitles:
        - ja: お隣の天使様にいつの間にか駄目人間にされていた件
        - en: The Angel Next Door Spoils Me Rotten
        - id: Tetangga Bidadari Terlalu Memanjakanku
        - pl: Aniołek z Sąsiedztwa Niezwykle Mnie Rozpieszcza
        - pt-br: Meu Anjo de Vizinha Me Mima Demais
        - ru: Ангел по соседству меня балует
        - uk: Сусідський ангел сильно мене балує
        - vi: Thiên sứ nhà bên
        - ja-ro: OtoTen
        - ro: Îngerul de după usă mă răsfață prea mult
        - tr: Melek Komşum Beni Şımartıyor
        description:
          en: Mahiru is a beautiful girl whose classmates all call her an "angel." Not only is she a star athlete with perfect
            grades—she's also drop-dead gorgeous. Amane‚ an average guy and self-admitted slob‚ has never thought much of
            the divine beauty‚ despite attending the same school. Everything changes‚ however‚ when he happens to see Mahiru
            sitting alone in a park during a rainstorm.
          ja: 高校生の藤宮周が住むマンションの隣には、「天使様」と呼ばれる学校で一番の美少女・椎名真昼が住んでいる。特に関わり合いのなかった二人だが、雨の中ずぶ濡れになっていた彼女に傘を貸したことから、不思議な交流が始まった。自堕落な一人暮らしを送る周を見かねて、なにかと世話を焼く真昼。お互いに興味ないと言い合う二人は、それでも少しずつ距離を縮めていく……。
          pl: Mahiru jest piękną dziewczyną, którą koledzy z klasy nazywają "aniołkiem". Jest nie tylko świetnie wysportowana
            i ma doskonałe oceny - jest także zabójczo piękna. Amane, przeciętny facet i samozwańczy niechluj, nigdy nie myślał
            zbyt wiele o tej boskiej piękności, mimo że uczęszczał do tej samej szkoły. Wszystko zmienia się jednak, gdy widzi
            Mahiru siedzącą samotnie w parku podczas ulewy. Tak zaczyna się dziwna relacja między tą nieprawdopodobną parą!
          tr: Mahiru, sınıf arkadaşları tarafından "melek" olarak nitelendirilen güzel bir kız. Notları mükemmel olan yıldız
            bir sporcu olmasının yanında tepeden tırnağa mükemmel bir görünüşe sahip. Kendini tembel olarak gören sıradan
            bir adam olan Amane, aynı okula gitmesine rağmen bu kutsal güzellik hakkında özel bir düşünceye sahip değildi.
            Ancak her şey bir yağmur fırtınasında Mahiru'yu parkta otururken görmesiyle değişti.
          vi: Fujimiya Amane sống một mình trong căn hộ của mình, và cô gái xinh nhất ở trường cậu, Shiina Mahiru, lại là
            hàng xóm của cậu. Họ hầu như chẳng bao giờ nói chuyện với nhau cho tới một ngày trời mưa cậu thấy cô không cầm
            theo ô và cho cô mượn. Để cảm ơn thì cô đã thường xuyên giúp anh làm việc nhà, từ đó mối quan hệ của họ bắt đầu
            nảy nở.
          pt-br: |-
            Fujimiya Amane, um estudante do ensino médio, mora sozinho em seu apartamento. Ao lado dele mora Shiina Mahiru, a garota mais bonita da escola. Alguém que todos chamam de "anjo". Eles nunca conversam de verdade, mas quando Amane empresta seu guarda-chuva a Mahiru em um dia chuvoso, o relacionamento deles começa a florescer.

            Em pouco tempo Mahiru descobre que Amane negligencia sua cozinha e limpeza, e ela se sente obrigada a intervir.

            Embora eles não tenham nenhum interesse um pelo outro, eles lentamente se aproximam...

            Esta é a história de amor agridoce de um jovem e sua bela vizinha de língua afiada.
