        - id: 'Kanojo Okarishimasu: Rent-a-Girlfriend'
        - ja: かのかり
        - ja-ro: KanoKari
        description:
          en: |-
            In today's Japan, "rental" services can deliver an afternoon with a "friend," a "parent," even a fake girlfriend! After a staggering betrayal by his girlfriend, hapless freshman Kazuya gets just desperate enough to give it a try. But he quickly discovers how complicated it can be to "rent" an emotional connection, and his new "girlfriend," who's trying to keep her side hustle secret, will panic when she finds out her real life and Kazuya's are intertwined in surprising ways! Family, school, and life all start to go wrong, too...

            (Source: Kodansha Comics)
            ___
            **Additional Links:**
            - Alt Official English: [K MANGA](https://kmanga.kodansha.com/title/10001/episode/312699) - United States, Japan, Canada, Australia, New Zealand, & Singapore only.
            - Official English Volumes: [Kodansha USA](https://kodansha.us/series/rent-a-girlfriend/)
          fr: Kinoshita Kazuya est un étudiant régulier qui vient d'être largué par sa petite amie pour un autre gars. Se
            sentant dans les décharges, il décide d'utiliser une application appelée Diamond pour embaucher Mizuhara Chizuru,
            une petite amie de location, afin de se sentir mieux. Dès leur première rencontre, elle semble être la fille parfaite
            pour lui, mais est-ce qu'il y a autre chose pour elle que ce qui est à l'oeil? Et comment va se développer leur
            relation pas tout à fait typique?
          it: Kinoshita Kazuya è un normale studente universitario che è stato appena lasciato dalla sua ragazza. Devastato,
            decide di usare un app chiamata "Diamond" per reclutare Mizuhara Chizuru, una ragazza a noleggio per tirargli
            su il morale. Fin dal loro primo incontro, sembra essere la ragazza perfetta per lui, ma ci sarà altro dietro
            a quell'immagine da "brava ragazza"…? E come si evolverà la loro inusuale relazione?
          ja: 都内在住のダメダメ大学生、木ノ下和也（20）。ある日、“ワケアリ”の超絶美少女、水原千鶴との出会いをキッカケに、彼の人生は大きく変わり始めて──！？
          pt: Kazuya Kinoshita é um estudante universitário inútil que decide utilizar uma aplicação de relacionamentos depois
            de ter levado terminado com a sua namorada. Assim, o rapaz conhece uma bela garota chamada Chizuru Mizuhara e
            a vida dos dois começa a mudar a partir daí. O que nos espera nesta incrível comédia romântica?!
          ru: Двадцатилетний никудышный студент университета муниципального района Киносита Кадзуя. Встреча с «особенной»
            красавицей ознаменует начало изменений в его жизни?!
          es-la: Kinoshita Kazuya es un estudiante universitario normal al que su novia acaba de dejar por otro chico. Sintiéndose
            deprimido, decide usar una aplicación llamada Diamond para contratar a Mizuhara Chizuru, una novia de alquiler,
            para sentirse mejor. Desde su primer encuentro con ella, parece ser la chica perfecta para él, pero ¿hay más en
            ella de lo que parece? ¿Y cómo se desarrollará su relación no muy típica?
          pt-br: Kazuya Kinoshita é um estudante universitário inútil que decide utilizar um aplicativo de relacionamentos
            depois de ter levado um fora de sua namorada. Assim, o rapaz conhece uma bela garota chamada Chizuru Mizuhara
            e a vida dos dois começa a mudar a partir daí. O que nos espera nesta incrível comédia romântica?!
