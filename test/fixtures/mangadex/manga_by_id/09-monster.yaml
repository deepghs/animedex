        - en: Hori-san and Miyamura-kun
        description:
          de: |-
            Kyoko ist in der Schule allen bekannt als klug, hübsch und beliebt. Ihr Klassenkamerad Izumi hingegen ist schüchtern und sehr zurückhaltend. Kein Wunder, dass beide Ihren Augen nicht trauen können, als plötzlich ein gepiercter Izumi in Punkklamotten vor der ungestylten Stubenhockerin Kyoko steht.
            Sind sich die beiden oberflächlich unterschiedlichen Teenager vielleicht doch nicht so unähnlich?
          en: "Kyoko Hori is your average teenage girl… who has a side she wants no one else to ever discover. Then there's\
            \ her classmate Izumi Miyamura, your average glasses-wearing boy — who's also a totally different person outside\
            \ of school. When the two unexpectedly meet, they discover each other's secrets, and a friendship is born.\n\n\
            ---\nHori may seem like a normal teenage girl, but she's a completely different person after school. In her workaholic\
            \ parents' absence, Hori has been like a parent for her little brother since she was young herself. Between taking\
            \ care of her brother, feeding them both, and housework, she doesn't have much time for a usual teenage social\
            \ life. \n\nOne day, she meets someone else who does not present his true self at school: a quiet, glasses-wearing\
            \ boy called Miyamura. She'd assumed he was bookish, and possibly an otaku, but Hori couldn't have been more wrong.\
            \ Outside of school, Miyamura is a friendly guy with many piercings, and he's not very good at academics. Now\
            \ the two of them have someone with whom they can share both halves of their lives!"
          es: |-
            Todos nos ocultamos tras una máscara... ¡algunas más raras que otras!

            Kyôko es una alumna modélica y popular que al llegar a casa se convierte en una chica hogareña muy discreta. Miyamura, su compañero de clase, es un tipo del montón con cierto aire de friki que en sus ratos libres se transforma en un chico muy atractivo con piercings y mucho estilo. ¿Qué ocurriría si Izumi y Kyôko descubrieran la cara oculta el uno del otro?
          fr: |-
            D'un côté, il y a Hori, la lycéenne à la mode et populaire à première vue, mais qui est en fait une fille très simple et qui pense avant tout à sa famille. Et de l'autre, il y a Miyamura, le lycéen réservé qui se cache derrière ses lunettes, mais qui est en réalité un garçon chaleureux et aux nombreux piercings. Que se passe-t-il quand les deux se rencontrent par hasard sous leur véritable jour ?

            ---

            Maison d'édition FR : **Nobi Nobi**
          id: |-
            Kisah masa muda yang penuh riak dan gejolak!!

            Hori adalah siswi SMA yang di luar tampak penuh gaya, namun di rumah sibuk mengurus pekerjaan rumah tangga dengan wajah polos tanpa make up.
            Sedangkan Miyamura adalah siswa yang di sekolah tampak biasa, namun sebenarnya adalah cowok cantik penuh tindikan dan tato di sekujur tubuh.

            Apa yang terjadi saat dua orang yang tampak bertolak belakang namun sesungguhnya mirip itu berjumpa!?
          ja: |-
            青春、超微炭酸系。

            一見派手だけど実は家庭的な女子高生・堀さんと、一見地味だけど実はピアスと刺青だらけの男子高生・宮村くんの日常を描いた大人気ＷＥＢコミック「堀さんと宮村くん」が、作画を新たにコミック化！
          mn: Сургуулийн амьдралын өхөөрдөм, “аавв”-ийг дуудах хайрын түүх эхэлж байна!! Сургууль дээрээ Хори Кёоко нь ухаантай,
            царайлаг, алдартай охин гэдгээрээ танигдсан. Харин түүний ангийнхан болох Мияамүра Изүми нь уйтгартай, бүрэг зантай
            нэгэн гэж бодогддог ба ихэвчлэн “дэмийхэн аниме фанат” маягаар л хардаг. Гэвч өдрүүдийн нэгэн өдөр гэрийн халамжит,
            энгийн төрхтэй Хоригийн үүдэнд чих, шивээ татуулсан, тэр байтугай бүр гайхалтай царайлаг Мияамүра гэнэт гарч ирэхэд
            — энэ хоёр, тэс өөр боловч нэгэн төрлийн залуус, хүн бүрийн дотор олон тал байдаг гэдгийг ойлгож эхэлнэ...
          pl: Hori to na pierwszy rzut oka zwykła nastolatka. Nikt z jej kolegów nie ma pojęcia, że ciąży na niej obowiązek
            zajmowania się młodszym bratem i że po szkole zmienia się... w perfekcyjną panią domu!
          ru: 'Хори пытается казаться обычной старшеклассницей, тогда как на самом деле уделяет все свое время уходу за домом.
            Из-за постоянного отсутствия родителей-трудоголиков девушке приходится заменять младшему брату семью, заниматься
            уборкой, стиркой и прочими домашними делами. Однажды она встречает человека, который, так же как и она, старается
            не открывать свою настоящую сторону личности в школе: Миямура - молчаливый парень в очках. Теперь им двоим есть
            с кем поделиться и раскрыть настоящих себя, не боясь, что об этом узнают в школе.'
          tr: |-
            Kyoko Hori sıradan... ve kimsenin keşfetmemesini istediği bir tarafı olan liseli bir kız. Ve tabii bir de sınıf arkadaşı olan Izumi Miyamura var, sınıfın klasik gözlüklü çocuğu — ve okul dışında kesinlikle bambaşka birisine dönüşüyor.

            İkisi bir rastlantıyla tanıştıklarında, birbirlerinin sırlarını öğreniyorlar, ve bir arkadaşlık ilişkisi kuruluyor.

            ---
            Okulda zeki, başarılı ve popüler bir kız olmasıyla tanınan Kyouko Hori, aslına bakarsınız okul dışında arkadaşlarının onu tanıdığından çok farklı biri. İşkolik anne ve babasının yokluğunda erkek kardeşine bakmak, alışveriş ve ev işlerini yapmak zorunda olan Hori’nin, arkadaşları gibi gezip eğlenmeye ayıracak hiç zamanı yok.

            Bir gün sessiz, sıkıcı sınıf arkadaşı beklenmedik bir şekilde ve okuldakinden bambaşka bir görünümle karşısında belirdiğinde, Hori her insanın başkalarından gizlediği bir yanı ve her hikâyenin birden fazla tarafı olduğunu keşfeder! Böylece Hori’nin hayatında yeni bir sayfa açılır!

            Okul hayatı, arkadaşlıklar ve kendini keşfetme hakkında ilham verici hikâyesiyle Horimiya sizi etkisi altına alacak!
          uk: |-
            Старшокласниця Хорі — ефектна учениця, красуня та розумниця, проте вдома — проста, хазяйновита, дбає про молодшого брата, оскільки батьки занадто багато працюють. Вона зовсім немає часу на розваги й мандрівки, які так люблять її друзі.

            Міямура — тихий та відлюдькуватий однокласник, на якого ніхто не звертає уваги. А поза школою… Хорі скоро дізнається, що хлопець кардинально відрізнається від тієї лузерської маски, яку одягає в школі.

            «Хорімія» — манґа про юність із присмаком коли, від якої солодко стискає серце! Цікаво та дотепно про найважливіші проблеми шкільного життя, дружбу та самопізнання.
          vi: Câu chuyện thanh xuân nhẹ nhàng, giản đơn mà thú vị! Hori, nữ sinh cấp ba nhìn qua tưởng điệu đà nhưng thật
            ra lại giản dị, đảm đang việc nhà. Miyamura, anh chàng bốn mắt tầm thường khi ở trường, nhưng ra ngoài thì đẹp
            trai ngời ngời, khuyên đeo đầy người.
          pt-br: O doce e levemente ácido gostinho da juventude!! De um lado, Hori-san, que à primeira vista faz o tipo patricinha,
            mas na verdade é uma garota simples e prendada. Do outro, Miyamura-kun, que na escola emana um ar negativo com
            seus óculos e aparência sem graça, quando na verdade é um gato cheio de piercings. O que acontece quando o acaso
            faz com que esses dois, que parecem ser tão diferentes, mas têm tanto em comum, se encontrem.?!
          zh-hk: |-
            青春──超微碳酸系!!
            乍看之下很會打扮，
            但其實樸素又像家庭主婦的女高中生堀，
            與在學校是陰沉土氣眼鏡男，
            其實是身上穿了很多耳環的美型男宮村。
            有如正反兩極卻又相似的兩人，
            偶然相遇之後…！？
            酸酸甜甜又有點揪心的
            超微碳酸系校園生活第１集登場！
