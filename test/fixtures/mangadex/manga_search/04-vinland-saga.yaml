        - ur: وِنلینڈ ساگا
        - vi: Truyền thuyết miền đất hứa
        description:
          en: |-
            As a child, Thorfinn sat at the feet of the great Leif Ericson and thrilled to wild tales of a land far to the west. But his youthful fantasies were shattered by a mercenary raid. Raised by the Vikings who murdered his family, Thorfinn became a terrifying warrior, forever seeking to kill the band's leader, Askeladd, and avenge his father. Sustaining Thorfinn through his ordeal are his pride in his family and his dreams of a fertile westward land, a land without war or slavery... the land Leif called Vinland.
            ___
            - **Won the Japan Media Arts Award Division Grand Prize in 2009**
            - **Won the 36th Kodansha Manga Award for General Manga in 2012**
          ja: 千年期の終わり頃、あらゆる地に現れ暴虐の限りを尽くした最強の民族、ヴァイキング。そのなかにあってなお、最強と謳われた伝説の戦士が息子をひとり授かった。トルフィンと名づけられた彼は、幼くして戦場を生き場所とし、血煙の彼方に幻の大陸“ヴィンランド”を目指す！！
          ru: Эта история случилась в начале XI века, когда викинги, безраздельно господствовавшие в северных морях, грабили
            побережья Франции и Англии. В эпоху, где оружие значило больше, нежели слова, маленький мальчик невольно оказывается
            косвенной причиной гибели своего отца. Повзрослев и став на путь воина, он жаждет честного поединка с убийцей
            отца – легендарным главарём отряда викингов-наемников, но возраст и отсутствие опыта не позволяют ему сделать
            это. Чтобы не упускать своего врага из виду, юноша вступает в его отряд и в награду за выполнение тяжелого боевого
            задания требует поединка с ним, но терпит поражение. Юноша продолжает прилагать все усилия, чтобы осуществить
            свою месть. Внезапно он оказывается вовлечён в куда более кровавое столкновение…
          tr: Çocukken Thorfinn, büyük Leif Ericson'un ayaklarının dibinde oturur ve batıdaki uzak diyarların vahşi masallarıyla
            heyecanlanırdı. Ama gençlik hayalleri bir paralı asker baskınıyla paramparça oldu. Ailesini öldüren Vikingler
            tarafından yetiştirilen Thorfinn, grubun lideri Askeladd'ı öldürmek ve babasının intikamını almak isteyen korkunç
            bir savaşçı oldu. Thorfinn'i çileli yaşamı boyunca ayakta tutan, ailesiyle olan gururu ve batıdaki bereketli topraklara,
            savaşın ve köleliğin olmadığı bir ülkeye, Leif'in Vinland adını verdiği topraklara dair hayalleridir.
          pt-br: Thorfinn é filho de Thors, um lendário guerreiro viking, mas que após anos no campo de batalha, descobre
            uma coisa mais maravilhosa que matar seus iguais. Viver sua própria vida, em paz. Mas os ventos lhe trazem uma
            notícia que atrapalhará seus dias de paz, e Thorfinn, seu filho, pouco sabe desta vida passada de guerra de seu
            pai. Após descobrir o passado de seu pai, Thorfinn se revolta contra ele, e sai para a guerra junto de seu pai,
            mas quando reconhece o verdadeiro valor dele, já é tarde demais. Agora Thorfinn deverá seguir sua própria vida,
            seguindo valores que seu pai lhe ensinou, mas sem perder sua coragem. Este é só o começo desta grande saga de
            Thorfinn que acompanha os Vikings no século XI!
