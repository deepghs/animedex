    - id: 34f45c13-2b78-4900-8af2-d0bb551101f4
      type: manga
      attributes:
        title:
          en: Dorohedoro
        altTitles:
        - ru: Дорохедоро
        - he: דורוהדורו
        - ja: ドロヘドロ
        - zh: 异兽魔都
        - ko: 도로헤도로
        - uk: Дорохедоро
        description:
          en: "This is the story of Kaiman, a guy who does not remember who he was before he was transfigured by a Magic user.\
            \ \nThis transformation left him with a reptile's head, and a desire to find out the truth about who he really\
            \ is. \nAccompanied by Nikaido, his female companion, he tracks down Magic Users in \"The Hole\" and unceremoniously\
            \ \nchomps down on their head, hoping to find out who it was that put him in this state. \nOne by one, they witness\
            \ this \"second man\" inside the head of Kaiman, and after pulling them back out of his mouth \nhe asks them all\
            \ a question \"What did the guy inside my head say?\"  \n\n\n---"
          ru: "В городе, настолько мрачном, что все называют его Дырой, люди живут в постоянном страхе. Воздух и земля пропитаны\
            \ магическим дымом, и никто уже не удивляется тому, что от выпавшего дождика начнут вдруг прохожие валиться штабелями\
            \ или городское кладбище превратится в поле битвы людей против зомби. Маги, из-за которых творится вся эта чертовщина,\
            \ периодически делают вылазки в Дыру и испытывают на жителях свои приёмчики. После одной такой вылазки Никайдо,\
            \ сборщик трупов, находит огромное бездыханное тело какого-то бедняги с головой крокодила. Кайман (так называет\
            \ его Никайдо) удаётся выжить, но очнувшись, он понимает, что потерял память. Кайман вместе с Никайдо начинают\
            \ охоту на магов, чтобы вернуть себе человеческий облик и потерянные воспоминания.  \n  \n\n\n---\n\n**Links:**\
            \  \n- [Anime Season 1 on ANN](https://www.animenewsnetwork.com/encyclopedia/anime.php?id=22562)"
