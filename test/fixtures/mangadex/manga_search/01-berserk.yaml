    - id: 30196491-8fc2-4961-8886-a58f898b1b3e
      type: manga
      attributes:
        title:
          ja-ro: Boushoku no Berserk ~Ore dake Level to Iu Gainen wo Toppa suru~
        altTitles:
        - ja: 暴食のベルセルク～俺だけレベルという概念を突破する～ THE COMIC
        - ja-ro: Boushoku no Berserk ~Ore dake Level to Iu Gainen o Toppa suru~
        - en: 'Berserk of Gluttony: The One that Exceeds the Concept of Levels'
        - ko: 폭식의 베르세르크 ~나만 레벨이라는 개념을 돌파한다~
        - zh: 狂怒的暴食 ～只有我突破了等级这概念～
        - zh-hk: 狂怒的暴食 ～僅自己突破了等級這概念～
        - fr: 'Berserk de la Gourmandise : Celui qui surpasse le concept même de niveaux'
        - pl: Berserk obżarstwa
        - ru: Ненасытный Берсерк
        - vi: Bạo Thực Cuồng Nhân
        description:
          en: In this world, there are two types of people. Those Who have powerful "skills", and those who don't. People
            born with powerful skills, exterminate monsters to level up and become successful, while people without them,
            become failures, who are treated harshly by society. Follow the story of Fate, a guy who works as a gatekeeper,
            and whose only skill is gluttony, a skill that only makes him hungry.
          fr: "Dans ce monde, il y a deux types de personnes. Ceux qui ont un ou plusieurs \"talents\", et ceux qui n'en possèdent\
            \ pas. Les personnes nées avec de puissant talents, exterminent les monstres pour monter en niveaux et devenir\
            \ puissants, alors que ceux qui n'en possèdent pas deviennent des échecs et sont traités durement par la société.\
            \ Nous suivons l'histoire de Fate, un homme travaillant comme garde aux portes de la ville et dont son seul talents\
            \ est la gourmandise, un talent qui ne fait que lui donner faim.  \n\n\n---"
          ja: |-
            暴食《スキル》が真の姿を見せたとき、少年の運命が動き始める――

            スキルの優劣が絶対の世界で《暴食》という腹が減るだけのスキルを持って生まれた少年フェイト。無能と蔑まれ、危険で薄給な城の門番で日銭を稼ぐ最底辺の生活を強いられていたある日、城に侵入した賊を仕留めたことで《暴食》の真の能力、「殺した相手のスキル、能力を奪い取る」力が発動する――
          ro: "În lumea asta sunt două tipuri de oameni: cei care posedă “puteri” incredibile și cei care nu.  \nCei care\
            \ au fost născuți cu asemenea “puteri” extermină monștrii, evoluează și devin oameni de success, în timp ce ceilalți\
            \ devin eșecuri, și sunt tratați diferit de societate.  \nCitește povestea lui Fate, un tip ce lucrează ca și\
            \ gardian, a cărui putere este lăcomia, o putere care îl face să fie mereu înfometat.   \n  \n\n\n---\n\n**Links:**\
            \  \n- [Author's Twitter](https://twitter.com/isshiki_ichika)  \n- [Original Web Novel](https://ncode.syosetu.com/n6887dt/)\
            \ (Raw)  \n- Original Comic on **[** [Comic Ride](http://comicride.jp/gluttony/) **|** [NicoNico](http://seiga.nicovideo.jp/comic/31663)\
            \ **]** (Raw)"
          ru: "В этом мире есть два типа людей. Те, у кого есть сильные «навыки», и те, кто их не имеет. Люди, рожденные с\
            \ мощными навыками, уничтожают монстров, чтобы стать успешными, в то время как люди без них становятся неудачниками,\
            \ к которым жестоко относится общество. В нашей истории, парень, который работает в качестве привратника, и чье\
            \ единственное умение — обжорство, умение, которое только делает его голодным.   \n  \n\n\n---"
          vi: 'Fate, một người lính gác cổng thành, sống một cuộc sống với vô vàn rắc rối. Cơn đói khát luôn cào xé Fate ngay
            từ lúc anh mới lọt lòng bởi《Bạo Thực》- một quyền năng được Chúa ban tặng. Nhìn qua nó đúng là một kỹ năng vô dụng,
            chỉ khiến cho người sở hữu đói đến phát điên, nhưng như tảng băng trôi, năng lực ấy còn có khả năng tiềm ẩn chưa
            một ai thấy được. Một ngày nọ, sau khi hạ gục một tên trộm cả gan đột nhập vào lâu đài, Fate đã khai phá được
            sức mạnh thật sự của《Bạo Thực》. Một kỹ năng nuốt chửng toàn bộ linh hồn những đối tượng bị Fate đánh bại, hấp
            thụ toàn bộ sức mạnh của chúng. Lần đầu tiên trong đời, Fate thỏa mãn được cơn đói khát của mình. Dần dần, một
            người vốn bị đối xử như đống rác rưởi, bị xã hội ruồng bỏ; bắt đầu vực dậy và ngẩng cao đầu. Phá vỡ khái niệm
            “level” - thứ đang chi phối cả thế giới này, anh gieo rắc nỗi sợ với sức mạnh huỷ diệt của mình, cùng với danh
            xưng đầy tự hào: Bạo Thực Cuồng Nhân…'
          pt-br: Neste mundo, existem dois tipos de pessoas. Aqueles que têm poderosas “habilidades” e aqueles que não. As
            pessoas nascidas com habilidades poderosas exterminam monstros para subirem de nível e se tornarem bem-sucedidas,
            enquanto as pessoas sem eles, tornam-se fracassos, que são tratados com dureza pela sociedade. Fate é um cara
            que trabalha como um porteiro, e cuja única habilidade é a gula, uma habilidade que o faz comer almas.
