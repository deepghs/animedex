        - az: Jujutsu Kaisen 0
        - az: 'Jujutsu Kaisen 0: Tokyo Metropoliteni Lənətli Texnika Məktəbi'
        description:
          az: |-
            Okkotsu Yuuta əsəbi və qorxaq bir lisey şagirdidir. Lakin onun böyük bir problemi var — uşaqlıq sevgisi Rika artıq bir lənətə çevrilib və onu tərk etmir. Rika adi bir lənət olmadığı üçün bu vəziyyət Gojo Satoru adlı müəllimin diqqətini çəkir. O, Tokyo Metropoliteni Lənətli Texnika Məktəbində dərs deyir — burada gələcək lənət ovçuları yetişdirilir.

            Gojo Yuuta-nı bu məktəbə qoşulmağa razı salır. Bəs Yuuta onu izləyən bu təhlükəli lənətlə üzləşmək üçün kifayət qədər güclənə biləcəkmi?
          en: |-
            Okkotsu Yuuta is a nervous high school student suffering from a serious problem—his childhood love Rika has turned into a curse and won't leave him alone. Since Rika's no ordinary curse, his plight is noticed by Gojou Satoru, a teacher at Jujutsu Technical School, a school where fledgling exorcists learn how to combat curses. Gojou convinces Yuuta to enroll, but can he learn enough in time to confront the curse that haunts him? (Edited VIZ)

            The official predecessor miniseries to Gege Akutami's hit serialization, *Jujutsu Kaisen*!
          ru: Приквел манги "Магическая Битва", что рассказывает историю Оккоцу Юута, который был проклят могущественным духом
            "Оримото Рика" и хочет научиться ее контролировать.
          uk: 'Усе життя Оккоцу Юуту переслідує привид - жорстоке чудовисько, одержиме його захистом, яке нещадно вбиває та
            калічить усіх його кривдників. Після чергового інциденту його затримують люди, які називають себе магами: вони
            захищають цей світ від подібних створінь, лишаючись у тіні. І в одного з них, Ґоджьо Сатору, уже є на хлопця свої
            плани: тепер Юута має перевестися до Токійської старшої магічної школи та взяти під контроль своє "прокляття",
            щоб допомагати іншим. Утім, протягом першого року навчання Оккоцу доведеться дізнатися, що у світі магів існують
            монстри набагато страшніші, ніж прокляття...'
