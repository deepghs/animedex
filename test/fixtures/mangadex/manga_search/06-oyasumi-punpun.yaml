        description:
          en: "Punpun Onodera is a normal 11-year-old boy living in Japan. Hopelessly idealistic and romantic, Punpun begins\
            \ to see his life take a subtle—though nonetheless startling—turn to the adult when he meets the new girl in his\
            \ class, Aiko Tanaka. It is then that the quiet boy learns just how fickle maintaining a relationship can be,\
            \ and the surmounting difficulties of transitioning from a naïve boyhood to a convoluted adulthood. When his father\
            \ assaults his mother one night, Punpun realizes another thing: those whom he looked up to were not as impressive\
            \ as he once thought.  \r\n  \r\nAs his problems increase, Punpun's once shy demeanor turns into voluntary reclusiveness.\
            \ Rather than curing him of his problems and conflicting emotions, this merely intensifies them, sending him down\
            \ the dark path of maturity in this grim coming-of-age saga."
          sr: "Laku noć, Punpune priča o odrastanju običnog klinca u gradu kao i svakom drugom. Njegova porodica je disfunkcionalna,\
            \ nije najbistriji ni najmarljiviji đak i jedino što mu ide od ruke je što može da razgovara sa Bogom kada god\
            \ to poželi. Ipak, sve to će se promeniti kada u njegovo odeljenje dođe Aiko, a iz njegovog doma odu roditelji.\r\
            \n\r\nPunpun želi da osvoji Nobelovu nagradu i spasi svet.\r\nPunpun želi da se njegovi ne svađaju toliko.\r\n\
            Punpun želi da se dopadne svojoj simpatiji.\r\nPazi šta želiš, Punpune.\r\n\r\n„Laku noć, Punpune je uspeo ono\
            \ što su retki planetarno popularni serijali doživeli, a to je da prevaziđe svoju nametnutu ciljanu publiku (tinejdžeri\
            \ i mladići) i postane manga van žanra, manga iz koje mladi upijaju i uče dok se stariji podsećaju i prihvataju.“\r\
            \n\r\n– Aleksandar Nešić, sa websajta Lagune"
          uk: Онодера Пунпун — звичайний японський 11-річний хлопчик. Його безнадійно ідеалістичні та наївні погляди на життя
            починають повільно, та все ж неминуче змінюватися, коли до його класу переходить нова дівчина - Танака Аіко. Пунпун
            дізнається наскільки непостійними можуть бути стосунки, наскільки важким може бути дорослішання і наскільки сильно
            світ відрізняється від того, яким він його колись уявляв.
