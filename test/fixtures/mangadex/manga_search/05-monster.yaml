    - id: 9d351a80-5037-4334-a020-6985899f5b1f
      type: manga
      attributes:
        title:
          ja-ro: Maou ni Natta node, Dungeon Tsukutte Jingai Musume to Honobono Suru
        altTitles:
        - ja: 魔王になったので、ダンジョン造って人外娘とほのぼのする
        - en: Now I'm a Demon Lord! Happily Ever After with Monster Girls in My Dungeon
        - ko: 마왕이 됐으므로 던전을 만들고 인외아가씨와 훈훈해진다
        - zh: 魔王建造地下城转生到异世界建造人外娘
        - zh-hk: 魔王建造地下城轉生到異世界建造人外娘
        - ru: Я стал Повелителем Демонов и создал подземелье, чтобы проводить время с девушками-монстрами
        - vi: Sau Khi Tôi Là 1 Ma Vương, Tôi Sẽ Xây Dựng Hầm Ngục Cùng Với Các Nô Lệ!
        - ro: Acum Sunt Un Demon Lord! Fericit Până La Adânci Bătrâneți Alături De Fete Monstruoase În Temnița Mea
        description:
          en: "Before I realized, I had become the guardian of a dungeon, a Demon Lord. I was suddenly in a dangerous world\
            \ with giant monsters loitering around, fighting for their existence. So I thought to go about developing the\
            \ dungeon in order to not die, but for some reason I was having quite the good time... How did it turn out like\
            \ this?  \n  \nThe protagonist, Yuki, having to live in that world now, uses his bold and sharp senses and spends\
            \ time with a supreme dragon girl and a vampire girl, sometimes laughing, sometimes being angry, passing days\
            \ doing what he likes."
          ja: 異世界転生したユキは、気付くとダンジョンの魔王になっていた!? チートな強さで人外娘達を助けたり、超便利なカタログ通販（？）でダンジョンに凶悪な罠を仕掛けたりとやりたい放題。自由と平和を守るため、快適＆最凶ダンジョン造りを目指せ！
            人気WEB小説コミカライズ!!
          vi: Trước khi nhận ra, tôi đã trở thành người bảo vệ của một ngục tối, một Chúa Quỷ. Tôi bỗng nhiên bị cuốn vào
            một thế giới nguy hiểm với những con quái vật khổng lồ lang thang quanh đó, chiến đấu để tồn tại. Vì vậy, tôi
            quyết định phát triển ngục tối để không bị chết, nhưng không hiểu sao tôi lại cảm thấy khá thích thú với việc
            này... Làm sao mà lại trở thành như vậy? Nhân vật chính, Yuki, buộc phải sống trong thế giới này, sử dụng khả
            năng nhạy bén và tinh tế của mình, cùng thời gian bên một cô gái rồng tối thượng và một cô gái ma cà rồng, đôi
            khi cười, đôi khi tức giận, trải qua những ngày tháng làm những gì mình thích
          es-la: Antes de darme cuenta, me había convertido en el guardián de una mazmorra, un Señor Demonio. De repente,
            estaba en un mundo peligroso con monstruos gigantes holgazaneando, luchando por la existencia de la mazmorra para
            no morir, pero por alguna razón estaba pasando un buen momento ... ¿Cómo resultó esto? El protagonista, Yuki,
            usa sus sentidos audaces y agudos y pasa el tiempo con una niña dragón suprema y una niña vampiro; A veces riendo,
            a veces enojándose, pasando días haciendo lo que le gusta.
          pt-br: |-
            Antes que eu percebesse, eu havia me tornado o guardião de uma masmorra, um Lorde Demônio.  De repente, eu estava em um mundo perigoso com monstros gigantes vagando por aí, lutando por sua existência, então pensei em desenvolver a masmorra para não morrer, mas – por algum motivo eu estava me divertindo bastante….  Como ficou assim?

             O protagonista, Yuki, tendo que viver naquele mundo agora, usa seus sentidos ousados ​​e afiados e passa o tempo com uma suprema garota dragão e uma garota vampira;  Às vezes rindo, às vezes com raiva, passando dias fazendo o que gosta.
