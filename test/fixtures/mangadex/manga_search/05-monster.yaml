      attributes:
        title:
          ja-ro: Saikyou Onmyouji no Isekai Tenseiki ~Geboku no Youkaidomo ni Kurabete Monster ga Yowai Sugirundaga~
        altTitles:
        - ja: 最強陰陽師の異世界転生記～下僕の妖怪どもに比べてモンスターが弱すぎるんだが～（コミック）
        - en: The Reincarnation of the Strongest Exorcist in Another World
        - zh: 最强阴阳师的异世界转生记
        - zh-hk: 最強陰陽師的異世界轉生記 ～怪物比我的下僕妖怪弱太多了～
        description:
          en: "Haruyoshi Kuga's power as the strongest exorcist is all for naught when he is betrayed by his closest ally.\
            \ With his dying breath, he casts the secret Spell of Reincarnation — when he next opens his eyes, he finds himself\
            \ in a different world altogether, reincarnated as Seika Lamprogue, the son of a family of magic scholars! He\
            \ quickly learns that the magic in this new world is quite unlike the sorcery he learned in his past life and\
            \ that he can't use it. Fortunately for him, with his mastery of curses and the hordes of youkai at his disposal,\
            \ he doesn't need to. \n\nHaruyoshi (now Seika) is determined not to repeat his past mistakes in his second life\
            \ by smartly laying low and avoiding flaunting his power. Yet accomplishing his goals and without drawing attention\
            \ to himself proves to be easier said than done — will his powers be enough to live a happy life?!\n___\n[Official\
            \ English Light Novel](https://j-novel.club/series/the-reincarnation-of-the-strongest-exorcist-in-another-world)"
          ja: 仲間の裏切りにより死に瀕していた最強の陰陽師ハルヨシは、来世こそ幸せになりたいと願い、転生の秘術を試みた。術が成功し、転生した先はなんと異世界だった！魔法使いの大家の一族に生まれるも、魔力なしの判定。しかし、間近で目にした魔法は陰陽術の足下にも及ばなくて……あれ、魔法いらないんじゃない！？――極めた陰陽術と従えたあまたの妖怪がいれば異世界生活も楽勝！
