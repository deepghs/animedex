        description:
          en: "A manga writer/artist duo are trying their best to have their work accepted by someone who appears to be their\
            \ superior. However, their latest work has been denied!  \nTheir superior requests that they write a manga about\
            \ a drama where a man protects the peace of the world. The two get together and begin to write a manga about a\
            \ boy who promises a girl protection!  \n  \nThe leads in this story are the duo mangaka mentioned in the 20th\
            \ Century Boys manga, who together go by the name of Ujiko Ujio, a pun on the duo who went by Fujiko Fujio (FUJIKO\
            \ Fujio (A) and FUJIKO F. Fujio), the creators of Doraemon.  \n(1 volume complete)"
