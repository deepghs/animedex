    - id: e896c48c-3150-437d-ba57-d8567eb399ae
      type: manga
      attributes:
        title:
          en: Chainsaw Man (Official Colored)
        altTitles:
        - en: Chainsaw Man - Digital Colored Comics
        - fr: Chainsaw Man (Couleur Officielle)
        - kk: Шынжыра адам (Түрлі Түсті)
        - ja: チェンソーマン カラー版
        - kk: Шынжара жан (Түрлі түсті)
        - uz: Arra Odam (Original Rangli)
        - sr: ČOVEK TESTERA
        description:
          en: Broke young man + chainsaw demon = Chainsaw Man!   Denji was a small-time devil hunter just trying to survive
            in a harsh world. After being killed on a job, he is revived by his pet devil-dog Pochita and becomes something
            new and dangerous—Chainsaw Man!
          fr: |-
            Jeune homme fauché + démon-chien-tronçonneuse = Chainsaw Man!

            Tout est dans le titre! La vie précaire de Denji change à jamais quand il fusionne avec son chien-tronçonneuse de compagnie, Pochita! Maintenant, il vit en centre-ville et est un Devil Hunter officiel. Mais il a beaucoup à apprendre de son nouveau job et de ses pouvoirs de tronçonneuse!
            Maintenant en couleur!
          kk: '«Мен әрқашан қарапайым өмір сүруді армандадым: жылы төсекте ұйықтау, таңертең тосаппен нан жеу, қызыммен кездесуге
            бару және күнде күлімдеу. Әкемнің өлімімен кейін бәрі өзгерді - енді, Почита, өлтіретін кез келді!» - бұл сөзбен  Денжи
            өзінің шынжырлы иті Почитамен бірге басқа шартқа аттанады, өйткені олар сайтан аулаушылар. Күн сайын олар ақша
            үшін өлтіреді, оны Денджи бір якудзаға беруі керек, әйтпесе ол марқұм әкесінің қарызын өз өмірімен өтеуі керек.
            Бірақ Дэнджи барлық қарызын өтеген кезде оны не күтіп тұр: ол қарапайым өмір сүре ме, әлде әлемді сайтандардан
            құтқара ма? Мүмкін тағдырдың кейіпкерге қатысты өз жоспарлары бар шығар?'
          pt-br: Quando seu pai morreu, Denji ficou preso com uma dívida que era incapaz de pagar. Mas graças à ajuda de um
            cachorro demônio que ele salvou chamado Pochita, Denji é capaz de sobreviver como caçador de demônios de aluguel.
            Os poderes de serra elétrica do Pochita são bem poderosos contra estes demônios. E então, quando o Denji acaba
            sendo morto por um demônio, o Pochita desiste de sua vida para revivê-lo. Mas, agora o Denji renasceu como um
            hibrido de demônio com humano... Agora ele é o "Chainsaw Man"!
