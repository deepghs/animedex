        description:
          en: "Growing up in the late 16th century Sengoku era Japan, Shinmen Takezou is shunned by the local villagers as\
            \ a devil child due to his wild and violent nature. Running away from home with a fellow boy at age 17, Takezo\
            \ joins the Toyotomi army to fight the Tokugawa clan at the Battle of Sekigahara. However, the Tokugawa win a\
            \ crushing victory, leading to nearly three hundred years of Shogunate rule. Takezo and his friend manage to survive\
            \ the battle and afterwards swear to do great things with their lives. However, after their paths separate, Takezo\
            \ becomes a wanted criminal and must change his name and his nature in order to escape an ignoble death.  \n \
            \ \n**Awards:**\n- Won the 24th Kodansha Manga Award in the general category in 2000.\n- Won the Tezuka Osamu\
            \ Cultural Prize in 2002 \n**Note:** was nominated for the 2003 Eisner Award in the Best Writer/Artist category."
          es: "Creciendo en el Japón de la era Sengoku de finales del siglo XVI, Shinmen Takezou es rechazado por los aldeanos\
            \ locales como un niño demonio debido a su naturaleza salvaje y violenta. A los 17 años, Takezou se escapa de\
            \ casa con un compañero y se une al ejército Toyotomi para luchar contra el clan Tokugawa en la batalla de Sekigahara.\
            \ Sin embargo, los Tokugawa obtienen una aplastante victoria, lo que da lugar a casi trescientos años de gobierno\
            \ del Shogunato. Takezou y su amigo consiguen sobrevivir a la batalla y después juran hacer grandes cosas con\
            \ sus vidas. Sin embargo, cuando sus caminos se separan, Takezou se convierte en un criminal buscado y debe cambiar\
            \ su nombre y su naturaleza para escapar de una muerte innoble.  \n  \n**Premios:**\n    - Ganó el 24º Premio\
            \ Kodansha de Manga en la categoría general en 2000.\n    - Ganó el Premio Cultural Tezuka Osamu en 2002\n   \
            \ **Nota:** fue nominado al Premio Eisner 2003 en la categoría de Mejor Escritor/Artista."
          es-la: "Creciendo en el Japón de la era Sengoku de finales del siglo XVI, Shinmen Takezou es rechazado por los aldeanos\
            \ locales como un niño demonio debido a su naturaleza salvaje y violenta. A los 17 años, Takezou se escapa de\
            \ casa con un compañero y se une al ejército Toyotomi para luchar contra el clan Tokugawa en la batalla de Sekigahara.\
            \ Sin embargo, los Tokugawa obtienen una aplastante victoria, lo que da lugar a casi trescientos años de gobierno\
            \ del Shogunato. Takezou y su amigo consiguen sobrevivir a la batalla y después juran hacer grandes cosas con\
            \ sus vidas. Sin embargo, cuando sus caminos se separan, Takezou se convierte en un criminal buscado y debe cambiar\
            \ su nombre y su naturaleza para escapar de una muerte innoble.  \n  \n**Premios:**\n    - Ganó el 24º Premio\
            \ Kodansha de Manga en la categoría general en 2000.\n    - Ganó el Premio Cultural Tezuka Osamu en 2002\n   \
            \ **Nota:** fue nominado al Premio Eisner 2003 en la categoría de Mejor Escritor/Artista."
