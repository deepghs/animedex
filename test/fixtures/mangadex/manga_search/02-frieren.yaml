      attributes:
        title:
          ja-ro: Sousou no Frieren
        altTitles:
        - en: 'Frieren: Beyond Journey''s End'
        - en: Frieren at the Funeral
        - ru: Фрирен, провожающая в последний путь
        - ja: 葬送のフリーレン
        - zh-hk: 葬送的芙莉蓮
        - ko: 장송의 프리렌
        - th: คำอธิษฐานในวันที่จากลา Frieren
        - el: 'Φρίρεν: Πέρα από το Τέλος του Ταξιδιού'
        - de: 'Frieren: Nach dem Ende der Reise'
        - en: 'Frieren: Remnants Of The Departed'
        - es-la: 'Frieren: Más allá del final'
        - es-la: 'Frieren: Más allá del fin del viaje'
        - vi: Pháp Sư Tiễn Táng Frieren
        description:
          el: Έχοντας νικήσει τον βασιλιά των δαιμόνων, το ταξίδι μιας δεκαετίας φτάνει στο τέλος του και μια νέα εποχή ειρήνης
            ξεκινά. Η ζωή όμως συνεχίζεται, ειδικά για την Φρίρεν, πως ως ξωτικό έχει ακόμα αιώνες ζωής μπροστά της. Με τις
            δεκαετίες να περνάνε, η Φρίρεν έρχεται αντιμέτωπη με την μεταβλητότητα του κόσμου και την παροδικότητα των ανθρώπων.
            Μετά από μια τελευταία συνάντηση με όλη την παλιά της ομάδα, συνειδητοποιεί ότι ο χρόνος που πέρασε με τους φίλους
            της ήταν υπερβολικά σύντομος και ότι δεν θα έχει ποτέ την ευκαιρία να τους μάθει καλύτερα. Έρχοντας αντιμέτωπη
            με την αλήθεια αυτή, η Φρίρεν αποφασίζει να ξεκινήσει ένα ακόμα ταξίδι αλλά αυτή τη φορά έχοντας σκοπό να μάθει
            το τι σημαίνει να είσαι άνθρωπος.
          en: The adventure is over but life goes on for an elf mage just beginning to learn what living is all about. Elf
            mage Frieren and her courageous fellow adventurers have defeated the Demon King and brought peace to the land.
            With the great struggle over, they all go their separate ways to live a quiet life. But as an elf, Frieren, nearly
            immortal, will long outlive the rest of her former party. How will she come to terms with the mortality of her
            friends? How can she find fulfillment in her own life, and can she learn to understand what life means to the
            humans around her? Frieren begins a new journey to find the answer.
          es: Frieren es una elfa, y como para todos los de su raza, los años pasan en un suspiro… pero no es así para sus
            antiguos compañeros de batalla, a los que Frieren verá morir y envejecer. De repente Frieren se da cuenta de que
            pese a que la vida avanza a un ritmo más lento para ella, las experiencias con sus seres queridos se le escapan
            de las manos. Un aire nostálgico envuelve a este manga fantástico tan entrañable que ha vendido ya más de 2,5
            millones de copias en Japón.
          fr: |-
            Que deviennent les héros une fois le mal vaincu ?
            Dans ce coffret collector : un jeu de 54 cartes entièrement personnalisé aux couleurs de la série et le manga avec une jaquette alternative réversible !

            Alors que Frieren et ses compagnons font halte dans la citadelle de Heiß, Stark propose à Fern d'aller en rendez-vous, sur le ton de la plaisanterie... et contre toute attente, la jeune fille accepte ! Sur les conseils de l'elfe, qui n'y connaît pas grand-chose, le guerrier emmène donc son amie faire le tour de la ville, ce qui leur permet de se rapprocher un peu.

            Après cette pause bienvenue, les trois aventuriers repartent sur les routes et arrivent au haut-plateau du Nord, une zone extrêmement dangereuse où pullulent aussi bien des monstres coriaces que des démons retors... Parviendront-ils à survivre dans cette région hostile ?
          vi: Tổ đội anh hùng đã đánh bại được quỷ vương và kết thúc cuộc hành trình của họ. Nhưng thế chưa phải là hết, cuộc
            đời của cô nàng pháp sư Elf này sẽ còn rất dài, hơn cả những người đồng đội cũ của cô, một cuộc phiêu lưu mới
            để cô trải qua nhiều cung bậc cảm xúc, cũng như là học hỏi thêm về con người.
          es-la: Tras cumplir su misión de derrotar al Rey Demonio, la maga elfo Frieren, el héroe Himmel, el sacerdote Heiter
            y el guerrero Eisen regresan a casa después de un viaje de una década donde disolverán su grupo y tomarán sus
            propios caminos. Pero el tiempo pasa de forma distinta para los elfos, Frieren comienza a ser testigo de como
            sus excompañeros sufren sus estragos y comienzan a morir lentamente y uno a uno. Antes de fallecer, Heiter el
            sacerdote, le impone a Frieren un aprendiz humana llamada Fern. Llevados por la afición que tiene la alfa por
            recolectar hechizos mágicos, ambos emprenderán una aventura, llena de magia e introspección, que los llevará a
            revisitar lugares que había conocido en su anterior travesía, mientras enfrenta el pesar que le causa descubrir
            todas las posibilidades que ha desperdiciado en su viaje que le hubiesen posibilitado entablar una relación más
            cercana con sus compañeros ahora fallecidos.
          zh-hk: 在打倒了魔王的勇者一行人当中，魔法使芙莉莲是精灵，她和其他三人有不一样的地方。 生活在“之后”的世界里，她感受到了什么—— 留下来的人们所编织的葬送与祈祷又意味着什么—— 故事从“冒险的结束”开始。 这是讲述英雄们的活法的，后日谈奇幻作品！
        isLocked: true
