        description:
          ar: أمضى الجاسوس الخبير المسمى <الشفق> أيامه في مهام سرية ، وكل ذلك من أجل تحقيق عالم أفضل. لكن في يوم من الأيام
            ، حصل على أمر جديد صعب للغاية من القيادة. من أجل مهمته ، يجب عليه تكوين أسرة مؤقتة وبدء حياة جديدة؟!
          en: The master spy codenamed <Twilight> has spent most of his life on undercover missions, all for the dream of
            a better world. Yet one day he receives a particularly difficult order from command. For his mission, he must
            form a temporary family and start a new life?!
          es: El hábil espía Tasogare se dedicaba diariamente a cumplir misiones especiales por un mundo mejor. Un día recibe
            un complicado desafío... Su deber es crear una familia falsa y comenzar una nueva vida para poder cumplir la misión,
            ¿¡pero...!? ¡¡Un Espía × Acción × Comedia de una familia peculiarl!!
          id: “Twilight,” seorang mata-mata yang hebat, setiap hari menjalankan misi rahasia untuk menciptakan dunia yang
            lebih baik. Suatu hari, dia mendapatkan perintah baru yang sangat sulit. Demi misi itu, dia harus memiliki keluarga
            sementara dan memulai hidup baru sebagai seorang ayah! Mata-mata x Aksi x Komedi keluarga istimewa!
          it: 'Twilight, una delle migliori spie al mondo, ha trascorso la vita ad affrontare missioni sotto copertura per
            rendere il mondo un posto migliore. Un giorno però riceve un compito particolarmente difficile: dovrà formare
            una famiglia temporanea e iniziare una nuova vita!'
          ja: 名門校潜入のために「家族」を作れと命じられた凄腕スパイの〈黄昏〉。だが、彼が出会った“娘”は心を読む超能力者！“妻”は暗殺者で！？
          kk: Мастер тыңшының кодтық аты<Twilight> өмірін жақсырақ әлем туралы арман үшін жасырын миссияларда өткізді. Бірақ
            бір күні ол командадан ерекше қиын жаңа бұйрық алады. Миссиясы үшін ол уақытша отбасын құрып, жаңа өмір бастауы
            керек пе?! Бірегей отбасы туралы тыңшылық/экшн/комедия!
          pl: "Wyśmienity szpieg, Zmierzch, poświęcił się wykonywaniu tajnych misji z powodu marzeń o lepszym świecie. Ale\
            \ pewnego dnia otrzymuje bardzo trudne do wykonania zadanie. Aby osiągnąć cel misji, musi założyć tymczasową rodzinę\
            \ i prowadzić życie najzwyczajniejszego w świecie ojca!  \r\nOto opowieść o jedynej w swoim rodzaju rodzinie!"
          ru: |-
            Мастерский шпион с кодовым именем <Сумрак> проводит свои дни в закулисных миссиях, всё ради мечты о лучшем мире. Но однажды он получает особенно сложное новое указание от командования. Для этой миссии он обязательно должен завести фиктивную семью и начать новую жизнь! Шпионская экшен-комедия об единственной в своём роде семье!

            ---
            Хитроумный шпион по прозвищу «Сумрак» изо дня в день выполнял секретные миссии, чтобы сделать мир лучше. Однажды он получил очередное трудное задание — ради миссии ему предстоит… обзавестись временной семьёй и начать новую жизнь?! Вас ждёт яркая смесь из шпионского боевика и необычной семейной комедии!
          th: สุดยอดสปาย "สนธยา" ได้ปฏิบัติการสอดแนมทุกๆวันเพื่อโลกที่ดีกว่า แต่แล้ววันนึงเขาก็ได้รับภารกิจสุดหิน... เพื่อการนั้นเขาจึงได้สร้างครอบครัวปลอมๆและเริ่มชีวิตใหม่!?
            สปาย x แอคชั่น x คอเมดี้ครอบครัวสุดแนว!
          uk: "Холоднокровний і геніальний шпигун з кодовим ім'ям «Сутінь» завжди виконував свою роботу чітко і без зайвого\
            \ шуму. Свою професію він обрав, плекаючи мрії про кращий світ. Він звик до надзвичайно складних завдань, важливість\
            \ яких мала найвищий рівень, виконуючи які, він наражав своє життя на небезпеку. Але цього разу… Йому була надіслана\
            \ інформація про нову місію, для успішного виконання якої «Сутінь» повинен завести сім'ю та вдавати відповідального\
            \ та люблячого батька на ім'я Лоід Фолджер. Так він «удочирив» дівчинку на ім'я Аня. Дівчинка відразу входить\
            \ у роль «дочки» і радіє кожній миті, яку проводить з новим «батьком». Тепер є тато та донька, але, як же мама?\
            \ Нею стане неповторна наймана вбивця на ім'я Юрі Бріар (позивний - \"Принцеса шипів\"). \nМанґа розкриє всі тонкощі\
            \ та незвичайний життєвий шлях нової «сім'ї», в якій кожен легко може виконати найскладніше завдання, або усунути\
            \ ціль, але чи зможуть вони виконувати ролі «мами», «тата» та «доньки»?"
          vi: Mỗi người đều có một phần bí mật của mình mà họ không thể cho ai khác biết. Vào thời điểm mà tất cả các quốc
            gia trên thế giới đang tham gia vào một cuộc chiến tranh thông tin khốc liệt xảy ra sau những cánh cửa đóng kín,
            Ostania và Westalis đã ở trong tình trạng chiến tranh lạnh với nhau trong nhiều thập kỷ. Bộ phận Tập trung vào
            phía Đông của Dịch vụ Tình báo Westalis (WISE) cử điệp viên tài năng nhất của họ, "Twilight", theo mật vụ tối
            mật để điều tra các chuyển động của Donovan Desmond, chủ tịch Đảng Thống nhất Quốc gia của Ostania, người đang
            đe dọa các nỗ lực hòa bình giữa hai quốc gia. Nhiệm vụ này được gọi là "Chiến dịch Strix". Nó bao gồm "tập hợp
            một gia đình trong một tuần để xâm nhập vào các cuộc tụ họp xã hội được tổ chức bởi ngôi trường ưu tú mà con trai
            Desmond theo học. "Twilight" lấy nhân dạng của bác sĩ tâm thần Loid Forger và bắt đầu tìm kiếm các thành viên
            trong gia đình. Nhưng Anya, cô con gái mà anh nhận nuôi, hóa ra lại có khả năng đọc được suy nghĩ của mọi người,
            trong khi vợ anh Yor lại là một sát thủ! Vì lợi ích riêng mỗi người đều giữ kín những bí mật này, họ bắt đầu sống
            cùng nhau và không để lộ danh tính thật của mình với nhau. Hòa bình thế giới giờ đây nằm trong tay của gia đình
            mới này khi họ dấn thân vào một cuộc phiêu lưu đầy bất ngờ.
          pt-br: 'O brilhante espião "Twilight" se dedicava diariamente a cumprir missões secretas por um mundo melhor. Porém,
            um dia, ele recebeu uma nova tarefa bastante complicada... Para cumprir a sua missão, ele deve formar uma família
            temporária e começar uma nova vida, mas...?! Uma história de Espiões × Ação × Comédia de uma família bem peculiar![
            1° TEMP.(parte 1 e 2) DO ANIME ADAPTOU ATÉ: Vol. 7, Cap 38. ][ 2° TEMP.(parte 1 e 2) DO ANIME ADAPTOU ATÉ: Vol.
            9, Cap.58. ]'
          zh-hk: 技藝高超的間諜<黃昏>，為了更加美好的世界,每天從事著諜報任務。有一天，司令下達了新的難題——…。為了完成任務，所臨時組建的家庭，所展開的新生活，但是！？間諜×打鬥×與眾不同的家族喜劇現在開始！！
