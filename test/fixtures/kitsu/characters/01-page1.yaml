        slug: edward-wong-hau-pepelu-tivrusky-iv
        names:
          en: Edward Wong Hau Pepelu Tivrusky IV
          ja_jp: エドワード・ウォン・ハウ・ペペル・チブルスキー4世
        canonicalName: Edward Wong Hau Pepelu Tivrusky IV
        otherNames:
        - Ed
        - Radical Ed
        - FranÃ§oise
        name: Edward Wong Hau Pepelu Tivrusky IV
        malId: 16
        description: The self-invented personal name of an elite net-diver from Earth, hacker "Radical Edward" is a very strange,
          somewhat androgynous, teenage girl assumed to be around 13 years in age. She has a feral aspect reflected in her
          mannerisms, bare feet, strange postures and gangling walk.  Ed could be considered a "free spirit"; she is fond
          of silly exclamations and childish rhymes, easily distracted, and the show's primary source of physical humor.  Over
          the course of the show she rarely walks anywhere, preferring to run, crawl, flip, roll, walk on her hands, or even
          just saunter. Ed is always barefoot. In one episode, she considers putting on socks and shoes, but quickly removes
          them, as even wearing socks hampers her, and she falls over seconds after putting them on; she also appears to be
          exceptionally strong and flexible, being able to support her weight on her arms for several minutes at a time, and
          to scratch her nose with her toe.  In the English version, she almost always refers to herself in the third person.  Not
          much is known about her origins, only that she spent some of her earlier childhood in an orphanage after being left
          there by her father, a man named Afedersiniz Hesap Lütfen (he calls Ed "Françoise", and may be of Turkish origin
          as his name means "excuse me, check please" in Turkish). In the manga it is revealed that she was a friend of a
          timid young boy in the orphanage known simply as "Tomato" (which also happens to be the brand name scrawled in katakana
          on her PC) who, like Ed, knew a great deal about computers and the net, and it is probably safe to assume that his
          friendship with Ed helped turn her into the genius-hacker she is today.  Ed's primary use to the Bebop crew is as
          a hacker; she is widely known to be a whiz kid behind a computer. Ed's computer of choice is a carry-along Tomato
          desktop, an homage to the portable flatpanel-outfitted Apple IIc from the 80s, and when traveling by foot she will
          balance it on her head.  Ed has a strong rapport with Jet, who acts as a surrogate father, and Faye, who acts as
          something of a big sister (much to Faye's chagrin). Ed also seems to be the only person who can understand Ein (though
          in a few instances Jet could understand Ein also).
