        name: Julia
        malId: 2735
        description: Julia is a beautiful and mysterious woman from both Spike and Vicious' pasts. A love triangle among the
          three caused Spike to leave the syndicate rather than challenge Vicious. Spike had wanted to take her with him when
          he left the syndicate, but she was blackmailed by Vicious into almost shooting Spike. Vicious found out they were
          planning to run away together and confronted Julia, telling her that she would have to kill Spike, or both of them
          would be killed. To protect not only herself but also the man she loved, she ran away, never meeting Spike at the
          cemetery as both of them had planned. (from Wikipedia)
