        title: Adventure
        description: Adventures are exciting stories, with new experiences or exotic locales. Adventures are designed to provide
          an action-filled, energetic experience for the viewer. Rather than the predominant emphasis on violence and fighting
          that is found in pure action anime, however, the viewer of adventures can live vicariously through the travels,
          conquests, explorations, creation of empires, struggles and situations that confront the main characters, actual
          historical figures or protagonists. Under the category of adventures, we can include traditional swashbucklers,
          serialized films, and historical spectacles, searches or expeditions for lost continents, "jungle" and "desert"
          epics, treasure hunts and quests, disaster films, and heroic journeys or searches for the unknown. Adventure films
          are often, but not always, set in an historical period, and may include adapted stories of historical or literary
          adventure heroes, kings, battles, rebellion, or piracy.
        totalMediaCount: 10744
