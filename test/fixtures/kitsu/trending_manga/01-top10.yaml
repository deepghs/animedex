        synopsis: |-
          The hunting hound of the Baskerville Clan, 'Bichir van Baskerville' followed the path of assassination and espionage he was set on to get his clan the title of greatest. The reward for his loyalty to his clan, however, was a false accusation of treachery, followed by the cold blade of the guillotine.

          "Never again will I live the life of a dog that's killed after the rabbit hunt is over."

          But when met with death, an unexpected opportunity had come for him. Bichir's eyes glowed while he sharpened his fangs in the dark.

          "Wait for me, Hugo. This time, it will be you I tear apart with these jaws."

          And so, the bloody revenge of the hound commences!

          (Source: KakaoPage, translated)
