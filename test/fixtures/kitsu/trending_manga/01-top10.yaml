        slug: muhanui-mabeopsa
        synopsis: A human’s dream of infinity is like a supernova explosion that spreads at the speed of light! This is the
          story of child named Shirone who was abandoned in a stable, wrapped in swaddling clothes. While growing up, he showed
          unbridled interest in everything related to books and strove to learn even on his own. Although Shirone was the
          foster son of a hunter, one of the lowest-class people, he was a genius in everything! One day, as a reward for
          mastering a legendary skill to knock down trees with a couple swings of an axe, his foster father takes him along
          on his trip to the city. And in that city, Shirone chances upon magic!
