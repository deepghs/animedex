        slug: eternally-regressing-knight
        synopsis: |-
          "You're a genius." Those words he heard as a child were poison.
          Encrid dreamed of becoming a knight, but he soon realized it was futile.
          "You want to live by the sword with that level of skill?" Some laughed at him.
          "Just give up." Some advised him against it.
          Despite that, his dream remained steadfast. He slept less, ran more, and trained harder.
          One day, he died, having been stabbed in the neck. Encrid opened his eyes again to "today's" morning.
