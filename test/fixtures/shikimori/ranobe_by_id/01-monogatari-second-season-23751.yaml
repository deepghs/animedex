      data-attrs="{&quot;id&quot;:57499,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Yotsugi Ononoki&quot;,&quot;russian&quot;:&quot;Ёцуги
      Ононоки&quot;}">Ёцуги Ононоки</a>. Или всё началось с того, что <a href="https://shikimori.io/characters/22052-mayoi-hachikuji"
