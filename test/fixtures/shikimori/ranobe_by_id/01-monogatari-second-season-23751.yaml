      Araragi&quot;,&quot;russian&quot;:&quot;Коёми Арараги&quot;}">Арараги</a> домой поиграть и поговорить о вечном? Или
      с того, что девочка оставила свой рюкзак дома у этого полувампира? Впрочем, не важно с чего началось, важно чем закончилось!<br>А
