      title="Tsubasa Hanekawa" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/22055-tsubasa-hanekawa/tooltip"
      data-attrs="{&quot;id&quot;:22055,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Tsubasa Hanekawa&quot;,&quot;russian&quot;:&quot;Цубаса
      Ханэкава&quot;}">Цубасы Ханэкавы</a> рассказывается о её встрече с <a href="https://shikimori.io/characters/87485-kako"
