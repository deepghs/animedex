      Araragi&quot;,&quot;russian&quot;:&quot;Коёми Арараги&quot;}">Арараги</a> куда-то запропастился, и разбираться со сверхъестественным
      <a href="https://shikimori.io/characters/22055-tsubasa-hanekawa" title="Tsubasa Hanekawa" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/22055-tsubasa-hanekawa/tooltip"
      data-attrs="{&quot;id&quot;:22055,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Tsubasa Hanekawa&quot;,&quot;russian&quot;:&quot;Цубаса
