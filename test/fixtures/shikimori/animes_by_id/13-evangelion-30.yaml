    description: В 2015 году на Землю вновь нападают Ангелы, загадочные существа, отличающиеся гигантскими размерами и сокрушительной
      силой. Единственной надеждой для спасения человечества являются Евангелионы (сокращённо — Евы), человекоподобные боевые
      машины, разработанные Nerv, специальным отделом Организации Объединённых Наций. Евы в состоянии отражать нападения Ангелов,
      однако есть одна особенность — пилотировать роботов может ограниченное число людей. Только горстка подростков, рождённых
      четырнадцать лет назад, через девять месяцев после первого появления Ангелов, может управлять Евами. Один из них — [character=89]Синдзи
      Икари[/character], отец которого является руководителем Nerv. Втянутый в водоворот битв и событий, которых он не понимает,
      Синдзи вынужден проникнуть в глубины собственного внутреннего мира, чтобы найти силы и храбрость не только для сражений,
      но и для выживания, иначе он рискует потерять всё.
    description_html: <div class="b-text_with_paragraphs">В 2015 году на Землю вновь нападают Ангелы, загадочные существа,
      отличающиеся гигантскими размерами и сокрушительной силой. Единственной надеждой для спасения человечества являются
      Евангелионы (сокращённо — Евы), человекоподобные боевые машины, разработанные Nerv, специальным отделом Организации
      Объединённых Наций. Евы в состоянии отражать нападения Ангелов, однако есть одна особенность — пилотировать роботов
      может ограниченное число людей. Только горстка подростков, рождённых четырнадцать лет назад, через девять месяцев после
      первого появления Ангелов, может управлять Евами. Один из них — <a href="https://shikimori.io/characters/89-shinji-ikari"
      title="Shinji Ikari" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/89-shinji-ikari/tooltip"
      data-attrs="{&quot;id&quot;:89,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Shinji Ikari&quot;,&quot;russian&quot;:&quot;Синдзи
      Икари&quot;}">Синдзи Икари</a>, отец которого является руководителем Nerv. Втянутый в водоворот битв и событий, которых
      он не понимает, <a href="https://shikimori.io/characters/89-shinji-ikari" title="Shinji Ikari" class="bubbled b-link"
      data-tooltip_url="https://shikimori.io/characters/89-shinji-ikari/tooltip" data-attrs="{&quot;id&quot;:89,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Shinji
      Ikari&quot;,&quot;russian&quot;:&quot;Синдзи Икари&quot;}">Синдзи</a> вынужден проникнуть в глубины собственного внутреннего
      мира, чтобы найти силы и храбрость не только для сражений, но и для выживания, иначе он рискует потерять всё.</div>
