      и до Исландии: в море у деревни, где живёт <a href="https://shikimori.io/characters/10138-thorfinn" title="Thorfinn"
      class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/10138-thorfinn/tooltip" data-attrs="{&quot;id&quot;:10138,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Thorfinn&quot;,&quot;russian&quot;:&quot;Торфинн&quot;}">Торфинн</a>,
      появляется корабль йомсвикингов. Это дружина, которую возглавлял <a href="https://shikimori.io/characters/13021-thors"
      title="Thors" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/13021-thors/tooltip" data-attrs="{&quot;id&quot;:13021,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Thors&quot;,&quot;russian&quot;:&quot;Торс&quot;}">Торс</a>
      до своего дезертирства в 987 году во время <a class="b-link" href="http://ru.wikipedia.org/wiki/Битва при Хьёрунгаваге"
      rel="noopener noreferrer nofollow">битвы при Хьёрунгаваге</a>, и теперь они хотят, чтобы он вернулся на войну вновь.
      Под угрозой захвата и разорения мирной деревни викингами <a href="https://shikimori.io/characters/13021-thors" title="Thors"
      class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/13021-thors/tooltip" data-attrs="{&quot;id&quot;:13021,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Thors&quot;,&quot;russian&quot;:&quot;Торс&quot;}">Торс</a>
