    description: Одержав победу над Королём демонов, отряд героя [character=186854]Химмеля[/character] вернулся домой. Приключение,
      растянувшееся на десятилетие, подошло к завершению. Волшебница-эльф [character=184947]Фрирен[/character] и её отважные
      товарищи принесли людям мир и разошлись в разные стороны, чтобы спокойно прожить остаток жизни. Однако не всех членов
      отряда ждёт одинаковая участь. Для эльфов время течёт иначе, поэтому [character=184947]Фрирен[/character] вынужденно
      становится свидетелем того, как её спутники один за другим постепенно уходят из жизни. Девушка осознала, что годы, проведённые
      в отряде героя, пронеслись в один миг, как падающая звезда в бескрайнем космосе её жизни, и столкнулась с сожалениями
      об упущенных возможностях. Сможет ли она смириться со смертью друзей и понять, что значит жизнь для окружающих её людей?
      [character=184947]Фрирен[/character] начинает новое путешествие, чтобы найти ответ.
    description_html: <div class="b-text_with_paragraphs">Одержав победу над Королём демонов, отряд героя <a href="https://shikimori.io/characters/186854-himmel"
      title="Himmel" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/186854-himmel/tooltip" data-attrs="{&quot;id&quot;:186854,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Himmel&quot;,&quot;russian&quot;:&quot;Химмель&quot;}">Химмеля</a>
      вернулся домой. Приключение, растянувшееся на десятилетие, подошло к завершению. Волшебница-эльф <a href="https://shikimori.io/characters/184947-frieren"
      title="Frieren" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/184947-frieren/tooltip" data-attrs="{&quot;id&quot;:184947,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Frieren&quot;,&quot;russian&quot;:&quot;Фрирен&quot;}">Фрирен</a>
      и её отважные товарищи принесли людям мир и разошлись в разные стороны, чтобы спокойно прожить остаток жизни. Однако
      не всех членов отряда ждёт одинаковая участь. Для эльфов время течёт иначе, поэтому <a href="https://shikimori.io/characters/184947-frieren"
      title="Frieren" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/184947-frieren/tooltip" data-attrs="{&quot;id&quot;:184947,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Frieren&quot;,&quot;russian&quot;:&quot;Фрирен&quot;}">Фрирен</a>
      вынужденно становится свидетелем того, как её спутники один за другим постепенно уходят из жизни. Девушка осознала,
      что годы, проведённые в отряде героя, пронеслись в один миг, как падающая звезда в бескрайнем космосе её жизни, и столкнулась
      с сожалениями об упущенных возможностях. Сможет ли она смириться со смертью друзей и понять, что значит жизнь для окружающих
      её людей? <a href="https://shikimori.io/characters/184947-frieren" title="Frieren" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/184947-frieren/tooltip"
      data-attrs="{&quot;id&quot;:184947,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Frieren&quot;,&quot;russian&quot;:&quot;Фрирен&quot;}">Фрирен</a>
      начинает новое путешествие, чтобы найти ответ.</div>
