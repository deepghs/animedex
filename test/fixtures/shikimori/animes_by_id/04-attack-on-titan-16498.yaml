    description: |-
      С давних времён человечество ведёт свою борьбу с титанами. Титаны — это огромные существа, ростом с многоэтажный дом, которые не обладают большим интеллектом, но сила их просто ужасна. Они едят людей и получают от этого удовольствие. После продолжительной борьбы остатки человечества создали стену, окружившую мир людей, через которую не пройдут даже титаны.
      С тех пор прошло сто лет. Человечество мирно живёт под защитой стены. Но в один день мальчик Эрен [エレン・イェーガー] и его приёмная сестра Микаса [ミカサ・アッカーマン] становятся свидетелями страшного события: участок стены был разрушен супертитаном, появившимся прямо из воздуха. Титаны атакуют город, и двое детей в ужасе видят, как один из монстров заживо съедает их мать.
      Брат и сестра выживают, и Эрен клянётся, что убьёт всех титанов и отомстит за всё человечество!
    description_html: '<div class="b-text_with_paragraphs">С давних времён человечество ведёт свою борьбу с титанами. Титаны
      — это огромные существа, ростом с многоэтажный дом, которые не обладают большим интеллектом, но сила их просто ужасна.
      Они едят людей и получают от этого удовольствие. После продолжительной борьбы остатки человечества создали стену, окружившую
      мир людей, через которую не пройдут даже титаны.<br>С тех пор прошло сто лет. Человечество мирно живёт под защитой стены.
      Но в один день мальчик <a href="https://shikimori.io/characters/40882-eren-yeager" title="Eren Yeager" class="bubbled
      b-link" data-tooltip_url="https://shikimori.io/characters/40882-eren-yeager/tooltip" data-attrs="{&quot;id&quot;:40882,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Eren
      Yeager&quot;,&quot;russian&quot;:&quot;Эрен Йегер&quot;}">Эрен</a> и его приёмная сестра <a href="https://shikimori.io/characters/40881-mikasa-ackerman"
      title="Mikasa Ackerman" class="bubbled b-link" data-tooltip_url="https://shikimori.io/characters/40881-mikasa-ackerman/tooltip"
      data-attrs="{&quot;id&quot;:40881,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Mikasa Ackerman&quot;,&quot;russian&quot;:&quot;Микаса
      Аккерман&quot;}">Микаса</a> становятся свидетелями страшного события: участок стены был разрушен супертитаном, появившимся
      прямо из воздуха. Титаны атакуют город, и двое детей в ужасе видят, как один из монстров заживо съедает их мать.<br>Брат
      и сестра выживают, и <a href="https://shikimori.io/characters/40882-eren-yeager" title="Eren Yeager" class="bubbled
      b-link" data-tooltip_url="https://shikimori.io/characters/40882-eren-yeager/tooltip" data-attrs="{&quot;id&quot;:40882,&quot;type&quot;:&quot;character&quot;,&quot;name&quot;:&quot;Eren
      Yeager&quot;,&quot;russian&quot;:&quot;Эрен Йегер&quot;}">Эрен</a> клянётся, что убьёт всех титанов и отомстит за всё
      человечество!</div>'
