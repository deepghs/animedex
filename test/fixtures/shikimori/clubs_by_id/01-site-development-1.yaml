    description: "[spoiler=безнадёжно устарело][h3]Планы на ближайшее время[/h3]\r\nЗдесь перечислены только крупные или сложные\
      \ доработки. О повседневных мелких правках/фиксах и простых в реализации вещах речи не идёт.\r\n[list]\r\n[*] [s]Переработка\
      \ профиля, новое верхнее меню сайта, небольшой редизайн всех страниц, больше информации на главной странице[/s];\r\n\
      [*] [s]Раздел с рецензиями аниме и манги, рецензии от Idzumi[/s];\r\n[*] [s]Система модерации комментариев; Оффтоп;\
      \ Отзыв[/s];\r\n[*] [s]Раздел с голосованиями, опросами, турнирами или там это назвать. Примерный аналог http://www.internationalsaimoe.com\
      \ только будет по аниме/манге и попроще, не такое глобальное и не такое долгое;[/s]\r\n[*] [s][spoiler=Внутренние доработки\
      \ сайта, на пользователей никак не влияющие]Миграция с Rails 3.0 на Rails 3.2, рефакторинг толстых контроллеров, гораздо\
      \ более плотное покрытие кода спеками[/spoiler][/s];\r\n[*] [s]Починка импорта косплея и страницы его модерации[/s];\r\
      \n[*] [s]Новый раздел новостей, заполняемый пользователям[/s];\r\n[*] [s]Задание ссылок на опенинг, эндинг, трейлер\
      \ аниме. Заполнение опенингов и эндингов для существующих аниме[/s];\r\n[*] [s]Новый алгоритм рекомендаций v0.5[/s];\
      \ \r\n[*] [s]Список пользователей, похожих на текущего[/s];\r\n[*] [s]Перевод ассетов сайта на[/s] [url=http://guides.rubyonrails.org/asset_pipeline.html][s]asset\
      \ pipeline[/s][/url];\r\n[*] [s]Попробовать немного адаптивной вёрстки для форума[/s];\r\n[*] [s]Вынести все скриншоты\
      \ к аниме с amazon s3 на хостинг самого сайта, слишком дорого за амазон выходит[/s];\r\n[*] [s]Несколько новых фонов\
      \ сайта, выбираемых в настройках[/s];\r\n[*] [s]Приделать[/s] [url=http://codeseven.github.io/toastr/][s]няшные уведомления[/s][/url];\
      \ \r\n[*] [s]Playoff опросы[/s];\r\n[*] [s]Новая система модерации[/s];\r\n[*] [s]Страница со статистикой сайта[/s];\r\
      \n[*] [s]Опросы по персонажам[/s];\r\n[*] [s]Разбитие настроек пользователя на подвкладки[/s];\r\n[*] [s]Отображение\
      \ фона сайта пользователя, в чьём профиле в данный момент находится текущий пользователь[/s];\r\n[*] Статус повторного\
      \ просмотра для аниме и счётчик rewatch'ей;\r\n[*] Тома для манги;\r\n[*] Локализация на иностранный язык;\r\n[*] Пошаговая\
      \ инструкция для пользователя после регистрации;\r\n[*] Апи [spoiler=пожелания]\r\n\r\n Единый метод авторизации\r\n\
      - Получение токена\r\n- Получение данных о пользователе\r\n- Получения списков (аниме, манги, избранного, друзей, сообщений\
      \ и т.д.)\r\n- Получение информации о произведение, клубе, обсуждение, топике и т.д.\r\n- Получение комментариев к объекту[/spoiler]\r\
      \n[*] Переделка главной страницы на что-то более понятное не зарегистрированным пользователям;\r\n[*] [s]Поддержка видео\
      \ из вконтакта[/s];\r\n[*] Очень большая доработка (или даже скорее полная переработка) пользовательских клубов; [comment=113680;950]некоторые\
      \ пожелания[/comment];\r\n[*] Адаптивная вёрстка для каталога аниме и страницы аниме;\r\n[*] Приоритеты для аниме и\
      \ манги в статусе запланированного;\r\n[*] На MAL'е отдельные жанры для манги. Нужно на всём сайте разбить Genres на\
      \ AnimeGenres и MangaGenres, либо ещё что-то придумать, чтобы корректно жанры отображались; \r\n[manga=45353 yuyushiki]Comedy,\
      \ School, Thriller[/manga], а должно быть Comedy, School, Seinen\r\n[*] Мониторинг появления новых глав манги на readmanga.ru/adultmanga.ru/animanga.ru/mangachan.ru/www.manga24.ru\
      \ (список предварительный, полученный из списка сайтов [url=https://www.google.ru/search?q=%D0%BC%D0%B0%D0%BD%D0%B3%D0%B0&aq=f&oq=%D0%BC%D0%B0%D0%BD%D0%B3%D0%B0&aqs=chrome.0.59j65l3j0j61.683&sourceid=chrome&ie=UTF-8]отсюда[/url],\
      \ при реализации скорее всего список сократится до 1-3 сайтов) и создание уведомлений пользователям об этом;\r\n[*]\
      \ Мониторинг появления новых глав манги на англоязычных сайтах: mangafox.me, mangaupdates.com\r\n[*] Ачивки;\r\nhttp://wiki.anidb.net/w/Achievements\r\
      \nhttp://www.anime-planet.com/badges/all?page=18\r\nhttps://github.com/rr-/malgraph/blob/master/data/achievements.json\
      \  \r\n[*] У [Suzumiya Haruhi no Yuuutsu] и некоторых других кривая кодировка японских названий. Происходит из-за кривых\
      \ символов страницы на MAL, из-за чего приходится насильно выставлять кодировку, чтобы было можно распарсить текст.\
      \ Как лечить пока не знаю;\r\n[*] Доработка алгоритма рекомендаций v0.9; [url=https://www.dropbox.com/s/knm47063bkl9jl4/Shikimori_recomendation.pdf]Описание[/url]\r\
      \n[*] Возможность создавать новые аниме и мангу, возможность редактирования обложки, названия, числа эпизодов, томов,\
      \ глав, даты релиза для уже существующих, пришедших с mal'а;\r\n[/list]\r\n\r\nФлуд нежелателен. Комментарии о том,\
      \ что всё нравтся, тоже. Пожелания доработок, не связанных с обсуждаемым здесь функционалом, пишите по-прежнему [url=http://shikimori.org/s/10586-Pozhelaniya-po-saytu]сюда[/url].[/spoiler]\r\
      \n\r\nСтарые комментарии можно найти [url=http://shikimori.org/clubs/29-Razrabotka-sayta-arhiv]в архиве[/url].\r\n\r\
      \nВсе задачи, связанные с разработкой сайта на доске: https://agileseason.com/boards/morr/shikimori\r\n\r\nРеализации\
      \ API сайта на Python от [url=http://shikimori.org/OlegWock]OlegWock[/url]: https://github.com/OlegWock/PyShiki\r\n\
      Реализации API сайта на Node.js от [url=http://shikimori.org/Capster]Capster[/url]: https://github.com/Capster/node-shikimori"
