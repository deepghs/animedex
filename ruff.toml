# Ruff configuration for animedex.
# https://docs.astral.sh/ruff/settings/
#
# Only a single deviation from defaults: a 120-column line length, which
# matches modern terminal/editor widths and is a deliberate relaxation of
# Ruff's 88-column default.
#
# Everything else (rule selection, format style) is left at the defaults.
# Tightenings live in dedicated commits with rationale; see AGENTS.md.

line-length = 120
target-version = "py39"

# build_info.py is generated by tools/generate_build_info.py and
# .gitignore'd. Its format is owned by the generator template, not by
# the ruff style we apply to hand-written code, so exclude it to keep
# `make format-check` from flagging cosmetic differences (e.g. single
# vs double quoted strings) every CI run.
extend-exclude = [
    "animedex/config/build_info.py",
]
