[pytest]
timeout = 300
markers =
    unittest
    benchmark
    ignore
# CI hard rule: every unit test must reach the network only through
# fixtures (test/fixtures/<backend>/<path>/) replayed via the
# `responses` library. --disable-socket blocks every real socket
# connection by default; tests that legitimately need a real socket
# must opt in with @pytest.mark.enable_socket. This prevents Phase
# 1+'s broad upstream test surface (8 backends, 534 fixtures × CI
# matrix × OS x Py-version) from accidentally fanning out into
# parallel real-API hits that would 429 or get our UA banned.
addopts = --disable-socket --allow-unix-socket
